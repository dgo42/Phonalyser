<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <!-- Magic wand tilted toward the upper right with three stars sparkling
         around its tip.  Two-colour palette: a dark wand and orange stars
         — clean at small icon sizes and reproduces faithfully through
         the bundled IconUtils SVG renderer (no gradients, no opacity). -->

    <!-- Wand (single dark polygon, tip-to-base) -->
    <path fill="#383838" d="M 350.5 77.6 L 391.5 106.4 L 161.5 434.4 L 120.5 405.6 Z"/>

    <!-- Top-left large 5-pointed star -->
    <path fill="#F0A030" d="M 140 25 L 152.9 62.2 L 192.3 63 L 160.9 86.8 L 172.3 124.5 L 140 102 L 107.7 124.5 L 119.1 86.8 L 87.7 63 L 127.1 62.2 Z"/>

    <!-- Top-centre medium star -->
    <path fill="#F0A030" d="M 260 15 L 269.4 42.1 L 298 42.6 L 275.2 59.9 L 283.5 87.4 L 260 71 L 236.5 87.4 L 244.8 59.9 L 222 42.6 L 250.6 42.1 Z"/>

    <!-- Right-side medium star -->
    <path fill="#F0A030" d="M 395 160 L 404.4 187.1 L 433 187.6 L 410.2 204.9 L 418.5 232.4 L 395 216 L 371.5 232.4 L 379.8 204.9 L 357 187.6 L 385.6 187.1 Z"/>
</svg>
