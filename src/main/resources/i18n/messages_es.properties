# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Sugerencia del día
tip.dialog.dontShowAgain = No volver a mostrar
tip.dialog.next          = Sugerencia siguiente
tip.dialog.close         = Cerrar
tip.dialog.closeCountdown = Cerrar ({0} s)
tip.count = 14
tip.1.title = El promediado coherente excava muy por debajo del ruido de fondo.
tip.1.body  = Deja activado el promediado coherente (complejo) y deja correr la FFT: el tono se va sumando mientras el ruido se cancela en parte, así que el ruido de fondo sigue bajando cuanto más esperes.
tip.2.title = Ajusta el generador a un bin de la FFT para obtener un espectro limpio.
tip.2.body  = Con "Ajustar frecuencia al más cercano" activado, el tono cae exactamente sobre un bin, de modo que la fuga no emborrona el fundamental y las estimaciones de armónicos se mantienen fiables.
tip.3.title = Fija el fundamental a mano en un notch twin-T.
tip.3.body  = Un nulo pasivo twin-T es tan abrupto que unas pocas décimas de hercio de deriva térmica desvían el fundamental desincrustado. Introduce el nivel que realmente conoces con "Fundamental manual"; los armónicos, en el flanco suave, se desincrustan bien.
tip.4.title = El modo exclusivo de WASAPI mantiene la medición exacta a nivel de bit.
tip.4.body  = El modo exclusivo entrega el dispositivo directamente a Phonalyser, evitando el mezclador de Windows y su conversor de frecuencia de muestreo: sin remuestreo oculto que coloree el resultado.
tip.5.title = WDM-KS le da al osciloscopio la mayor cantidad de fotogramas por segundo.
tip.5.body  = Para el refresco en vivo más rápido del osciloscopio, elige el backend WDM-KS en Preferencias: se sitúa más abajo que WASAPI y envía más bloques de captura por segundo.
tip.6.title = La rueda del ratón aplica zoom alrededor del cursor.
tip.6.body  = En cualquier vista de traza: la rueda desplaza verticalmente, Mayús+rueda horizontalmente, Ctrl+rueda aplica zoom al eje vertical y Ctrl+Mayús+rueda al horizontal; ambos zooms mantienen fijo el valor bajo el puntero.
tip.7.title = Todos los campos numéricos aceptan unidades, la rueda y el teclado.
tip.7.body  = Escribe un valor con su unidad (µV, 1.5 V, -3 dBV, 2 kHz), gira la rueda, haz clic en las flechas arriba/abajo o pulsa las teclas arriba/abajo del teclado para avanzar paso a paso.
tip.8.title = La interpolación sinc solo importa cuando tienes el zoom ampliado.
tip.8.body  = El conmutador Sin/Lin cambia la traza únicamente cuando los puntos de muestreo están a un par de píxeles de distancia en pantalla; de lo contrario las líneas rectas se ven idénticas y cuestan menos CPU. Actívalo cuando ya se vean las muestras individuales.
tip.9.title = La histéresis estabiliza el disparo en una señal débil y ruidosa.
tip.9.body  = Sin ella, el ruido en torno al nivel de disparo provoca una ráfaga de disparos falsos y la traza tiembla. Activa la histéresis de disparo y la traza se engancha.
tip.10.title = Una señal del generador guardada es una referencia perfecta.
tip.10.body  = "Guardar en..." escribe la forma de onda ideal, matemáticamente exacta: sin distorsión de DAC, amplificador ni cableado. Aliméntala a otro instrumento y cualquier imperfección que midas pertenece a ese dispositivo, no a la fuente.
tip.11.title = Desincrusta un montaje con un archivo de calibración.
tip.11.body  = Mide una vez la respuesta de un notch, atenuador o tarjeta de sonido en el módulo de Respuesta en frecuencia, luego carga ese .frc en el analizador FFT: su respuesta se divide al mostrar, de modo que la tabla muestra el dispositivo bajo prueba.
tip.12.title = La superposición de batido reconstruido domina un par de dos tonos cercanos.
tip.12.body  = En modo de doble tono, la superposición "Batido reconstruido" del osciloscopio dibuja la envolvente lenta |f1 - f2|, de modo que puedes disparar sobre el batido en lugar de perseguir los cruces rápidos de la portadora.
tip.13.title = El barrido de respuesta en frecuencia es su propia referencia.
tip.13.body  = La medición barrida se deconvoluciona contra el barrido exacto que se reprodujo, no contra una copia remedida, de modo que la magnitud y la fase recuperadas son la verdadera función de transferencia del dispositivo.
tip.14.title = Ctrl+F1 salta directamente a la ayuda correcta.
tip.14.body  = Pulsa F1 en cualquier lugar para el manual, o Ctrl+F1 para abrir la ayuda en la sección exacta del control que tiene el foco en ese momento.

