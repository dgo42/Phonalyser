# --- DAC harmonic-predistortion wizard (FFT pane) ---
predistortion.button.wizard.tooltip = Measure and apply DAC predistortion.\nIt locks the tone to an FFT bin, then each round averages the set number of FFT frames, reads the sine's harmonics (or the dual tone's intermodulation products), and feeds an equal-and-opposite correction back to the generator — repeating until the distortion reaches your target or stops improving.\nGoal: drive the distortion down toward the noise floor; Save the .dpd and Apply it to keep the compensated tone.
predistortion.wizard.title    = DAC predistortion
predistortion.averages        = Averages, n
predistortion.averages.tooltip = FFT averages per round (wheel ±10, arrows ±1; minimum 10).  Each round averages this many frames, growing in proportion to the distortion drop as it converges.  The loop runs until you press Stop.
predistortion.targetThd       = Target THD, %
predistortion.targetThd.tooltip = Stop once the THD reaches this value (0 = run until it stalls)
predistortion.table.metric    = Measurement
predistortion.table.value     = Value
predistortion.intro           = MANDATORY: put a passive twin-T notch filter, tuned to the fundamental, between the device under test and the ADC.  Without it the ADC's own harmonics set the floor and the loop ends up compensating the ADC, not the DAC.\nThis drives the DAC's residual distortion down by pre-distorting the generator with the inverse of what it measures.\nHow it works — 1) it locks the tone onto an FFT bin and waits for alignment;  2) each round it averages the number of FFT frames set below, reads the sine's harmonics (or the dual tone's intermodulation products), and feeds an equal-and-opposite correction back to the generator;  3) it repeats — averaging more frames as the distortion drops — the chart falling toward the noise floor, until the target distortion is reached or progress stalls.\nThe wizard runs the FFT in infinite coherent averaging with the fundamental taken from the generator and the FLL on; for the deepest floor use the HFT248D window and leave mains suppression off.  Use a clean signal a few dB below full scale and the fundamental snapped to a bin — then Save the .dpd and Apply it.
