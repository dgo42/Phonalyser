# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Tip of the day
tip.dialog.dontShowAgain = Don't show again
tip.dialog.next          = Next tip
tip.dialog.close         = Close
tip.dialog.closeCountdown = Close ({0}s)
tip.count = 14
tip.1.title = Coherent averaging digs far below the noise floor.
tip.1.body  = Leave coherent (complex) averaging on and let the FFT run — the tone adds up while the noise partly cancels, so the floor keeps dropping the longer you wait.
tip.2.title = Snap the generator to an FFT bin for a clean spectrum.
tip.2.body  = With "Snap frequency to nearest" on, the tone lands exactly on a bin, so leakage doesn't smear the fundamental and the harmonic estimates stay honest.
tip.3.title = If use a twin-T notch enter fundamental amplitude by hand.
tip.3.body  = A passive twin-T notch is so steep that a few tenths of a hertz of thermal drift swing the de-embedded fundamental. Enter the level you actually know with "Manual fundamental"; the harmonics, on the gentle flank, de-embed fine.
tip.4.title = WASAPI exclusive mode keeps the measurement bit-exact.
tip.4.body  = Exclusive mode hands the device straight to Phonalyser, bypassing the Windows mixer and its sample-rate converter — no hidden resampling to colour the result.
tip.5.title = WDM-KS gives the oscilloscope the most frames per second.
tip.5.body  = For the fastest live scope refresh, pick the WDM-KS backend in Preferences — it sits lower than WASAPI and pushes more capture blocks per second.
tip.6.title = The mouse wheel zooms around the cursor.
tip.6.body  = In any trace view: wheel moves vertically, Shift+wheel horizontally, Ctrl+wheel zooms the vertical axis and Ctrl+Shift+wheel the horizontal — both zooms keep the value under the pointer fixed.
tip.7.title = Every numeric field takes units, the wheel, and the keyboard.
tip.7.body  = Type a value with its unit (µV, 1.5 V, -3 dBV, 2 kHz), scroll the wheel, click the up/down arrows, or press the keyboard up/down keys to step.
tip.8.title = Sinc interpolation only matters when you're zoomed in.
tip.8.body  = The Sin/Lin switch changes the trace only when sample points are a couple of pixels apart on screen; otherwise straight lines look identical and cost less CPU. Turn it on once individual samples are visible.
tip.9.title = Hysteresis stabilises the trigger on a weak, noisy signal.
tip.9.body  = Without it, noise around the trigger level fires a flurry of false triggers and the trace jitters. Enable trigger hysteresis and the trace locks.
tip.10.title = A saved generator signal is a perfect reference.
tip.10.body  = "Save to..." writes the ideal, mathematically exact waveform — no DAC, amplifier or cabling distortion. Feed it to another instrument and any imperfection you measure belongs to that device, not the source.
tip.11.title = De-embed a fixture with a calibration file.
tip.11.body  = Measure a notch, attenuator or soundcard's response once in the Frequency-response module, then load that .frc into the FFT analyser: its response is divided out at display time, so the table shows the device under test.
tip.12.title = The reconstructed-beat overlay tames a close two-tone pair.
tip.12.body  = In dual-tone mode the scope's "Reconstructed beat" overlay draws the slow |f1 - f2| envelope, so you can trigger on the beat instead of chasing the fast carrier crossings.
tip.13.title = The frequency-response sweep is its own reference.
tip.13.body  = The swept measurement is deconvolved against the exact sweep that was played — not a re-measured copy — so the recovered magnitude and phase are the device's true transfer function.
tip.14.title = Ctrl+F1 jumps straight to the right help.
tip.14.body  = Press F1 anywhere for the manual, or Ctrl+F1 to open the help at the exact section for the control that currently has focus.

