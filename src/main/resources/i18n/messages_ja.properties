# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = 今日のヒント
tip.dialog.dontShowAgain = 次回から表示しない
tip.dialog.next          = 次のヒント
tip.dialog.close         = 閉じる
tip.dialog.closeCountdown = 閉じる ({0}秒)
tip.count = 14
tip.1.title = コヒーレント平均化はノイズフロアのはるか下まで掘り下げます。
tip.1.body  = コヒーレント (複素) 平均化をオンのままにしてFFTを実行し続けてください。トーンは加算される一方でノイズは部分的に打ち消し合うため、待つほどフロアは下がり続けます。
tip.2.title = クリーンなスペクトルを得るには、ジェネレータをFFTビンにスナップしてください。
tip.2.body  = 「周波数を最も近いビンにスナップ」をオンにすると、トーンがちょうどビン上に乗るため、リーケージが基本波をにじませず、高調波の推定値も正確に保たれます。
tip.3.title = ツインT型ノッチでは基本波を手動で固定してください。
tip.3.body  = パッシブなツインT型のヌルは非常に急峻なため、数十分の1ヘルツの熱ドリフトでも逆算した基本波が大きく振れます。「手動基本波」に実際に判っているレベルを入力してください。緩やかな側にある高調波は問題なく逆算されます。
tip.4.title = WASAPI排他モードは測定をビット精密に保ちます。
tip.4.body  = 排他モードはデバイスをPhonalyserに直接引き渡し、Windowsミキサーとそのサンプルレート変換器をバイパスします。結果を色付けする隠れたリサンプリングはありません。
tip.5.title = WDM-KSはオシロスコープに最も多くのフレーム毎秒を与えます。
tip.5.body  = 最速のライブスコープ更新には、設定でWDM-KSバックエンドを選んでください。WASAPIより低層に位置し、毎秒より多くのキャプチャブロックを送り出します。
tip.6.title = マウスホイールはカーソルを中心にズームします。
tip.6.body  = 任意のトレース表示で、ホイールは垂直に、Shift+ホイールは水平に移動し、Ctrl+ホイールは垂直軸を、Ctrl+Shift+ホイールは水平軸をズームします。どちらのズームもポインタ下の値を固定したまま行います。
tip.7.title = すべての数値フィールドは単位、ホイール、キーボードに対応します。
tip.7.body  = 単位付きで値を入力 (µV、1.5 V、-3 dBV、2 kHz) するか、ホイールをスクロールするか、上下の矢印をクリックするか、キーボードの上下キーを押してステップさせてください。
tip.8.title = sinc補間はズームインしているときだけ意味を持ちます。
tip.8.body  = Sin/Linスイッチがトレースを変えるのは、サンプル点が画面上で数ピクセル離れているときだけです。それ以外では直線でも見た目は同じで、CPUコストも低くなります。個々のサンプルが見えてきたらオンにしてください。
tip.9.title = ヒステリシスは微弱でノイズの多い信号でトリガを安定させます。
tip.9.body  = これがないと、トリガレベル付近のノイズが大量の誤トリガを発生させ、トレースがジッタします。トリガヒステリシスを有効にするとトレースがロックします。
tip.10.title = 保存したジェネレータ信号は完璧な基準です。
tip.10.body  = 「保存先...」は理想的で数学的に正確な波形を書き出します。DAC、アンプ、配線による歪みはありません。これを別の計器に入力すれば、測定される不完全さはすべて信号源ではなくそのデバイスに由来します。
tip.11.title = キャリブレーションファイルでフィクスチャを逆算除去します。
tip.11.body  = ノッチ、アッテネータ、サウンドカードの応答を周波数応答モジュールで一度測定し、その.frcをFFTアナライザに読み込むと、表示時にその応答が除算され、テーブルには被測定デバイスが表示されます。
tip.12.title = 再構成ビートのオーバーレイは近接した2トーンのペアを御しやすくします。
tip.12.body  = デュアルトーンモードでは、スコープの「再構成ビート」オーバーレイがゆっくりした |f1 - f2| 包絡線を描くため、速いキャリアのゼロクロスを追わずにビートでトリガできます。
tip.13.title = 周波数応答スイープはそれ自身が基準です。
tip.13.body  = スイープ測定は、再測定したコピーではなく実際に再生された正確なスイープに対してデコンボリューションされるため、回復された振幅と位相はデバイスの真の伝達関数になります。
tip.14.title = Ctrl+F1で適切なヘルプに直接ジャンプします。
tip.14.body  = どこでもF1を押すとマニュアルが開き、Ctrl+F1を押すと現在フォーカスのあるコントロールに対応する箇所でヘルプが開きます。

