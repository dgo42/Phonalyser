fft.warning.rejection.phase = 位相コヒーレンス棄却: {1} フレーム中 {0} フレームを棄却 (最大偏差 {2}°)。\nサブサンプルのドロップの可能性。キャプチャ収束が遅延しました。
fft.warning.overrun = ⚠ バッファオーバーラン — 再同期
fft.warning.overrun.tip = アナライザがキャプチャバッファ1個分まるごと遅れたため、窓をライブの先端に再アンカーして平均化を続けます (カバレッジのギャップ — データ破損はありません)。\nオーバーランが頻発する場合は分析が追いつけていません。オーバーラップまたはFFT長を下げてください。
fft.warning.discontinuity = ⚠ 信号の不連続 — 再同期
fft.warning.discontinuity.tip = アナライザがキャプチャ信号に不連続 (帯域制限違反のグリッチ / ドロップしたサンプル) を見つけ、影響を受けた窓を破棄して再同期したため、コヒーレント平均化が続きます。\n不連続が頻発する場合は信号源またはキャプチャが負荷下でグリッチしています。
fft.warning.alignDrift = ⚠ 整合中にレベルがシフト — 統計をリセット
fft.warning.alignDrift.tip = 周波数ロックがジェネレータをFFTビングリッドへ引き込む間に、基本波レベルが {0} dB 変化しました。\n移動平均には旧レベルの整合前フレームがまだ含まれています。クリーンな平均を収集するには統計をリセットをクリックしてください。

