# ===== TIP OF THE DAY =====

tip.dialog.heading = Tip dňa
tip.dialog.dontShowAgain = Už nezobrazovať
tip.dialog.next = Ďalší tip
tip.dialog.close = Zavrieť
tip.dialog.closeCountdown = Zavrieť ({0} s)
tip.count = 14
tip.1.title = Koherentné spriemerovanie sa dostane hlboko pod úroveň šumu.
tip.1.body = Nechajte koherentné (komplexné) spriemerovanie zapnuté a nechajte FFT bežať — tón sa sčítava, kým sa šum čiastočne ruší, takže úroveň šumu klesá tým viac, čím dlhšie čakáte.
tip.2.title = Prichyťte generátor na FFT bin pre čisté spektrum.
tip.2.body = So zapnutou voľbou „Prichytiť frekvenciu na najbližšiu" tón dopadne presne na bin, takže presakovanie nerozmazáva základnú frekvenciu a odhady harmonických zostávajú verné.
tip.3.title = Pripnite základnú frekvenciu ručne pri zádrži typu twin-T.
tip.3.body = Pasívna nula twin-T je taká strmá, že pár desatín hertza tepelného driftu rozkýva odvodenú základnú frekvenciu. Zadajte úroveň, ktorú skutočne poznáte, pomocou „Ručná základná frekvencia"; harmonické na miernom svahu sa odvodia bez problémov.
tip.4.title = Exkluzívny režim WASAPI udrží meranie bitovo presné.
tip.4.body = Exkluzívny režim odovzdá zariadenie priamo Phonalyseru, obíde mixér Windows a jeho prevodník vzorkovacej frekvencie — žiadne skryté prevzorkovanie, ktoré by skreslilo výsledok.
tip.5.title = WDM-KS dáva osciloskopu najviac snímok za sekundu.
tip.5.body = Pre najrýchlejšiu obnovu živého osciloskopu zvoľte v Nastaveniach backend WDM-KS — leží nižšie než WASAPI a posúva viac blokov záznamu za sekundu.
tip.6.title = Koliesko myši približuje okolo kurzora.
tip.6.body = V ktoromkoľvek zobrazení priebehu: koliesko posúva zvisle, Shift+koliesko vodorovne, Ctrl+koliesko približuje zvislú os a Ctrl+Shift+koliesko vodorovnú — obe priblíženia udržia hodnotu pod ukazovateľom pevne.
tip.7.title = Každé číselné pole prijíma jednotky, koliesko aj klávesnicu.
tip.7.body = Napíšte hodnotu s jej jednotkou (µV, 1.5 V, -3 dBV, 2 kHz), otáčajte kolieskom, klikajte na šípky hore/dole alebo stláčajte klávesy hore/dole na krokovanie.
tip.8.title = Sinc interpolácia má význam len pri priblížení.
tip.8.body = Prepínač Sin/Lin mení priebeh len vtedy, keď sú body vzoriek na obrazovke pár pixelov od seba; inak vyzerajú priame čiary identicky a stoja menej CPU. Zapnite ho, keď sú viditeľné jednotlivé vzorky.
tip.9.title = Hysterézia stabilizuje spúšťanie na slabom, zašumenom signáli.
tip.9.body = Bez nej šum okolo úrovne spúšťania vyvolá záplavu falošných spustení a priebeh sa chveje. Zapnite hysteréziu spúšťania a priebeh sa uzamkne.
tip.10.title = Uložený signál generátora je dokonalá referencia.
tip.10.body = „Uložiť do..." zapíše ideálny, matematicky presný priebeh — žiadne skreslenie z DAC, zosilňovača či kabeláže. Privedte ho do iného prístroja a každá nedokonalosť, ktorú nameriate, patrí tomu zariadeniu, nie zdroju.
tip.11.title = Odvodte prípravok pomocou kalibračného súboru.
tip.11.body = Zmerajte raz odozvu zádrže, atenuátora alebo zvukovej karty v module Frekvenčná odozva, potom načítajte ten .frc do FFT analyzátora: jeho odozva sa pri zobrazení vydelí, takže tabuľka ukazuje skúmané zariadenie.
tip.12.title = Prekrytie rekonštruovaného zázneja skrotí blízku dvojicu tónov.
tip.12.body = V dvojtónovom režime prekrytie „Rekonštruovaný záznej" osciloskopu nakreslí pomalú obálku |f1 - f2|, takže môžete spúšťať na zázneji namiesto naháňania rýchlych prechodov nosnej.
tip.13.title = Rozmietanie frekvenčnej odozvy je samo sebe referenciou.
tip.13.body = Rozmietané meranie sa dekonvolvuje voči presnému rozmietaniu, ktoré sa prehralo — nie voči znovu zmeranej kópii — takže získaná amplitúda a fáza sú skutočnou prenosovou funkciou zariadenia.
tip.14.title = Ctrl+F1 skočí rovno na správneho pomocníka.
tip.14.body = Stlačte F1 kdekoľvek pre príručku alebo Ctrl+F1 na otvorenie pomocníka presne v sekcii pre ovládací prvok, ktorý má práve zameranie.

