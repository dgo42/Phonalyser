# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Zmerať a aplikovať predskreslenie DAC.\nUzamkne tón na FFT bin, potom každé kolo spriemeruje nastavený počet FFT snímok, načíta harmonické sínusu (alebo intermodulačné produkty dvojtónu) a privedie rovnakú a opačnú korekciu späť do generátora — opakuje, kým skreslenie nedosiahne váš cieľ alebo prestane klesať.\nCieľ: stlačiť skreslenie smerom k úrovni šumu; uložte .dpd a aplikujte ho na zachovanie kompenzovaného tónu.
predistortion.wizard.title = Predskreslenie DAC
predistortion.averages = Priemerovania, n
predistortion.averages.tooltip = FFT priemerovania na kolo (minimum 10).  Každé kolo spriemeruje toľkoto snímok, pričom ich počet rastie úmerne poklesu skreslenia, ako konverguje.  Slučka beží, kým nestlačíte Zastaviť.
predistortion.targetThd = Cieľové THD, %
predistortion.targetThd.tooltip = Zastaviť, keď THD dosiahne túto hodnotu (0 = bežať, kým sa nezastaví)
predistortion.table.metric = Meranie
predistortion.table.value = Hodnota
predistortion.intro = POVINNÉ: medzi skúmané zariadenie a ADC vložte pasívny zádržný filter twin-T naladený na základnú frekvenciu.  Bez neho určujú úroveň vlastné harmonické ADC a slučka skončí kompenzovaním ADC, nie DAC.\nToto stláča zvyškové skreslenie DAC nadol predskreslením generátora inverziou toho, čo nameria.\nAko to funguje — 1) uzamkne tón na FFT bin a počká na zarovnanie;  2) každé kolo spriemeruje počet FFT snímok nastavený nižšie, načíta harmonické sínusu (alebo intermodulačné produkty dvojtónu) a privedie rovnakú a opačnú korekciu späť do generátora;  3) opakuje sa — spriemerúva viac snímok, ako skreslenie klesá — graf klesá k úrovni šumu, kým sa nedosiahne cieľové skreslenie alebo sa pokrok nezastaví.\nSprievodca beží FFT v nekonečnom koherentnom priemerovaní so základnou frekvenciou prevzatou z generátora a zapnutou FLL; pre najhlbšiu úroveň použite okno HFT248D a nechajte potlačenie siete vypnuté.  Použite čistý signál pár dB pod plným rozsahom a základnú frekvenciu prichytenú na bin — potom uložte .dpd a aplikujte ho.
