# ===== TIP OF THE DAY =====

tip.dialog.heading = Päeva nõuanne
tip.dialog.dontShowAgain = Ära enam näita
tip.dialog.next = Järgmine nõuanne
tip.dialog.close = Sulge
tip.dialog.closeCountdown = Sulge ({0} s)
tip.count = 14
tip.1.title = Koherentne keskmistamine kaevub kaugele mürapõhjast allapoole.
tip.1.body = Jäta koherentne (kompleks-) keskmistamine sisse ja lase FFT-l töötada — toon liitub, samal ajal kui müra osaliselt taandub, nii et põhi langeb mida kauem ootad.
tip.2.title = Lukusta generaator FFT bini, et saada puhas spekter.
tip.2.body = Kui „Lukusta sagedus lähimale“ on sees, langeb toon täpselt bini keskele, nii et leke ei määri põhitooni laiali ja harmooniliste hinnangud jäävad ausaks.
tip.3.title = Fikseeri põhitoon käsitsi kaksik-T sälgu juures.
tip.3.body = Passiivne kaksik-T null on nii järsk, et paar kümnendikku hertsi termilist triivi kõigutab de-embeditud põhitooni. Sisesta tase, mida tegelikult tead, väljaga „Käsitsi põhitoon“; harmoonilised, õrnal nõlval, de-embeduvad korralikult.
tip.4.title = WASAPI eksklusiivrežiim hoiab mõõtmise bititäpse.
tip.4.body = Eksklusiivrežiim annab seadme otse Phonalyserile, möödudes Windowsi mikserist ja selle diskreetimissageduse muundurist — mingit varjatud ümberdiskreetimist tulemuse värvimiseks.
tip.5.title = WDM-KS annab ostsilloskoobile kõige rohkem kaadreid sekundis.
tip.5.body = Kiireima reaalaja skoobi värskendamiseks vali eelistustes WDM-KS taustamootor — see asub WASAPI-st madalamal ja lükkab rohkem hõiveplokke sekundis.
tip.6.title = Hiireratas suumib kursori ümber.
tip.6.body = Igas jälje vaates: ratas liigutab vertikaalselt, Shift+ratas horisontaalselt, Ctrl+ratas suumib vertikaaltelge ja Ctrl+Shift+ratas horisontaaltelge — mõlemad suumid hoiavad kursori all oleva väärtuse paigal.
tip.7.title = Iga numbriväli võtab ühikuid, ratast ja klaviatuuri.
tip.7.body = Trüki väärtus koos ühikuga (µV, 1.5 V, -3 dBV, 2 kHz), keri ratast, klõpsa üles/alla nooli või vajuta klaviatuuri üles/alla klahve sammu astumiseks.
tip.8.title = Sinc-interpolatsioon loeb ainult siis, kui oled sisse suumitud.
tip.8.body = Sin/Lin lüliti muudab jälge ainult siis, kui diskreedipunktid on ekraanil paari piksli kaugusel; muidu näevad sirgjooned identsed välja ja maksavad vähem protsessorit. Lülita see sisse, kui üksikud diskreedid on nähtavad.
tip.9.title = Hüsterees stabiliseerib päästiku nõrgal, mürarikkal signaalil.
tip.9.body = Ilma selleta käivitab müra päästiku taseme ümber hulga valepäästikuid ja jälg väriseb. Luba päästiku hüsterees ja jälg lukustub.
tip.10.title = Salvestatud generaatori signaal on täiuslik etalon.
tip.10.body = „Salvesta…“ kirjutab ideaalse, matemaatiliselt täpse lainekuju — ilma DAC-i, võimendi või kaabelduse moonutusteta. Söödo see teisele instrumendile ja iga ebatäius, mida mõõdad, kuulub sellele seadmele, mitte allikale.
tip.11.title = De-embedi seade kalibreerimisfailiga.
tip.11.body = Mõõda sälk, summuti või helikaardi vastus üks kord sagedusvastuse moodulis, seejärel lae see .frc FFT-analüsaatorisse: selle vastus jagatakse kuvamise ajal välja, nii et tabel näitab mõõdetavat seadet.
tip.12.title = Rekonstrueeritud löögisageduse ülekate taltsutab lähedase kahetooni paari.
tip.12.body = Kahetooni režiimis joonistab skoobi „Rekonstrueeritud löögisagedus“ ülekate aeglase |f1 - f2| ümbriku, nii et saad päästikuks võtta löögisageduse, mitte jälitada kiireid kandetooni läbiminekuid.
tip.13.title = Sagedusvastuse pühe on iseenda etalon.
tip.13.body = Pühitud mõõtmine dekonvolveeritakse täpselt mängitud pühe vastu — mitte uuesti mõõdetud koopia vastu — nii et taastatud amplituud ja faas on seadme tegelik ülekandefunktsioon.
tip.14.title = Ctrl+F1 hüppab otse õige abi juurde.
tip.14.body = Vajuta käsiraamatu jaoks ükskõik kus F1 või Ctrl+F1, et avada abi täpselt selle juhtelemendi jaotises, millel on praegu fookus.

