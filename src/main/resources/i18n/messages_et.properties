# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mõõda ja rakenda DAC-i eelmoonutust.\nSee lukustab tooni FFT bini, seejärel iga voor keskmistab määratud arvu FFT kaadreid, loeb siinuse harmoonilised (või kahetooni intermodulatsiooniproduktid) ja söödab generaatorile tagasi võrdse ja vastassuunalise korrektsiooni — korrates seni, kuni moonutus jõuab sinu eesmärgini või lakkab paranemast.\nEesmärk: viia moonutus mürapõhja poole alla; salvesta .dpd ja rakenda see, et hoida kompenseeritud tooni.
predistortion.wizard.title = DAC-i eelmoonutus
predistortion.averages = Keskmisi, n
predistortion.averages.tooltip = FFT keskmisi vooru kohta (miinimum 10).  Iga voor keskmistab nii palju kaadreid, kasvades võrdeliselt moonutuse langusega koondumise käigus.  Silmus töötab, kuni vajutad Peata.
predistortion.targetThd = Siht-THD, %
predistortion.targetThd.tooltip = Peatu, kui THD jõuab selle väärtuseni (0 = töötab, kuni seiskub)
predistortion.table.metric = Mõõtmine
predistortion.table.value = Väärtus
predistortion.intro = KOHUSTUSLIK: aseta mõõdetava seadme ja ADC vahele passiivne kaksik-T sälkfilter, häälestatud põhitoonile.  Ilma selleta määrab põhja ADC enda harmoonilised ja silmus kompenseerib lõpuks ADC-d, mitte DAC-i.\nSee viib DAC-i jääkmoonutuse alla, eelmoonutades generaatorit selle vastandiga, mida ta mõõdab.\nKuidas see töötab — 1) see lukustab tooni FFT bini ja ootab joondumist;  2) iga voor keskmistab allpool määratud arvu FFT kaadreid, loeb siinuse harmoonilised (või kahetooni intermodulatsiooniproduktid) ja söödab generaatorile tagasi võrdse ja vastassuunalise korrektsiooni;  3) see kordub — keskmistades rohkem kaadreid, kui moonutus langeb — diagramm langeb mürapõhja poole, kuni siht-moonutus on saavutatud või edenemine seiskub.\nViisard käitab FFT-d lõputus koherentses keskmistamises, põhitoon võetakse generaatorist ja FLL on sees; sügavaima põhja jaoks kasuta HFT248D akent ja jäta võrgu summutus välja.  Kasuta puhast signaali paar dB alla täisskaala ja põhitooni bini lukustatuna — seejärel salvesta .dpd ja rakenda see.
