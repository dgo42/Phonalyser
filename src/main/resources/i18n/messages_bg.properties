fft.settings.alignGen = Подравни генератора
fft.settings.alignGen.tooltip = Насочва генератора точно към центъра на FFT бина. None го оставя свободен; FLL затваря честотно-заключваща примка. Изисква прихващане към бин и основен тон от генератора да са включени.
fft.settings.coherent = Кохерентно осредняване
fft.settings.coherent.tooltip = Фазово подравнява основния тон на всеки кадър преди усредняване, така че тонът се натрупва, докато шумът се самозаличава — много по-ниско ниво на шума, но изисква стабилен тон. Изключено = обикновено усредняване по мощност.

