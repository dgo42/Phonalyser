# ===== TIP OF THE DAY =====

tip.dialog.heading = Съвет на деня
tip.dialog.dontShowAgain = Да не се показва повече
tip.dialog.next = Следващ съвет
tip.dialog.close = Затвори
tip.dialog.closeCountdown = Затвори ({0} с)
tip.count = 14
tip.1.title = Кохерентното усредняване копае далеч под нивото на шума.
tip.1.body = Оставете кохерентното (комплексно) усредняване включено и оставете FFT да работи — тонът се натрупва, докато шумът частично се самозаличава, така че нивото на шума продължава да спада, колкото по-дълго чакате.
tip.2.title = Прихванете генератора към FFT бин за чист спектър.
tip.2.body = С включено „Прихващане на честотата към най-близкия“ тонът попада точно върху бин, така че изтичането не размазва основния тон и оценките на хармониците остават коректни.
tip.3.title = Фиксирайте основния тон ръчно при twin-T нотч.
tip.3.body = Пасивен twin-T нул е толкова стръмен, че няколко десети от херца термичен дрейф разклащат де-вградения основен тон. Въведете нивото, което реално знаете, чрез „Ръчен основен тон“; хармониците, разположени на полегатия склон, се де-вграждат добре.
tip.4.title = WASAPI ексклузивният режим запазва измерването побитово точно.
tip.4.body = Ексклузивният режим предава устройството директно на Phonalyser, заобикаляйки миксера на Windows и неговия преобразувател на честотата на дискретизация — без скрито предискретизиране, което да оцвети резултата.
tip.5.title = WDM-KS дава на осцилоскопа най-много кадри в секунда.
tip.5.body = За най-бързо опресняване на живия осцилоскоп изберете бекенда WDM-KS в Настройки — той е разположен по-ниско от WASAPI и подава повече блокове за заснемане в секунда.
tip.6.title = Колелцето на мишката мащабира около курсора.
tip.6.body = Във всеки изглед на трасе: колелцето движи вертикално, Shift+колелце — хоризонтално, Ctrl+колелце мащабира вертикалната ос, а Ctrl+Shift+колелце — хоризонталната — и двете мащабирания задържат стойността под показалеца фиксирана.
tip.7.title = Всяко числово поле приема единици, колелцето и клавиатурата.
tip.7.body = Въведете стойност с нейната единица (µV, 1.5 V, -3 dBV, 2 kHz), завъртете колелцето, щракнете стрелките нагоре/надолу или натиснете клавишите нагоре/надолу за стъпка.
tip.8.title = Sinc интерполацията има значение само когато сте увеличили мащаба.
tip.8.body = Превключвателят Sin/Lin променя трасето само когато точките на дискретизация са на няколко пиксела една от друга на екрана; иначе правите линии изглеждат еднакво и струват по-малко CPU. Включете го, щом отделните отчети станат видими.
tip.9.title = Хистерезисът стабилизира тригера при слаб, шумен сигнал.
tip.9.body = Без него шумът около нивото на тригера предизвиква порой от фалшиви тригери и трасето трепти. Включете хистерезис на тригера и трасето се заключва.
tip.10.title = Записаният сигнал от генератора е перфектен еталон.
tip.10.body = „Запиши в...“ записва идеалната, математически точна форма на вълната — без изкривяване от DAC, усилвател или окабеляване. Подайте я към друг уред и всяко несъвършенство, което измерите, принадлежи на това устройство, а не на източника.
tip.11.title = Де-вградете приспособление чрез калибрационен файл.
tip.11.body = Измерете нотч, атенюатор или отклика на звукова карта веднъж в модула Честотен отклик, после заредете този .frc във FFT анализатора: неговият отклик се дели при показване, така че таблицата показва тестваното устройство.
tip.12.title = Наслагването на реконструирания биещ тон укротява близка двутонова двойка.
tip.12.body = В двутонов режим наслагването „Реконструиран биещ тон“ на осцилоскопа чертае бавната обвивка |f1 - f2|, така че можете да тригерирате по биещия тон вместо да гоните бързите пресичания на носещата.
tip.13.title = Свипът за честотен отклик е сам по себе си еталон.
tip.13.body = Свипнатото измерване се деконволюира спрямо точния свип, който е бил възпроизведен — не спрямо повторно измерено копие — така че възстановените амплитуда и фаза са истинската предавателна функция на устройството.
tip.14.title = Ctrl+F1 скача директно към правилната помощ.
tip.14.body = Натиснете F1 навсякъде за ръководството или Ctrl+F1, за да отворите помощта точно на раздела за контрола, която в момента е на фокус.

