preferences.freqResp.notch.enable.tooltip = Когато е включено, изгледът FreqResp интерполира през всеки хармоник на избраната мрежова честота (50/60 Hz) — премахва пиковете на мрежовия фон от показания отклик без повторно измерване.
preferences.freqResp.notch.baseHz = Индустриална честота
preferences.freqResp.notch.baseHz.tooltip = Базова честота, чиито хармоници (50, 100, 150, … Hz или 60, 120, 180, …) се изрязват с нотч, когато квадратчето по-горе е включено.
preferences.freqResp.signalColor = Цвят на сигнала
preferences.freqResp.phaseColor = Цвят на фазата
preferences.freqResp.referenceColor = Цвят на еталона (RIAA)
preferences.freqResp.backgroundColor = Цвят на фона на графиката

