# ---- Warnings
fft.warning.rejection = ⚠ Отхвърляне на кадри — заснемането се забави
fft.warning.rejection.rInvariant = Отхвърляне на кадри: {0} от {1} кадъра отхвърлени (макс. |R−A|/A = {2} %).\nИзползва се най-дългият чист сегмент; сходимостта на заснемането се забави.
fft.warning.rejection.phase = Отхвърляне по фазова кохерентност: {0} от {1} кадъра отхвърлени (макс. отклонение {2}°).\nВероятно подизвадково отпадане; сходимостта на заснемането се забави.
fft.warning.overrun = ⚠ Препълване на буфера — повторно синхронизирано
fft.warning.overrun.tip = Анализаторът изостана с цял буфер за заснемане, така че прозорецът беше пренасочен към живия връх и усредняването продължава (пропуск в покритието — без повредени данни).\nЧести препълвания означават, че анализът не успява да насмогне; намалете припокриването или дължината на FFT.
fft.warning.discontinuity = ⚠ Прекъсване на сигнала — повторно синхронизирано
fft.warning.discontinuity.tip = Анализаторът откри прекъсване в заснетия сигнал (нарушаващ лентовото ограничение смут / отпаднали отчети), отхвърли засегнатия прозорец и се синхронизира повторно, така че кохерентното усредняване продължава.\nЧести прекъсвания означават, че източникът или заснемането прекъсват под натоварване.
fft.warning.alignDrift = ⚠ Нивото се измести по време на подравняване — статистиката е нулирана
fft.warning.alignDrift.tip = Нивото на основния тон се промени с {0} dB, докато честотното заключване изтегляше генератора към мрежата на FFT биновете.\nТекущото усреднение все още съдържа кадри отпреди подравняването на старото ниво — щракнете Нулиране на статистиката, за да съберете чисто усреднение.

# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Измерва и прилага предизкривяване на DAC.\nЗаключва тона към FFT бин, после на всеки кръг усреднява зададения брой FFT кадри, отчита хармониците на синуса (или интермодулационните продукти на двутоновия сигнал) и подава равна и противоположна корекция обратно към генератора — повтаряйки, докато изкривяването достигне целта ви или спре да се подобрява.\nЦел: да свали изкривяването към нивото на шума; Запишете .dpd файла и го Приложете, за да запазите компенсирания тон.
predistortion.wizard.title = Предизкривяване на DAC
predistortion.averages = Осреднявания, n
predistortion.averages.tooltip = FFT осреднявания на кръг (минимум 10). Всеки кръг усреднява толкова кадри, нарастващи пропорционално на спада на изкривяването при сходимостта. Цикълът работи, докато натиснете Стоп.
predistortion.targetThd = Целево THD, %
predistortion.targetThd.tooltip = Спира, щом THD достигне тази стойност (0 = работи, докато спре да се подобрява)
