predistortion.table.value = Стойност
predistortion.intro = ЗАДЪЛЖИТЕЛНО: поставете пасивен twin-T нотч филтър, настроен на основния тон, между тестваното устройство и ADC. Без него собствените хармоници на ADC задават нивото и цикълът в крайна сметка компенсира ADC, а не DAC.\nТова сваля остатъчното изкривяване на DAC, като предизкривява генератора с обратното на това, което измерва.\nКак работи — 1) заключва тона върху FFT бин и изчаква подравняване;  2) на всеки кръг усреднява броя FFT кадри, зададен по-долу, отчита хармониците на синуса (или интермодулационните продукти на двутоновия сигнал) и подава равна и противоположна корекция обратно към генератора;  3) повтаря — усреднявайки повече кадри, докато изкривяването спада — графиката пада към нивото на шума, докато целевото изкривяване бъде достигнато или напредъкът спре.\nСъветникът изпълнява FFT в безкрайно кохерентно усредняване с основния тон, взет от генератора, и включен FLL; за най-ниско ниво на шума използвайте прозореца HFT248D и оставете потискането на мрежата изключено. Използвайте чист сигнал няколко dB под пълна скала и основния тон прихванат към бин — после Запишете .dpd файла и го Приложете.
