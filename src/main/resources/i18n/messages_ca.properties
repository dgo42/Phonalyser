# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Consell del dia
tip.dialog.dontShowAgain = No ho tornis a mostrar
tip.dialog.next          = Consell següent
tip.dialog.close         = Tanca
tip.dialog.closeCountdown = Tanca ({0} s)
tip.count = 14
tip.1.title = La mitjana coherent excava molt per sota del soroll de fons.
tip.1.body  = Deixa activada la mitjana coherent (complexa) i deixa córrer la FFT: el to se suma mentre el soroll es cancel·la parcialment, de manera que el soroll de fons continua baixant com més estona esperis.
tip.2.title = Ajusta el generador a una banda de la FFT per obtenir un espectre net.
tip.2.body  = Amb "Ajusta la freqüència a la més propera" activat, el to cau exactament sobre una banda, de manera que la fuita no escampa el fonamental i les estimacions dels harmònics es mantenen fiables.
tip.3.title = Fixa el fonamental a mà en una osca twin-T.
tip.3.body  = Un null passiu twin-T és tan abrupte que unes poques dècimes de hertz de deriva tèrmica fan oscil·lar el fonamental des-incrustat. Introdueix el nivell que realment coneixes amb "Fonamental manual"; els harmònics, sobre el flanc suau, es des-incrusten bé.
tip.4.title = El mode exclusiu de WASAPI manté la mesura exacta a nivell de bit.
tip.4.body  = El mode exclusiu lliura el dispositiu directament a Phonalyser, evitant el mesclador de Windows i el seu convertidor de freqüència de mostreig: cap remostratge ocult que tinti el resultat.
tip.5.title = WDM-KS dóna a l'oscil·loscopi el màxim de fotogrames per segon.
tip.5.body  = Per al refresc en viu més ràpid de l'oscil·loscopi, tria el backend WDM-KS a les Preferències: se situa més avall que WASAPI i empeny més blocs de captura per segon.
tip.6.title = La roda del ratolí amplia al voltant del cursor.
tip.6.body  = En qualsevol vista de traça: la roda es mou verticalment, Maj+roda horitzontalment, Ctrl+roda amplia l'eix vertical i Ctrl+Maj+roda l'horitzontal; ambdues ampliacions mantenen fix el valor sota el punter.
tip.7.title = Cada camp numèric accepta unitats, la roda i el teclat.
tip.7.body  = Escriu un valor amb la seva unitat (µV, 1.5 V, -3 dBV, 2 kHz), fes girar la roda, fes clic a les fletxes amunt/avall o prem les tecles amunt/avall del teclat per avançar pas a pas.
tip.8.title = La interpolació sinc només importa quan estàs ampliat.
tip.8.body  = El commutador Sin/Lin canvia la traça només quan els punts de mostra estan a un parell de píxels de distància a la pantalla; altrament les línies rectes semblen idèntiques i costen menys CPU. Activa'l un cop les mostres individuals siguin visibles.
tip.9.title = La histèresi estabilitza el dispar en un senyal feble i sorollós.
tip.9.body  = Sense ella, el soroll al voltant del nivell de dispar provoca una allau de disparaments falsos i la traça tremola. Activa la histèresi de dispar i la traça es bloqueja.
tip.10.title = Un senyal de generador desat és una referència perfecta.
tip.10.body  = "Desa a..." escriu la forma d'ona ideal, matemàticament exacta: sense distorsió de DAC, amplificador ni cablejat. Alimenta-la a un altre instrument i qualsevol imperfecció que mesuris pertany a aquell dispositiu, no a la font.
tip.11.title = Des-incrusta un muntatge amb un fitxer de calibratge.
tip.11.body  = Mesura una osca, un atenuador o la resposta d'una targeta de so un cop al mòdul de Resposta en freqüència, i després carrega aquell .frc a l'analitzador FFT: la seva resposta es divideix en el moment de mostrar-la, de manera que la taula mostra el dispositiu sota prova.
tip.12.title = La superposició del batec reconstruït domestica una parella de dos tons propers.
tip.12.body  = En mode de doble to, la superposició "Batec reconstruït" de l'oscil·loscopi dibuixa l'envolupant lenta |f1 - f2|, de manera que pots disparar sobre el batec en lloc de perseguir els ràpids encreuaments de la portadora.
tip.13.title = El escombrat de resposta en freqüència és la seva pròpia referència.
tip.13.body  = La mesura escombrada es desconvoluciona contra l'escombrat exacte que es va reproduir, no contra una còpia tornada a mesurar, de manera que la magnitud i la fase recuperades són la funció de transferència real del dispositiu.
tip.14.title = Ctrl+F1 salta directament a l'ajuda adequada.
tip.14.body  = Prem F1 a qualsevol lloc per obrir el manual, o Ctrl+F1 per obrir l'ajuda a la secció exacta del control que té el focus actualment.

