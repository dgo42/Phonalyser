fft.warning.overrun = ⚠ Desbordament de memòria intermèdia — resincronitzat
fft.warning.overrun.tip = L'analitzador va quedar tota una memòria intermèdia de captura enrere, de manera que la finestra es va reancorar a la punta en viu i la mitjana continua (un buit de cobertura; cap dada corrupta).\nDesbordaments freqüents signifiquen que l'anàlisi no pot seguir el ritme; abaixeu la superposició o la longitud de la FFT.
fft.warning.discontinuity = ⚠ Discontinuïtat de senyal — resincronitzat
