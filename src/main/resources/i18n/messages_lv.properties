# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Dienas padoms
tip.dialog.dontShowAgain = Vairs nerādīt
tip.dialog.next          = Nākamais padoms
tip.dialog.close         = Aizvērt
tip.dialog.closeCountdown = Aizvērt ({0} s)
tip.count = 14
tip.1.title = Koherentā vidējošana sniedzas dziļi zem trokšņu līmeņa.
tip.1.body  = Atstājiet koherento (kompleksu) vidējošanu ieslēgtu un ļaujiet FFT darboties — tonis summējas, kamēr troksnis daļēji izdziest, tāpēc līmenis turpina krist, jo ilgāk gaidāt.
tip.2.title = Piesaistiet ģeneratoru FFT joslai, lai iegūtu tīru spektru.
tip.2.body  = Ja ieslēgts "Piesaistīt frekvenci tuvākajai", tonis precīzi nokļūst joslā, tāpēc noplūde neizsmērē pamatfrekvenci un harmoniku novērtējumi paliek godīgi.
tip.3.title = Fiksējiet pamatfrekvenci ar roku uz divkāršā T iegriezuma filtra.
tip.3.body  = Pasīvs divkāršā T nulles punkts ir tik stāvs, ka dažu hercu desmitdaļu termiskā nobīde izmaina deembedēto pamatfrekvenci. Ievadiet līmeni, ko patiešām zināt, ar "Manuāla pamatfrekvence"; harmonikas uz maigā slīpuma deembedējas labi.
tip.4.title = WASAPI ekskluzīvais režīms saglabā mērījumu bitu precīzu.
tip.4.body  = Ekskluzīvais režīms nodod ierīci tieši Phonalyser, apejot Windows mikseri un tā nolases biežuma pārveidotāju — nav slēptas pārdiskretizācijas, kas iekrāsotu rezultātu.
tip.5.title = WDM-KS oscilogrāfam dod visvairāk kadru sekundē.
tip.5.body  = Ātrākajai dzīvajai oscilogrāfa atsvaidzināšanai izvēlieties WDM-KS aizmugursistēmu iestatījumos — tā atrodas zemāk par WASAPI un nodod vairāk uztveršanas bloku sekundē.
tip.6.title = Peles ritenītis tuvina ap kursoru.
tip.6.body  = Jebkurā līknes skatā: ritenītis pārvieto vertikāli, Shift+ritenītis horizontāli, Ctrl+ritenītis tuvina vertikālo asi un Ctrl+Shift+ritenītis horizontālo — abas tuvināšanas saglabā vērtību zem rādītāja nemainīgu.
tip.7.title = Katrs skaitliskais lauks pieņem mērvienības, ritenīti un tastatūru.
tip.7.body  = Ierakstiet vērtību ar tās mērvienību (µV, 1.5 V, -3 dBV, 2 kHz), griežiet ritenīti, klikšķiniet augšup/lejup bultiņas vai spiediet tastatūras augšup/lejup taustiņus, lai mainītu soli.
tip.8.title = Sinc interpolācijai ir nozīme tikai tad, kad esat tuvinājis.
tip.8.body  = Sin/Lin slēdzis maina līkni tikai tad, kad nolases punkti uz ekrāna atrodas pāris pikseļu attālumā; pretējā gadījumā taisnas līnijas izskatās identiskas un maksā mazāk CPU. Ieslēdziet to, tiklīdz ir redzami atsevišķi nolases punkti.
tip.9.title = Histerēze stabilizē trigeru uz vāja, trokšņaina signāla.
tip.9.body  = Bez tās troksnis ap trigera līmeni izsauc kļūdainu trigeru gūzmu un līkne raustās. Iespējojiet trigera histerēzi, un līkne nofiksējas.
tip.10.title = Saglabāts ģeneratora signāls ir ideāla atsauce.
tip.10.body  = "Saglabāt kā..." ieraksta ideālu, matemātiski precīzu viļņa formu — bez DAC, pastiprinātāja vai vadu kropļojumiem. Padodiet to citam instrumentam, un jebkura jūsu izmērītā nepilnība pieder tai ierīcei, nevis avotam.
tip.11.title = Deembedējiet ierīci ar kalibrācijas failu.
tip.11.body  = Vienreiz izmēriet iegriezuma, slāpētāja vai skaņas kartes raksturlīkni frekvenču raksturlīknes modulī, pēc tam ielādējiet to .frc FFT analizatorā: tā raksturlīkne tiek izdalīta attēlošanas laikā, tāpēc tabula rāda testējamo ierīci.
tip.12.title = Rekonstruētā sitiena pārklājums savalda tuvu divtoņu pāri.
tip.12.body  = Divtoņu režīmā oscilogrāfa "Rekonstruētais sitiens" pārklājums zīmē lēno |f1 - f2| apvalku, tāpēc varat trigerēt pēc sitiena, nevis dzīties pakaļ ātrajiem nesēja šķērsojumiem.
tip.13.title = Frekvenču raksturlīknes svīpings ir pats sava atsauce.
tip.13.body  = Svīpinga mērījums tiek dekonvolūts pret precīzu nospēlēto svīpingu — nevis pārmērītu kopiju — tāpēc atgūtais magnitūdas un fāzes raksturojums ir ierīces patiesā pārejas funkcija.
tip.14.title = Ctrl+F1 nogādā tieši pie pareizās palīdzības.
tip.14.body  = Jebkur nospiediet F1, lai atvērtu rokasgrāmatu, vai Ctrl+F1, lai atvērtu palīdzību tieši tajā sadaļā par vadīklu, kurai pašlaik ir fokuss.

