# ===== TIP OF THE DAY =====

tip.dialog.heading = Leid an lae
tip.dialog.dontShowAgain = Ná taispeáin arís
tip.dialog.next = An chéad leid eile
tip.dialog.close = Dún
tip.dialog.closeCountdown = Dún ({0}s)
tip.count = 14
tip.1.title = Tochlaíonn an meánú comhleanúnach i bhfad faoin urlár torainn.
tip.1.body = Fág an meánú comhleanúnach (coimpléascach) air agus lig don FFT rith — suimíonn an ton suas agus an torann ag cealú go páirteach, mar sin leanann an t-urlár ag titim a fhad is a fhanann tú.
tip.2.title = Léim an gineadóir go binn FFT le haghaidh speictrim ghlain.
tip.2.body = Le "Léim an mhinicíocht go dtí an ceann is gaire" air, tuirlingíonn an ton go díreach ar bhinn, mar sin ní smearann sceitheadh an bhuntonadh agus fanann meastacháin na harmonach ionraic.
tip.3.title = Greamaigh an buntonadh de láimh ar mhaolaire twin-T.
tip.3.body = Tá maolaire twin-T éighníomhach chomh géar sin go n-aistríonn cúpla deichiú heirts d'fhuaradh teirmeach an buntonadh dí-leabaithe. Cuir isteach an leibhéal a bhfuil aithne agat air le "Buntonadh láimhe"; dí-leabaíonn na harmonaigh, ar an leiceann réidh, go breá.
tip.4.title = Coinníonn mód eisiach WASAPI an tomhas beacht-ghiotach.
tip.4.body = Tugann an mód eisiach an gléas díreach do Phonalyser, ag seachaint meascthóir Windows agus a thiontaire ráta samplála — gan athshamplú folaithe le dath a chur ar an toradh.
tip.5.title = Tugann WDM-KS an méid is mó frámaí sa soicind don oscilloscóp.
tip.5.body = Le haghaidh an athnuachan scóip bheo is tapúla, roghnaigh an inneall cúil WDM-KS sna Sainroghanna — suíonn sé níos ísle ná WASAPI agus brúnn sé níos mó bloic ghabhála sa soicind.
tip.6.title = Súmálann roth na luiche timpeall an chúrsóra.
tip.6.body = In aon amharc rianta: bogann an roth go hingearach, Shift+roth go cothrománach, Ctrl+roth súmálann an t-ais ingearach agus Ctrl+Shift+roth an ceann cothrománach — coinníonn an dá shúmáil an luach faoin bpointeoir socair.
tip.7.title = Glacann gach réimse uimhriúil aonaid, an roth, agus an méarchlár.
tip.7.body = Clóscríobh luach lena aonad (µV, 1.5 V, -3 dBV, 2 kHz), scrollaigh an roth, cliceáil na saigheada suas/síos, nó brúigh eochracha suas/síos an mhéarchláir le céimniú.
tip.8.title = Ní bhíonn idirshuíomh sinc tábhachtach ach amháin nuair atá tú súmáilte isteach.
tip.8.body = Athraíonn an lasc Sin/Lin an rian ach amháin nuair atá pointí samplála cúpla picteilín óna chéile ar an scáileán; murab amhlaidh tá línte díreacha mar an gcéanna agus costas níos lú LAP. Cuir air é nuair atá samplaí aonair le feiceáil.
tip.9.title = Cobhsaíonn histéiréis an truicear ar chomhartha lag torannach.
tip.9.body = Gan é, scaoileann torann timpeall leibhéal an truicir raidhse truicear bréagacha agus crathann an rian. Cumasaigh histéiréis truicir agus glasálann an rian.
tip.10.title = Is tagairt fhoirfe é comhartha gineadóra sábháilte.
tip.10.body = Scríobhann "Sábháil go..." an tonnchruth idéalach atá beacht ó thaobh na matamaitice — gan saobhadh DAC, aimplitheoir nó cáblaithe. Cuir chuig ionstraim eile é agus baineann aon neamhfhoirfeacht a thomhaiseann tú leis an ngléas sin, ní leis an bhfoinse.
tip.11.title = Dí-leabaigh feistis le comhad calabraithe.
tip.11.body = Tomhais freagairt maolaire, maolaitheora nó cárta fuaime uair amháin sa mhodúl Freagairt-mhinicíochta, ansin luchtaigh an .frc sin isteach san anailíseoir FFT: roinntear a fhreagairt amach ag am taispeána, mar sin taispeánann an tábla an gléas atá á thástáil.
tip.12.title = Ceansaíonn an forleagan buille atógtha péire dlúth dhá thon.
tip.12.body = I mód dhá thon tarraingíonn forleagan "Buille atógtha" an scóip an clúdach mall |f1 - f2|, mar sin is féidir leat truiceáil ar an mbuille in ionad a bheith ag tóraíocht na dtrasnuithe iompróra gasta.
tip.13.title = Is í freagairt-mhinicíochta an scuabtha a tagairt féin.
tip.13.body = Dí-chomhshúitear an tomhas scuabtha in aghaidh an scuabtha bheacht a seinneadh — ní cóip aththomhaiste — mar sin is é feidhm aistrithe fíor an ghléis an mhéid agus an phas a aisghabhtar.
tip.14.title = Léimeann Ctrl+F1 caol díreach chuig an gcabhair cheart.
tip.14.body = Brúigh F1 áit ar bith le haghaidh an lámhleabhair, nó Ctrl+F1 chun an chabhair a oscailt ag an gcuid bheacht don rialú a bhfuil fócas air faoi láthair.

