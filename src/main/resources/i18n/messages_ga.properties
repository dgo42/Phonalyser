# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Tomhais agus cuir réamhshaobhadh DAC i bhfeidhm.\nGlasálann sé an ton ar bhinn FFT, ansin meánaíonn gach babhta an líon socraithe frámaí FFT, léann sé harmonaigh an tsínis (nó táirgí idirmhodhnaithe an dá thon), agus cothaíonn sé ceartú comhionann codarsnach ar ais chuig an ngineadóir — ag athrá go dtí go sroicheann an saobhadh do sprioc nó go stopann sé ag feabhsú.\nSprioc: tiomáin an saobhadh anuas i dtreo an urláir torainn; Sábháil an .dpd agus Cuir i bhFeidhm é chun an ton cúitithe a choinneáil.
predistortion.wizard.title = Réamhshaobhadh DAC
predistortion.averages = Meánacháin, n
predistortion.averages.tooltip = Meánacháin FFT in aghaidh an bhabhta (íosmhéid 10).  Meánaíonn gach babhta an oiread seo frámaí, ag fás i gcomhréir le titim an tsaobhaidh agus é ag cóineasú.  Ritheann an lúb go dtí go mbrúnn tú Stop.
predistortion.targetThd = Sprioc-THD, %
predistortion.targetThd.tooltip = Stop a luaithe a shroicheann an THD an luach seo (0 = rith go dtí go stadann sé)
predistortion.table.metric = Tomhas
predistortion.table.value = Luach
predistortion.intro = ÉIGEANTACH: cuir scagaire maolaire twin-T éighníomhach, tiúnta don bhunúsach, idir an gléas atá á thástáil agus an ADC.  Gan é socraíonn harmonaigh féin an ADC an t-urlár agus críochnaíonn an lúb ag cúiteamh an ADC, ní an DAC.\nTiomáineann seo saobhadh iarmharach an DAC anuas trí réamhshaobhadh a chur ar an ngineadóir le hinbhéartú a thomhaiseann sé.\nConas a oibríonn sé — 1) glasálann sé an ton ar bhinn FFT agus fanann sé le hailíniú;  2) meánaíonn gach babhta an líon frámaí FFT atá socraithe thíos, léann sé harmonaigh an tsínis (nó táirgí idirmhodhnaithe an dá thon), agus cothaíonn sé ceartú comhionann codarsnach ar ais chuig an ngineadóir;  3) athríonn sé — ag meánú níos mó frámaí de réir mar a thiteann an saobhadh — an chairt ag titim i dtreo an urláir torainn, go dtí go sroichtear an sprioc-saobhadh nó go stadann an dul chun cinn.\nRitheann an draoi an FFT i meánú comhleanúnach gan teorainn leis an mbunúsach tógtha ón ngineadóir agus an FLL air; le haghaidh an urláir is doimhne úsáid an fhuinneog HFT248D agus fág sochtadh an phríomhlíonra as.  Úsáid comhartha glan cúpla dB faoi lánscála agus an bunúsach greamaithe do bhinn — ansin Sábháil an .dpd agus Cuir i bhFeidhm é.
