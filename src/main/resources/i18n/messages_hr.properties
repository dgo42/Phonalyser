# ===== TIP OF THE DAY =====

tip.dialog.heading = Savjet dana
tip.dialog.dontShowAgain = Ne prikazuj ponovno
tip.dialog.next = Sljedeći savjet
tip.dialog.close = Zatvori
tip.dialog.closeCountdown = Zatvori ({0}s)
tip.count = 14
tip.1.title = Koherentno usrednjavanje doseže daleko ispod razine šuma.
tip.1.body = Ostavite koherentno (kompleksno) usrednjavanje uključeno i pustite FFT da radi — ton se zbraja dok se šum djelomično poništava, pa razina pada što dulje čekate.
tip.2.title = Prikvačite generator na FFT spremnik za čist spektar.
tip.2.body = Uz uključeno "Prikvači frekvenciju na najbliži", ton pada točno na spremnik, pa curenje ne razmazuje osnovni harmonik i procjene harmonika ostaju vjerodostojne.
tip.3.title = Ručno fiksirajte osnovni harmonik na twin-T notch filtru.
tip.3.body = Pasivni twin-T nul-prijenos toliko je strm da nekoliko desetinki herca toplinskog odmaka pomakne deugrađeni osnovni harmonik. Unesite razinu koju stvarno znate uz "Ručni osnovni harmonik"; harmonici, na blagom boku, deugrađuju se bez problema.
tip.4.title = WASAPI ekskluzivni način zadržava mjerenje bit-egzaktnim.
tip.4.body = Ekskluzivni način predaje uređaj izravno Phonalyseru, zaobilazeći Windows mikser i njegov pretvarač uzorkovne frekvencije — bez skrivenog preuzorkovanja koje bi obojilo rezultat.
tip.5.title = WDM-KS daje osciloskopu najviše sličica u sekundi.
tip.5.body = Za najbrže osvježavanje živog osciloskopa, odaberite WDM-KS pozadinu u Postavkama — leži niže od WASAPI-ja i gura više blokova snimanja u sekundi.
tip.6.title = Kotačić miša zumira oko pokazivača.
tip.6.body = U bilo kojem prikazu traga: kotačić pomiče okomito, Shift+kotačić vodoravno, Ctrl+kotačić zumira okomitu os, a Ctrl+Shift+kotačić vodoravnu — oba zumiranja drže vrijednost ispod pokazivača fiksnom.
tip.7.title = Svako numeričko polje prima jedinice, kotačić i tipkovnicu.
tip.7.body = Upišite vrijednost s njenom jedinicom (µV, 1.5 V, -3 dBV, 2 kHz), zakotrljajte kotačić, kliknite strelice gore/dolje ili pritisnite tipke gore/dolje na tipkovnici za korak.
tip.8.title = Sinc interpolacija bitna je samo kad ste zumirani.
tip.8.body = Sin/Lin prekidač mijenja trag samo kad su točke uzorka udaljene nekoliko piksela na zaslonu; inače ravne linije izgledaju jednako i troše manje CPU-a. Uključite ga kad pojedinačni uzorci postanu vidljivi.
tip.9.title = Histereza stabilizira okidač na slabom, šumnom signalu.
tip.9.body = Bez nje, šum oko razine okidanja izaziva navalu lažnih okidanja i trag titra. Omogućite histerezu okidača i trag se zaključa.
tip.10.title = Spremljeni signal generatora savršena je referenca.
tip.10.body = "Spremi u..." zapisuje idealni, matematički egzaktan val — bez distorzije DAC-a, pojačala ili kablova. Pošaljite ga drugom instrumentu i svaka nesavršenost koju izmjerite pripada tom uređaju, a ne izvoru.
tip.11.title = Deugradite mjerni sklop kalibracijskom datotekom.
tip.11.body = Izmjerite notch, atenuator ili odziv zvučne kartice jednom u modulu Frekvencijski odziv, zatim učitajte taj .frc u FFT analizator: njegov odziv dijeli se van pri prikazu, pa tablica prikazuje uređaj koji se ispituje.
tip.12.title = Preklop rekonstruirane razlike obuzdava blizak par dvaju tonova.
tip.12.body = U dvotonskom načinu preklop osciloskopa "Rekonstruirana razlika" crta sporu ovojnicu |f1 - f2|, pa možete okidati na razlici umjesto da jurite za brzim prolascima nosioca.
tip.13.title = Frekvencijski sweep sam je sebi referenca.
tip.13.body = Sweep mjerenje dekonvoluira se prema točno onom sweepu koji je odsviran — ne prema ponovno izmjerenoj kopiji — pa su oporavljena amplituda i faza prava prijenosna funkcija uređaja.
tip.14.title = Ctrl+F1 skače ravno na pravu pomoć.
tip.14.body = Pritisnite F1 bilo gdje za priručnik, ili Ctrl+F1 za otvaranje pomoći na točnom odjeljku za kontrolu koja trenutno ima fokus.

