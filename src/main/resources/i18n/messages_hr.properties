# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Izmjeri i primijeni DAC predistorziju.\nZaključa ton na FFT spremnik, zatim svaki krug usrednjava zadani broj FFT okvira, čita harmonike sinusa (ili intermodulacijske produkte dvotonskog signala) i šalje jednaku i suprotnu korekciju natrag generatoru — ponavljajući dok izobličenje ne dosegne vaš cilj ili prestane padati.\nCilj: spustiti izobličenje prema razini šuma; spremite .dpd i primijenite ga (Apply) da zadržite kompenzirani ton.
predistortion.wizard.title = DAC predistorzija
predistortion.averages = Prosjeci, n
predistortion.averages.tooltip = FFT prosjeci po krugu (minimalno 10).  Svaki krug usrednjava ovoliko okvira, rastući razmjerno padu izobličenja kako konvergira.  Petlja radi dok ne pritisnete Stop.
predistortion.targetThd = Ciljni THD, %
predistortion.targetThd.tooltip = Zaustavi se kad THD dosegne ovu vrijednost (0 = radi dok ne stane)
predistortion.table.metric = Mjerenje
predistortion.table.value = Vrijednost
predistortion.intro = OBAVEZNO: postavite pasivni twin-T notch filtar, ugođen na osnovni harmonik, između uređaja koji se ispituje i ADC-a.  Bez njega vlastiti harmonici ADC-a postavljaju razinu i petlja na kraju kompenzira ADC, a ne DAC.\nOvo spušta zaostalo izobličenje DAC-a predistorzijom generatora inverzom onoga što izmjeri.\nKako radi — 1) zaključa ton na FFT spremnik i čeka poravnanje;  2) svaki krug usrednjava niže postavljeni broj FFT okvira, čita harmonike sinusa (ili intermodulacijske produkte dvotonskog signala) i šalje jednaku i suprotnu korekciju natrag generatoru;  3) ponavlja — usrednjavajući više okvira kako izobličenje pada — graf pada prema razini šuma, dok se ne dosegne ciljno izobličenje ili napredak ne stane.\nČarobnjak vodi FFT u beskonačnom koherentnom usrednjavanju s osnovnim harmonikom uzetim iz generatora i uključenim FLL-om; za najnižu razinu koristite prozor HFT248D i ostavite potiskivanje mreže isključeno.  Koristite čist signal nekoliko dB ispod pune skale i osnovni harmonik prikvačen na spremnik — zatim spremite .dpd i primijenite ga (Apply).
