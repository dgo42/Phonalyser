# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Tip dne
tip.dialog.dontShowAgain = Příště nezobrazovat
tip.dialog.next          = Další tip
tip.dialog.close         = Zavřít
tip.dialog.closeCountdown = Zavřít ({0} s)
tip.count = 14
tip.1.title = Koherentní průměrování proniká hluboko pod úroveň šumu.
tip.1.body  = Nechte koherentní (komplexní) průměrování zapnuté a FFT běžet — tón se sčítá, zatímco šum se částečně ruší, takže čím déle čekáte, tím více úroveň šumu klesá.
tip.2.title = Přichyťte generátor na FFT bin pro čisté spektrum.
tip.2.body  = Se zapnutou volbou „Přichytit frekvenci k nejbližší“ dopadne tón přesně na bin, takže prosakování nerozmazává základní harmonickou a odhady harmonických zůstávají poctivé.
tip.3.title = Připněte základní harmonickou ručně u dvojitého T notch filtru.
tip.3.body  = Pasivní dvojité T nulování je tak strmé, že několik desetin hertzu tepelného driftu rozhoupe vyextrahovanou základní harmonickou. Zadejte úroveň, kterou skutečně znáte, pomocí „Ruční základní harmonická“; harmonické na mírném boku se vyextrahují dobře.
tip.4.title = Exkluzivní režim WASAPI udržuje měření bitově přesné.
tip.4.body  = Exkluzivní režim předá zařízení přímo Phonalyseru a obejde mixér Windows i jeho převodník vzorkovacího kmitočtu — žádné skryté převzorkování, které by zkreslilo výsledek.
tip.5.title = WDM-KS poskytuje osciloskopu nejvíce snímků za sekundu.
tip.5.body  = Pro nejrychlejší obnovování živého osciloskopu zvolte v Předvolbách backend WDM-KS — leží níže než WASAPI a posílá více bloků záznamu za sekundu.
tip.6.title = Kolečko myši přibližuje kolem kurzoru.
tip.6.body  = V kterémkoli zobrazení průběhu: kolečko posouvá svisle, Shift+kolečko vodorovně, Ctrl+kolečko přibližuje svislou osu a Ctrl+Shift+kolečko vodorovnou — oba způsoby přibližení udržují hodnotu pod ukazatelem na místě.
tip.7.title = Každé číselné pole přijímá jednotky, kolečko i klávesnici.
tip.7.body  = Zadejte hodnotu s jednotkou (µV, 1.5 V, -3 dBV, 2 kHz), otočte kolečkem, klikněte na šipky nahoru/dolů nebo stiskněte klávesy nahoru/dolů pro krokování.
tip.8.title = Sinc interpolace má význam jen při přiblížení.
tip.8.body  = Přepínač Sin/Lin mění průběh jen tehdy, když jsou vzorkové body na obrazovce pár pixelů od sebe; jinak vypadají rovné čáry stejně a stojí méně CPU. Zapněte ji, jakmile jsou jednotlivé vzorky viditelné.
tip.9.title = Hystereze stabilizuje spouštění u slabého, zašuměného signálu.
tip.9.body  = Bez ní šum kolem úrovně spouštění vyvolá záplavu falešných spuštění a průběh poskakuje. Zapněte hysterezi spouštění a průběh se uzamkne.
tip.10.title = Uložený signál generátoru je dokonalá reference.
tip.10.body  = „Uložit do...“ zapíše ideální, matematicky přesný průběh — bez zkreslení DAC, zesilovače či kabeláže. Přiveďte jej do jiného přístroje a jakákoli nedokonalost, kterou naměříte, patří tomu zařízení, ne zdroji.
tip.11.title = Vyextrahujte přípravek pomocí kalibračního souboru.
tip.11.body  = Změřte notch, atenuátor nebo odezvu zvukové karty jednou v modulu Frekvenční odezva, poté načtěte ten .frc do FFT analyzátoru: jeho odezva se při zobrazení vydělí, takže tabulka ukazuje zkoumané zařízení.
tip.12.title = Překrytí rekonstruovaného zázněje zkrotí blízkou dvojici tónů.
tip.12.body  = V režimu dvou tónů kreslí překrytí „Rekonstruovaný zázněj“ na osciloskopu pomalou obálku |f1 - f2|, takže můžete spouštět na zázněj místo honby za rychlými průchody nosné.
tip.13.title = Sweep frekvenční odezvy je sám sobě referencí.
tip.13.body  = Rozmítané měření se dekonvoluuje proti přesnému sweepu, který byl přehrán — ne proti znovu naměřené kopii — takže získaná amplituda a fáze jsou skutečnou přenosovou funkcí zařízení.
tip.14.title = Ctrl+F1 skočí přímo na správnou nápovědu.
tip.14.body  = Stiskněte F1 kdekoli pro příručku nebo Ctrl+F1 pro otevření nápovědy přesně u sekce pro ovládací prvek, který má právě fokus.

