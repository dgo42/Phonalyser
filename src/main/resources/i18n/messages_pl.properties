# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Zmierz i zastosuj predystorsję DAC.\nPrzyciąga ton do prążka FFT, a następnie w każdej rundzie uśrednia ustawioną liczbę ramek FFT, odczytuje harmoniczne sinusa (lub produkty intermodulacji tonu dwuskładnikowego) i przekazuje równą i przeciwną korekcję z powrotem do generatora — powtarzając, aż zniekształcenia osiągną cel lub przestaną się poprawiać.\nCel: zepchnąć zniekształcenia w stronę poziomu szumu; zapisz plik .dpd i zastosuj go, aby zachować skompensowany ton.
predistortion.wizard.title = Predystorsja DAC
predistortion.averages = Uśrednienia, n
predistortion.averages.tooltip = Uśrednienia FFT na rundę (minimum 10).  Każda runda uśrednia tyle ramek, rosnąc proporcjonalnie do spadku zniekształceń w miarę zbieżności.  Pętla działa, dopóki nie naciśniesz Stop.
predistortion.targetThd = Docelowy THD, %
predistortion.targetThd.tooltip = Zatrzymaj, gdy THD osiągnie tę wartość (0 = działaj, aż się zatrzyma)
predistortion.table.metric = Pomiar
predistortion.table.value = Wartość
predistortion.intro = OBOWIĄZKOWO: umieść pasywny filtr zaporowy bliźniaczy-T, dostrojony do składowej podstawowej, między badanym urządzeniem a ADC.  Bez niego własne harmoniczne ADC wyznaczają poziom i pętla kompensuje ADC, a nie DAC.\nTo spycha resztkowe zniekształcenia DAC w dół, predystorsując generator odwrotnością tego, co mierzy.\nJak to działa — 1) przyciąga ton do prążka FFT i czeka na wyrównanie;  2) w każdej rundzie uśrednia ustawioną poniżej liczbę ramek FFT, odczytuje harmoniczne sinusa (lub produkty intermodulacji tonu dwuskładnikowego) i przekazuje równą i przeciwną korekcję z powrotem do generatora;  3) powtarza — uśredniając więcej ramek w miarę spadku zniekształceń — z wykresem opadającym w stronę poziomu szumu, aż docelowe zniekształcenia zostaną osiągnięte lub postęp ustanie.\nKreator uruchamia FFT w nieskończonym uśrednianiu spójnym ze składową podstawową pobieraną z generatora i włączonym FLL; dla najniższego poziomu szumu użyj okna HFT248D i pozostaw tłumienie sieci wyłączone.  Użyj czystego sygnału kilka dB poniżej pełnej skali i składowej podstawowej przyciągniętej do prążka — następnie zapisz plik .dpd i zastosuj go.
