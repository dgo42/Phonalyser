# ===== TIP OF THE DAY =====

tip.dialog.heading = Porada dnia
tip.dialog.dontShowAgain = Nie pokazuj ponownie
tip.dialog.next = Następna porada
tip.dialog.close = Zamknij
tip.dialog.closeCountdown = Zamknij ({0}s)
tip.count = 14
tip.1.title = Uśrednianie koherentne sięga daleko poniżej poziomu szumu.
tip.1.body = Pozostaw włączone uśrednianie koherentne (zespolone) i pozwól FFT pracować — ton się sumuje, podczas gdy szum częściowo się znosi, więc poziom szumu opada tym bardziej, im dłużej czekasz.
tip.2.title = Przyciągnij generator do prążka FFT, aby uzyskać czyste widmo.
tip.2.body = Przy włączonej opcji „Przyciągaj częstotliwość do najbliższego" ton trafia dokładnie na prążek, więc wyciek nie rozmywa składowej podstawowej, a oszacowania harmonicznych pozostają rzetelne.
tip.3.title = Ustal ręcznie składową podstawową na filtrze bliźniaczym-T.
tip.3.body = Pasywne zero filtra bliźniaczego-T jest tak strome, że kilka dziesiętnych herca dryftu termicznego rozhuśtuje wydzieloną składową podstawową. Wprowadź poziom, który faktycznie znasz, w polu „Ręczna składowa podstawowa"; harmoniczne, na łagodnym zboczu, wydzielają się bez problemu.
tip.4.title = Tryb wyłączności WASAPI utrzymuje pomiar bezstratny bitowo.
tip.4.body = Tryb wyłączności przekazuje urządzenie bezpośrednio do Phonalyser, omijając mikser Windows i jego konwerter częstotliwości próbkowania — bez ukrytego przepróbkowania zafałszowującego wynik.
tip.5.title = WDM-KS zapewnia oscyloskopowi najwięcej klatek na sekundę.
tip.5.body = Aby uzyskać najszybsze odświeżanie oscyloskopu na żywo, wybierz w Preferencjach mechanizm WDM-KS — działa on niżej niż WASAPI i przepycha więcej bloków przechwytywania na sekundę.
tip.6.title = Kółko myszy przybliża wokół kursora.
tip.6.body = W każdym widoku przebiegu: kółko przesuwa w pionie, Shift+kółko w poziomie, Ctrl+kółko przybliża oś pionową, a Ctrl+Shift+kółko poziomą — oba przybliżenia utrzymują wartość pod wskaźnikiem nieruchomo.
tip.7.title = Każde pole numeryczne przyjmuje jednostki, kółko i klawiaturę.
tip.7.body = Wpisz wartość z jednostką (µV, 1.5 V, -3 dBV, 2 kHz), przewiń kółkiem, kliknij strzałki w górę/w dół lub naciśnij klawisze strzałek w górę/w dół, aby zmieniać wartość krokowo.
tip.8.title = Interpolacja sinc ma znaczenie tylko po przybliżeniu.
tip.8.body = Przełącznik Sin/Lin zmienia przebieg tylko wtedy, gdy punkty próbek są na ekranie oddalone o kilka pikseli; w przeciwnym razie linie proste wyglądają identycznie i kosztują mniej CPU. Włącz go, gdy poszczególne próbki staną się widoczne.
tip.9.title = Histereza stabilizuje wyzwalanie przy słabym, zaszumionym sygnale.
tip.9.body = Bez niej szum wokół poziomu wyzwalania powoduje lawinę fałszywych wyzwoleń i przebieg drży. Włącz histerezę wyzwalania, a przebieg się ustabilizuje.
tip.10.title = Zapisany sygnał generatora to idealne odniesienie.
tip.10.body = „Zapisz do..." zapisuje idealny, matematycznie dokładny przebieg — bez zniekształceń DAC, wzmacniacza czy okablowania. Podaj go innemu przyrządowi, a każda zmierzona niedoskonałość należy do tego urządzenia, a nie do źródła.
tip.11.title = Wydziel charakterystykę toru pomiarowego plikiem kalibracji.
tip.11.body = Zmierz raz charakterystykę filtra zaporowego, tłumika lub karty dźwiękowej w module Charakterystyki częstotliwościowej, a następnie wczytaj ten plik .frc do analizatora FFT: jego charakterystyka jest dzielona przy wyświetlaniu, więc tabela pokazuje badane urządzenie.
tip.12.title = Nakładka odtworzonych dudnień ujarzmia bliską parę dwutonową.
tip.12.body = W trybie dwutonowym nakładka oscyloskopu „Odtworzone dudnienia" rysuje powolną obwiednię |f1 - f2|, więc można wyzwalać na dudnieniach zamiast gonić za szybkimi przejściami nośnej przez zero.
tip.13.title = Przemiatanie charakterystyki częstotliwościowej jest swoim własnym odniesieniem.
tip.13.body = Pomiar przemiataniem jest dekonwoluowany względem dokładnego przemiatania, które zostało odtworzone — a nie wobec ponownie zmierzonej kopii — więc odzyskany moduł i faza to prawdziwa funkcja przejścia urządzenia.
tip.14.title = Ctrl+F1 przeskakuje prosto do właściwej pomocy.
tip.14.body = Naciśnij F1 w dowolnym miejscu, aby otworzyć podręcznik, lub Ctrl+F1, aby otworzyć pomoc w dokładnej sekcji dotyczącej kontrolki, która ma obecnie fokus.

