fft.warning.overrun = ⚠ Pufferüberlauf — neu synchronisiert
fft.warning.overrun.tip = Der Analysator geriet einen vollen Erfassungspuffer in Rückstand, sodass das Fenster auf die Live-Spitze neu verankert wurde und die Mittelung fortgesetzt wird (eine Abdeckungslücke — keine beschädigten Daten).\nHäufige Überläufe bedeuten, dass die Analyse nicht mithalten kann; verringern Sie die Überlappung oder die FFT-Länge.
fft.warning.discontinuity = ⚠ Signal-Unstetigkeit — neu synchronisiert
fft.warning.discontinuity.tip = Der Analysator fand eine Unstetigkeit im erfassten Signal (eine bandbegrenzungsverletzende Störung / ausgefallene Abtastwerte), verwarf das betroffene Fenster und synchronisierte neu, sodass die kohärente Mittelung fortgesetzt wird.\nHäufige Unstetigkeiten bedeuten, dass die Quelle oder die Erfassung unter Last Störungen aufweist.
fft.warning.alignDrift = ⚠ Pegel während der Ausrichtung verschoben — Statistik zurückgesetzt
fft.warning.alignDrift.tip = Der Grundwellenpegel änderte sich um {0} dB, während der Frequenz-Lock den Generator auf das FFT-Bin-Raster zog.\nDie laufende Mittelung enthält noch Frames von vor der Ausrichtung auf dem alten Pegel — klicken Sie auf Statistik zurücksetzen, um eine saubere Mittelung zu erfassen.

# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = DAC-Vorverzerrung messen und anwenden.\nSie rastet den Ton auf einen FFT-Bin ein, mittelt dann in jeder Runde die eingestellte Anzahl FFT-Frames, liest die Oberwellen des Sinus (oder die Intermodulationsprodukte des Zweitons) und führt eine gleich große, entgegengesetzte Korrektur an den Generator zurück — und wiederholt dies, bis die Verzerrung Ihr Ziel erreicht oder sich nicht mehr verbessert.\nZiel: die Verzerrung in Richtung Rauschteppich drücken; speichern Sie die .dpd und wenden Sie sie an, um den kompensierten Ton zu behalten.
predistortion.wizard.title = DAC-Vorverzerrung
predistortion.averages = Mittelungen, n
predistortion.averages.tooltip = FFT-Mittelungen pro Runde (Minimum 10).  Jede Runde mittelt diese Anzahl Frames, die proportional zum Verzerrungsrückgang wächst, während sie konvergiert.  Die Schleife läuft, bis Sie Stopp drücken.
predistortion.targetThd = Ziel-THD, %
predistortion.targetThd.tooltip = Stoppen, sobald die THD diesen Wert erreicht (0 = laufen, bis sie stehen bleibt)
predistortion.table.metric = Messung
predistortion.table.value = Wert
predistortion.intro = PFLICHT: Schalten Sie einen passiven Twin-T-Notch-Filter, abgestimmt auf die Grundwelle, zwischen den Prüfling und den ADC.  Ohne ihn setzen die eigenen Oberwellen des ADC den Teppich und die Schleife kompensiert am Ende den ADC, nicht den DAC.\nDies drückt die Restverzerrung des DAC, indem der Generator mit dem Kehrwert dessen vorverzerrt wird, was gemessen wird.\nSo funktioniert es — 1) sie rastet den Ton auf einen FFT-Bin ein und wartet auf die Ausrichtung;  2) jede Runde mittelt sie die unten eingestellte Anzahl FFT-Frames, liest die Oberwellen des Sinus (oder die Intermodulationsprodukte des Zweitons) und führt eine gleich große, entgegengesetzte Korrektur an den Generator zurück;  3) sie wiederholt dies — mittelt mehr Frames, während die Verzerrung sinkt — wobei das Diagramm in Richtung Rauschteppich fällt, bis die Zielverzerrung erreicht ist oder der Fortschritt stehen bleibt.\nDer Assistent betreibt die FFT mit unendlicher kohärenter Mittelung, wobei die Grundwelle vom Generator genommen wird und die FLL eingeschaltet ist; für den tiefsten Teppich verwenden Sie das HFT248D-Fenster und lassen die Netzunterdrückung aus.  Verwenden Sie ein sauberes Signal einige dB unter dem Vollausschlag mit auf einen Bin eingerasteter Grundwelle — speichern Sie dann die .dpd und wenden Sie sie an.
