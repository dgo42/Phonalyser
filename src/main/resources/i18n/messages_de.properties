# ===== TIP OF THE DAY =====

tip.dialog.heading = Tipp des Tages
tip.dialog.dontShowAgain = Nicht mehr anzeigen
tip.dialog.next = Nächster Tipp
tip.dialog.close = Schließen
tip.dialog.closeCountdown = Schließen ({0}s)
tip.count = 14
tip.1.title = Kohärente Mittelung dringt weit unter den Grundrauschen vor.
tip.1.body = Lassen Sie die kohärente (komplexe) Mittelung eingeschaltet und die FFT weiterlaufen — der Ton summiert sich auf, während sich das Rauschen teilweise auslöscht, sodass der Grundrauschen umso weiter absinkt, je länger Sie warten.
tip.2.title = Rasten Sie den Generator auf eine FFT-Bin ein für ein sauberes Spektrum.
tip.2.body = Mit aktiviertem "Frequenz auf nächsten FFT-Bin runden" landet der Ton exakt auf einer Bin, sodass Leckeffekte die Grundwelle nicht verschmieren und die Oberwellen-Schätzungen ehrlich bleiben.
tip.3.title = Wenn ein Twin-T-Sperrfilter verwendet wird, geben Sie die Amplitude der Grundschwingung manuell ein.
tip.3.body = Eine passive Twin-T-Sperrfilter Kerbe ist so steil, dass schon ein paar Zehntel Hertz thermischer Drift der Grundwelle die entbettete Amplitude stark verändert. Geben Sie den Pegel, den Sie tatsächlich kennen, mit "Manuelle Grundwelle" ein; die Oberwellen auf der sanften Flanke entbetten sich problemlos.
tip.4.title = Der WASAPI-Exklusivmodus hält die Messung bit-genau.
tip.4.body = Der Exklusivmodus übergibt das Gerät direkt an Phonalyser und umgeht den Windows-Mixer samt Abtastraten-Wandler — kein verstecktes Resampling verändert das Ergebnis.
tip.5.title = WDM-KS liefert dem Oszilloskop die meisten Bilder pro Sekunde.
tip.5.body = Für die schnellste Live-Aktualisierung des Oszilloskops wählen Sie in den Einstellungen das WDM-KS-Backend — es sitzt tiefer als WASAPI und schiebt mehr Erfassungsblöcke pro Sekunde durch.
tip.6.title = Das Mausrad zoomt um den Cursor herum.
tip.6.body = In jeder Trace-Ansicht: Das Rad bewegt vertikal, Umschalt+Rad horizontal, Strg+Rad zoomt die vertikale Achse und Strg+Umschalt+Rad die horizontale — beide Zooms halten den Wert unter dem Zeiger fest.
tip.7.title = Jedes Zahlenfeld nimmt Einheiten, das Rad und die Tastatur an.
tip.7.body = Tippen Sie einen Wert mit seiner Einheit (µV, 1.5 V, -3 dBV, 2 kHz), scrollen Sie mit dem Rad, klicken Sie auf die Auf/Ab-Pfeile oder drücken Sie die Auf/Ab-Tasten der Tastatur zum Schrittweiterschalten.
tip.8.title = Sinc-Interpolation zählt nur, wenn Sie hineingezoomt sind.
tip.8.body = Der Sin/Lin-Schalter ändert den Trace nur, wenn die Abtastpunkte ein paar Pixel auseinanderliegen; sonst sehen gerade Linien identisch aus und kosten weniger CPU. Es schaltet sich automatisch ein und aus	.
tip.9.title = Hysterese stabilisiert den Trigger bei einem schwachen, verrauschten Signal.
tip.9.body = Ohne sie löst Rauschen um den Triggerpegel eine Flut von Fehltriggern aus und der Trace zittert. Aktivieren Sie die Triggerhysterese, und der Trace rastet ein.
tip.10.title = Ein gespeichertes Generatorsignal ist eine perfekte Referenz.
tip.10.body = "Speichern unter..." schreibt die ideale, mathematisch exakte Wellenform — ohne DAC-, Verstärker- oder Verkabelungsverzerrung. Speisen Sie sie in ein anderes Instrument ein, und jede Unvollkommenheit, die Sie messen, gehört zu jenem Gerät, nicht zur Quelle.
tip.11.title = Rechnen Sie eine Beschaltung mit einer Kalibrierdatei heraus.
tip.11.body = Messen Sie einen Notch, ein Dämpfungsglied oder den Frequenzgang einer Soundkarte einmal im Frequenzgang-Modul, laden Sie dann jene .frc in den FFT-Analysator: seine Form wird bei der Anzeige von der FFT abgezogen, sodass die Messwerte das zu prüfende Gerät zeigen und nicht alles zusammen gemischt.
tip.12.title = Die rekonstruierte Schwebungs-Überlagerung bändigt ein eng beieinanderliegendes Tonpaar.
tip.12.body = Im Zweiton-Modus zeichnet die "Rekonstruierte Schwebung"-Überlagerung des Oszilloskops die langsame |f1 − f2|-Hüllkurve, sodass Sie auf die Schwebung triggern können, statt den schnellen Trägernulldurchgängen hinterherzujagen.
tip.13.title = Der Frequenzgang-Sweep ist seine eigene Referenz.
tip.13.body = Die gesweepte Messung wird gegen den exakt abgespielten Sweep entfaltet — nicht gegen eine nachgemessene Kopie — sodass der zurückgewonnene Betrag und die Phase die wahre Übertragungsfunktion des Geräts sind.
tip.14.title = Strg+F1 springt direkt zur passenden Hilfe.
tip.14.body = Drücken Sie überall F1 für das Handbuch oder Strg+F1, um die Hilfe genau beim Abschnitt für das gerade fokussierte Bedienelement zu öffnen.

