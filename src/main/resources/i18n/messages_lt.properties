# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Išmatuoti ir pritaikyti DAC iškreipos kompensaciją.\nJis užfiksuoja toną ant FFT bino, tada kiekvienas ratas suvidurkina nustatytą FFT kadrų skaičių, nuskaito sinuso harmonikas (arba dvitonio signalo intermoduliacijos produktus) ir paduoda lygią bei priešingą korekciją atgal į generatorių — kartodamas, kol iškraipymas pasieks jūsų tikslą arba nustos gerėti.\nTikslas: nuvaryti iškraipymą link triukšmo grindų; įrašykite .dpd ir spauskite Taikyti, kad išlaikytumėte kompensuotą toną.
predistortion.wizard.title = DAC iškreipos kompensacija
predistortion.averages = Vidurkiai, n
predistortion.averages.tooltip = FFT vidurkiai per ratą (minimumas 10).  Kiekvienas ratas suvidurkina šitiek kadrų, jų skaičius auga proporcingai iškraipymo kritimui konverguojant.  Kilpa veikia, kol paspausite Stabdyti.
predistortion.targetThd = Tikslinis THD, %
predistortion.targetThd.tooltip = Stabdyti, kai THD pasiekia šią reikšmę (0 = veikti, kol nustos gerėti)
predistortion.table.metric = Matavimas
predistortion.table.value = Reikšmė
predistortion.intro = PRIVALOMA: tarp tiriamo įrenginio ir ADC įdėkite pasyvų twin-T režektorių, suderintą prie pagrindinio tono.  Be jo ADC nuosavos harmonikos nustato grindis ir kilpa galiausiai kompensuoja ADC, o ne DAC.\nTai nuvaro DAC liekamąjį iškraipymą, iškreipdama generatorių atvirkštine tuo, ką jis išmatuoja.\nKaip tai veikia — 1) jis užfiksuoja toną ant FFT bino ir laukia sulygiavimo;  2) kiekvienas ratas suvidurkina žemiau nustatytą FFT kadrų skaičių, nuskaito sinuso harmonikas (arba dvitonio signalo intermoduliacijos produktus) ir paduoda lygią bei priešingą korekciją atgal į generatorių;  3) jis kartoja — vidurkindamas daugiau kadrų, kai iškraipymas krenta — diagramai krintant link triukšmo grindų, kol pasiekiamas tikslinis iškraipymas arba pažanga sustoja.\nVediklis leidžia FFT begaliniu koherentiniu vidurkinimu su pagrindiniu tonu, imamu iš generatoriaus, ir įjungtu FLL; giliausioms grindims naudokite HFT248D langą ir palikite tinklo slopinimą išjungtą.  Naudokite švarų signalą keliais dB žemiau pilnos skalės su pagrindiniu tonu, pritrauktu prie bino — tada įrašykite .dpd ir spauskite Taikyti.
