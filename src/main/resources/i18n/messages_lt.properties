# ===== TIP OF THE DAY =====

tip.dialog.heading = Dienos patarimas
tip.dialog.dontShowAgain = Daugiau nerodyti
tip.dialog.next = Kitas patarimas
tip.dialog.close = Uždaryti
tip.dialog.closeCountdown = Uždaryti ({0} s)
tip.count = 14
tip.1.title = Koherentinis vidurkinimas leidžia pasiekti gerokai žemiau triukšmo grindų.
tip.1.body = Palikite įjungtą koherentinį (kompleksinį) vidurkinimą ir leiskite FFT veikti — tonas sumuojasi, o triukšmas iš dalies kompensuojasi, todėl grindys vis krenta, kuo ilgiau laukiate.
tip.2.title = Pritraukite generatorių prie FFT bino, kad gautumėte švarų spektrą.
tip.2.body = Įjungus „Pritraukti dažnį prie artimiausio“, tonas atsiranda tiksliai ant bino, todėl nuotėkis neištepa pagrindinio tono, o harmonikų įverčiai lieka teisingi.
tip.3.title = Užfiksuokite pagrindinį toną rankiniu būdu ant twin-T režektoriaus.
tip.3.body = Pasyvi twin-T nulinė smailė tokia stati, kad kelių herco dešimtųjų šiluminis dreifas svyruoja išskaičiuotą pagrindinį toną. Įveskite lygį, kurį iš tikrųjų žinote, naudodami „Rankinis pagrindinis tonas“; harmonikos, esančios ant švelnaus šono, išsiskaičiuoja gerai.
tip.4.title = WASAPI išskirtinis režimas išlaiko matavimą bit-tikslų.
tip.4.body = Išskirtinis režimas perduoda įrenginį tiesiai Phonalyser, apeidamas Windows maišytuvą ir jo diskretizavimo dažnio keitiklį — jokio paslėpto perskaitkiavimo, kuris nuspalvintų rezultatą.
tip.5.title = WDM-KS suteikia osciloskopui daugiausia kadrų per sekundę.
tip.5.body = Greičiausiam tiesioginiam osciloskopo atnaujinimui Nuostatose pasirinkite WDM-KS posistemę — ji yra žemiau nei WASAPI ir paduoda daugiau fiksavimo blokų per sekundę.
tip.6.title = Pelės ratukas didina aplink žymeklį.
tip.6.body = Bet kuriame kreivės vaizde: ratukas slenka vertikaliai, Shift+ratukas horizontaliai, Ctrl+ratukas didina vertikalią ašį, o Ctrl+Shift+ratukas — horizontalią; abu didinimai išlaiko nekintančią reikšmę po žymekliu.
tip.7.title = Kiekvienas skaitinis laukas priima vienetus, ratuką ir klaviatūrą.
tip.7.body = Įveskite reikšmę su jos vienetu (µV, 1,5 V, -3 dBV, 2 kHz), sukite ratuką, spauskite aukštyn/žemyn rodykles arba spauskite klaviatūros aukštyn/žemyn klavišus, kad pakeistumėte žingsniu.
tip.8.title = Sinc interpoliacija svarbi tik tada, kai esate priartinę.
tip.8.body = Sin/Lin jungiklis keičia kreivę tik tada, kai diskretai ekrane yra už poros pikselių vienas nuo kito; kitu atveju tiesios linijos atrodo identiškai ir kainuoja mažiau procesoriaus. Įjunkite jį, kai matomi atskiri diskretai.
tip.9.title = Histerezė stabilizuoja paleidiklį esant silpnam, triukšmingam signalui.
tip.9.body = Be jos triukšmas aplink paleidiklio lygį sukelia daugybę klaidingų paleidimų ir kreivė virpa. Įjunkite paleidiklio histerezę ir kreivė užsifiksuos.
tip.10.title = Įrašytas generatoriaus signalas yra tobula etaloninė atskaita.
tip.10.body = „Įrašyti į...“ įrašo idealią, matematiškai tikslią bangos formą — be DAC, stiprintuvo ar kabelių iškraipymų. Paduokite ją kitam prietaisui, ir bet koks jūsų išmatuotas netobulumas priklauso tam įrenginiui, o ne šaltiniui.
tip.11.title = Išskaičiuokite įtaisą naudodami kalibravimo failą.
tip.11.body = Vieną kartą Dažninės charakteristikos modulyje išmatuokite režektoriaus, slopintuvo ar garso plokštės charakteristiką, tada įkelkite tą .frc į FFT analizatorių: jo charakteristika padalijama atvaizdavimo metu, todėl lentelė rodo tiriamą įrenginį.
tip.12.title = Atkurtos mušos sluoksnis suvaldo artimą dviejų tonų porą.
tip.12.body = Dvitonio režimo metu osciloskopo „Atkurta muša“ sluoksnis brėžia lėtą |f1 - f2| gaubtinę, todėl galite paleisti pagal mušą, o ne vytis greitus nešlio kirtimus.
tip.13.title = Dažninės charakteristikos braukimas yra savo paties atskaita.
tip.13.body = Braukimo matavimas dekonvoliuojamas su tiksliai tuo braukimu, kuris buvo grotas — o ne su iš naujo išmatuota kopija — todėl atkurtas amplitudės ir fazės dydis yra tikroji įrenginio perdavimo funkcija.
tip.14.title = Ctrl+F1 nukelia tiesiai į tinkamą žinyną.
tip.14.body = Bet kur spauskite F1, kad atvertumėte vadovą, arba Ctrl+F1, kad atvertumėte žinyną tiksliai toje skiltyje, skirtoje šiuo metu suaktyvintam valdikliui.

