# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Izmeri in uveljavi predpopačenje DAC.\nTon zaklene na FFT bin, nato vsak krog povpreči nastavljeno število FFT okvirov, prebere harmonike sinusa (ali intermodulacijske produkte dvojnega tona) in generatorju vrne enak in nasproten popravek — ponavlja, dokler popačenje ne doseže vašega cilja ali se neha izboljševati.\nCilj: pognati popačenje navzdol proti pragu šuma; shranite .dpd in ga uveljavite, da ohranite kompenzirani ton.
predistortion.wizard.title = Predopačenje DAC
predistortion.averages = Povprečenja, n
predistortion.averages.tooltip = FFT povprečenja na krog (najmanj 10).  Vsak krog povpreči toliko okvirov, kar narašča sorazmerno z upadom popačenja, ko se približuje.  Zanka teče, dokler ne pritisnete Ustavi.
predistortion.targetThd = Ciljni THD, %
predistortion.targetThd.tooltip = Ustavi, ko THD doseže to vrednost (0 = teci, dokler se ne zatakne)
predistortion.table.metric = Meritev
predistortion.table.value = Vrednost
predistortion.intro = OBVEZNO: med napravo v preizkusu in ADC postavite pasivni zarezni filter twin-T, uglašen na osnovno frekvenco.  Brez njega harmoniki samega ADC določijo prag in zanka na koncu kompenzira ADC, ne DAC.\nTo pognati preostalo popačenje DAC navzdol s predpopačenjem generatorja z inverzom tega, kar izmeri.\nKako deluje — 1) ton zaklene na FFT bin in počaka na poravnavo;  2) vsak krog povpreči spodaj nastavljeno število FFT okvirov, prebere harmonike sinusa (ali intermodulacijske produkte dvojnega tona) in generatorju vrne enak in nasproten popravek;  3) ponavlja — povprečuje več okvirov, ko popačenje pada — graf pada proti pragu šuma, dokler ni dosežen ciljni popačenje ali se napredek zatakne.\nČarovnik poganja FFT v neskončnem koherentnem povprečenju z osnovno frekvenco, vzeto iz generatorja, in z vklopljenim FLL; za najgloblji prag uporabite okno HFT248D in pustite zatiranje omrežja izklopljeno.  Uporabite čist signal nekaj dB pod polno skalo in osnovno frekvenco pripeto na bin — nato shranite .dpd in ga uveljavite.
