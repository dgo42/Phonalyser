# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Nasvet dneva
tip.dialog.dontShowAgain = Ne prikaži več
tip.dialog.next          = Naslednji nasvet
tip.dialog.close         = Zapri
tip.dialog.closeCountdown = Zapri ({0} s)
tip.count = 14
tip.1.title = Koherentno povprečenje seže globoko pod prag šuma.
tip.1.body  = Pustite koherentno (kompleksno) povprečenje vklopljeno in naj FFT teče — ton se sešteva, šum pa se delno izniči, zato prag pada, dlje ko čakate.
tip.2.title = Pripnite generator na FFT bin za čist spekter.
tip.2.body  = Z vklopljeno možnostjo »Pripni frekvenco na najbližjo« ton pristane točno na binu, zato uhajanje ne razmaže osnovne frekvence in ocene harmonikov ostanejo zanesljive.
tip.3.title = Pripnite osnovno frekvenco ročno na zarezi twin-T.
tip.3.body  = Pasivna ničla twin-T je tako strma, da že nekaj desetink herca toplotnega lezenja zaziblje de-vgrajeno osnovno frekvenco. Vnesite raven, ki jo dejansko poznate, z možnostjo »Ročna osnovna«; harmoniki na blagi strani se de-vgradijo brez težav.
tip.4.title = Ekskluzivni način WASAPI ohranja meritev bitno natančno.
tip.4.body  = Ekskluzivni način preda napravo neposredno Phonalyser, obide mešalnik Windows in njegov pretvornik vzorčne frekvence — brez skritega prevzorčenja, ki bi obarvalo rezultat.
tip.5.title = WDM-KS daje osciloskopu največ sličic na sekundo.
tip.5.body  = Za najhitrejše osveževanje živega osciloskopa izberite zaledje WDM-KS v Nastavitvah — leži nižje kot WASAPI in potisne več zajemnih blokov na sekundo.
tip.6.title = Miškino kolesce povečuje okrog kazalca.
tip.6.body  = V katerem koli pogledu sledi: kolesce premika navpično, Shift+kolesce vodoravno, Ctrl+kolesce povečuje navpično os in Ctrl+Shift+kolesce vodoravno — obe povečavi ohranjata vrednost pod kazalcem nespremenjeno.
tip.7.title = Vsako numerično polje sprejme enote, kolesce in tipkovnico.
tip.7.body  = Vnesite vrednost z njeno enoto (µV, 1.5 V, -3 dBV, 2 kHz), zavrtite kolesce, kliknite puščici gor/dol ali pritisnite tipki gor/dol za korak.
tip.8.title = Interpolacija sinc je pomembna le pri povečavi.
tip.8.body  = Stikalo Sin/Lin spremeni sled le, ko so vzorčne točke na zaslonu nekaj slikovnih pik narazen; sicer so ravne črte videti enako in stanejo manj procesorja. Vklopite ga, ko postanejo posamezni vzorci vidni.
tip.9.title = Histereza stabilizira proženje na šibkem, šumnem signalu.
tip.9.body  = Brez nje šum okrog ravni proženja sproži plaz lažnih prožitev in sled trepeta. Omogočite histerezo proženja in sled se zaklene.
tip.10.title = Shranjen signal generatorja je popolna referenca.
tip.10.body  = »Shrani v...« zapiše idealno, matematično natančno valovno obliko — brez popačenja DAC, ojačevalnika ali kabliranja. Podajte jo drugemu instrumentu in vsaka nepopolnost, ki jo izmerite, pripada tej napravi, ne viru.
tip.11.title = De-vgradite napravo z umeritveno datoteko.
tip.11.body  = Enkrat izmerite odziv zareze, slabilnika ali zvočne kartice v modulu Frekvenčni odziv, nato naložite to datoteko .frc v analizator FFT: njen odziv se ob prikazu odšteje, zato tabela prikaže napravo v preizkusu.
tip.12.title = Prekrivka rekonstruiranega utripa ukroti tesni dvotonski par.
tip.12.body  = V dvotonskem načinu osciloskopova prekrivka »Rekonstruiran utrip« izriše počasno ovojnico |f1 - f2|, zato lahko prožite na utripu namesto loviti hitra prečkanja nosilca.
tip.13.title = Frekvenčni sweep je sam svoja referenca.
tip.13.body  = Prepleteno merjenje je dekonvolvirano glede na natančni sweep, ki je bil predvajan — ne na ponovno izmerjeno kopijo — zato sta povrnjeni magnituda in faza prava prenosna funkcija naprave.
tip.14.title = Ctrl+F1 skoči naravnost na pravo pomoč.
tip.14.body  = Pritisnite F1 kjer koli za priročnik ali Ctrl+F1, da odprete pomoč točno pri razdelku za kontrolnik, ki ima trenutno fokus.

