# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mesurer et appliquer la prédistorsion DAC.\nIl verrouille la tonalité sur un bin FFT, puis chaque tour moyenne le nombre de trames FFT défini, lit les harmoniques du sinus (ou les produits d'intermodulation du signal bitonal) et renvoie au générateur une correction égale et opposée — en répétant jusqu'à ce que la distorsion atteigne votre cible ou cesse de s'améliorer.\nObjectif : faire descendre la distorsion vers le plancher de bruit ; Enregistrez le .dpd et Appliquez-le pour conserver la tonalité compensée.
predistortion.wizard.title = Prédistorsion DAC
predistortion.averages = Moyennages, n
predistortion.averages.tooltip = Moyennages FFT par tour (minimum 10).  Chaque tour moyenne ce nombre de trames, croissant proportionnellement à la baisse de distorsion à mesure qu'il converge.  La boucle tourne jusqu'à ce que vous appuyiez sur Arrêter.
predistortion.targetThd = THD cible, %
predistortion.targetThd.tooltip = Arrêter une fois que le THD atteint cette valeur (0 = tourner jusqu'à stagnation)
predistortion.table.metric = Mesure
predistortion.table.value = Valeur
predistortion.intro = OBLIGATOIRE : placez un filtre notch passif en T ponté, accordé sur le fondamental, entre le périphérique sous test et l'ADC.  Sans lui, les propres harmoniques de l'ADC fixent le plancher et la boucle finit par compenser l'ADC, pas le DAC.\nCeci fait descendre la distorsion résiduelle du DAC en prédistordant le générateur avec l'inverse de ce qu'il mesure.\nFonctionnement — 1) il verrouille la tonalité sur un bin FFT et attend l'alignement ;  2) chaque tour, il moyenne le nombre de trames FFT défini ci-dessous, lit les harmoniques du sinus (ou les produits d'intermodulation du signal bitonal) et renvoie au générateur une correction égale et opposée ;  3) il répète — en moyennant davantage de trames à mesure que la distorsion baisse — le graphique descendant vers le plancher de bruit, jusqu'à ce que la distorsion cible soit atteinte ou que le progrès stagne.\nL'assistant exécute la FFT en moyennage cohérent infini avec le fondamental pris depuis le générateur et la FLL activée ; pour le plancher le plus bas, utilisez la fenêtre HFT248D et laissez la suppression secteur désactivée.  Utilisez un signal propre quelques dB sous la pleine échelle et le fondamental calé sur un bin — puis Enregistrez le .dpd et Appliquez-le.
