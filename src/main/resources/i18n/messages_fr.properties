# ===== TIP OF THE DAY =====

tip.dialog.heading = Astuce du jour
tip.dialog.dontShowAgain = Ne plus afficher
tip.dialog.next = Astuce suivante
tip.dialog.close = Fermer
tip.dialog.closeCountdown = Fermer ({0} s)
tip.count = 14
tip.1.title = La moyenne cohérente plonge bien en dessous du plancher de bruit.
tip.1.body = Laissez la moyenne cohérente (complexe) activée et laissez la FFT tourner — la tonalité s'additionne tandis que le bruit s'annule en partie, donc le plancher continue de baisser plus vous attendez.
tip.2.title = Calez le générateur sur un bin FFT pour un spectre propre.
tip.2.body = Avec « Caler la fréquence sur le plus proche » activé, la tonalité tombe exactement sur un bin, de sorte que la fuite n'étale pas le fondamental et les estimations d'harmoniques restent fidèles.
tip.3.title = Fixez le fondamental à la main sur un notch en T ponté.
tip.3.body = Un creux passif en T ponté est si abrupt que quelques dixièmes de hertz de dérive thermique font varier le fondamental dé-incorporé. Saisissez le niveau que vous connaissez réellement avec « Fondamental manuel » ; les harmoniques, sur le flanc doux, se dé-incorporent sans problème.
tip.4.title = Le mode exclusif WASAPI garde la mesure exacte au bit près.
tip.4.body = Le mode exclusif remet le périphérique directement à Phonalyser, contournant le mélangeur Windows et son convertisseur de fréquence d'échantillonnage — aucun rééchantillonnage caché ne vient colorer le résultat.
tip.5.title = WDM-KS offre à l'oscilloscope le plus d'images par seconde.
tip.5.body = Pour le rafraîchissement live le plus rapide de l'oscilloscope, choisissez le backend WDM-KS dans les Préférences — il se situe plus bas que WASAPI et pousse plus de blocs de capture par seconde.
tip.6.title = La molette zoome autour du curseur.
tip.6.body = Dans toute vue de trace : la molette se déplace verticalement, Maj+molette horizontalement, Ctrl+molette zoome l'axe vertical et Ctrl+Maj+molette l'horizontal — les deux zooms gardent fixe la valeur sous le pointeur.
tip.7.title = Chaque champ numérique accepte les unités, la molette et le clavier.
tip.7.body = Saisissez une valeur avec son unité (µV, 1,5 V, -3 dBV, 2 kHz), faites tourner la molette, cliquez sur les flèches haut/bas, ou appuyez sur les touches haut/bas du clavier pour incrémenter.
tip.8.title = L'interpolation sinc ne compte que lorsque vous êtes zoomé.
tip.8.body = Le commutateur Sin/Lin ne change la trace que lorsque les points d'échantillonnage sont distants de quelques pixels à l'écran ; sinon les lignes droites paraissent identiques et coûtent moins de CPU. Activez-le une fois que les échantillons individuels sont visibles.
tip.9.title = L'hystérésis stabilise le déclenchement sur un signal faible et bruité.
tip.9.body = Sans elle, le bruit autour du niveau de déclenchement provoque une rafale de faux déclenchements et la trace tremble. Activez l'hystérésis de déclenchement et la trace se verrouille.
tip.10.title = Un signal de générateur enregistré est une référence parfaite.
tip.10.body = « Enregistrer sous... » écrit la forme d'onde idéale, mathématiquement exacte — sans distorsion de DAC, d'amplificateur ou de câblage. Envoyez-la à un autre instrument et toute imperfection que vous mesurez appartient à ce périphérique, pas à la source.
tip.11.title = Dé-incorporez un montage avec un fichier de calibration.
tip.11.body = Mesurez une fois la réponse d'un notch, d'un atténuateur ou d'une carte son dans le module Réponse en fréquence, puis chargez ce .frc dans l'analyseur FFT : sa réponse est divisée à l'affichage, de sorte que le tableau montre le périphérique sous test.
tip.12.title = La superposition de battement reconstruit dompte une paire de deux tonalités proches.
tip.12.body = En mode bitonal, la superposition « Battement reconstruit » de l'oscilloscope trace l'enveloppe lente |f1 - f2|, de sorte que vous pouvez déclencher sur le battement au lieu de poursuivre les croisements rapides de la porteuse.
tip.13.title = Le balayage de réponse en fréquence est sa propre référence.
tip.13.body = La mesure balayée est déconvoluée par rapport au balayage exact qui a été joué — non une copie remesurée — de sorte que l'amplitude et la phase récupérées sont la vraie fonction de transfert du périphérique.
tip.14.title = Ctrl+F1 saute directement à la bonne aide.
tip.14.body = Appuyez sur F1 n'importe où pour le manuel, ou Ctrl+F1 pour ouvrir l'aide à la section exacte du contrôle qui a actuellement le focus.

