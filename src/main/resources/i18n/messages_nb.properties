preferences.freqResp.lineWidth.tooltip = Strektykkelse for frekvensrespons-kurven i piksler (amplitude, fase, RIAA-referanse og sammenligningskurver)
preferences.freqResp.maxFreqPctNyquist = Maksimal analysert frekvens, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = Begrenser den øvre grensen for FreqResp-visningen til denne brøkdelen av Nyquist (sampleRate / 2).  96–100 %.  100 % = streng Nyquist; lavere verdier trimmer båndet der dekonvolusjonskjernens energi ruller av.
preferences.freqResp.compareSmoothWindow = Sammenligningsutjevningsvindu, 1/N oktav
preferences.freqResp.compareSmoothWindow.tooltip = Bredden på glidende-gjennomsnitt-filteret påført sammenligningsmodus-kurven (målt − referanse), uttrykt i 1/N-oktav-enheter.  N = 0 deaktiverer utjevning.  Mindre N = bredere vindu = mer utjevning (N=3 ≈ 1/3-oktav, bred), større N = smalere = lettere (N=24 ≈ 1/24-oktav, standard lyd).
preferences.freqResp.notch.enable = Tillat notch-filter for industristøy
preferences.freqResp.notch.enable.tooltip = Når aktivert interpolerer FreqResp-visningen over hver harmoniske av den valgte nettfrekvensen (50/60 Hz) — fjerner nettbrum-spisser fra den viste responsen uten å måle på nytt.
preferences.freqResp.notch.baseHz = Industrifrekvens
preferences.freqResp.notch.baseHz.tooltip = Basisfrekvens hvis harmoniske (50, 100, 150, … Hz eller 60, 120, 180, …) notches ut når avkrysningsboksen over er på.
