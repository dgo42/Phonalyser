# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mål og bruk DAC-predistorsjon.\nDen låser tonen til en FFT-bin, deretter midler hver runde det angitte antallet FFT-rammer, leser sinusens harmoniske (eller totonesignalets intermodulasjonsprodukter), og mater en like stor og motsatt korreksjon tilbake til generatoren — og gjentar til forvrengningen når målet ditt eller slutter å forbedre seg.\nMål: drive forvrengningen ned mot støygulvet; Lagre .dpd-en og Bruk den for å beholde den kompenserte tonen.
predistortion.wizard.title = DAC-predistorsjon
predistortion.averages = Gjennomsnitt, n
predistortion.averages.tooltip = FFT-gjennomsnitt per runde (minimum 10).  Hver runde midler så mange rammer, og vokser i forhold til forvrengningsfallet etter hvert som den konvergerer.  Sløyfen kjører til du trykker Stopp.
predistortion.targetThd = Mål-THD, %
predistortion.targetThd.tooltip = Stopp når THD når denne verdien (0 = kjør til den stopper opp)
predistortion.table.metric = Måling
predistortion.table.value = Verdi
predistortion.intro = OBLIGATORISK: plasser et passivt tvilling-T-notch-filter, stemt til grunntonen, mellom enheten under test og ADC-en.  Uten det setter ADC-ens egne harmoniske gulvet, og sløyfen ender opp med å kompensere ADC-en, ikke DAC-en.\nDette driver DAC-ens gjenværende forvrengning ned ved å predistordere generatoren med den inverse av det den måler.\nSlik fungerer det — 1) den låser tonen på en FFT-bin og venter på innretting;  2) hver runde midler den antallet FFT-rammer som er satt nedenfor, leser sinusens harmoniske (eller totonesignalets intermodulasjonsprodukter), og mater en like stor og motsatt korreksjon tilbake til generatoren;  3) den gjentar — midler flere rammer etter hvert som forvrengningen synker — mens grafen faller mot støygulvet, til målforvrengningen er nådd eller fremgangen stopper opp.\nVeiviseren kjører FFT-en i uendelig koherent midling med grunntonen hentet fra generatoren og FLL på; for det dypeste gulvet bruk HFT248D-vinduet og la nettundertrykking være av.  Bruk et rent signal noen få dB under fullskala og grunntonen låst til en bin — deretter Lagre .dpd-en og Bruk den.
