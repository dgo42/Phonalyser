# ===== TIP OF THE DAY =====

tip.dialog.heading = Dagens tips
tip.dialog.dontShowAgain = Ikke vis igjen
tip.dialog.next = Neste tips
tip.dialog.close = Lukk
tip.dialog.closeCountdown = Lukk ({0} s)
tip.count = 14
tip.1.title = Koherent midling graver langt under støygulvet.
tip.1.body = La koherent (kompleks) midling stå på og la FFT-en kjøre — tonen summeres opp mens støyen delvis utlignes, så gulvet fortsetter å synke jo lenger du venter.
tip.2.title = Lås generatoren til en FFT-bin for et rent spektrum.
tip.2.body = Med «Lås frekvens til nærmeste» på lander tonen nøyaktig på en bin, så lekkasje ikke smører ut grunntonen og harmoniske-estimatene holder seg ærlige.
tip.3.title = Lås grunntonen for hånd på et tvilling-T-notch.
tip.3.body = En passiv tvilling-T-null er så bratt at noen få tideler av en hertz med termisk drift svinger den de-embeddede grunntonen. Skriv inn nivået du faktisk kjenner med «Manuell grunntone»; de harmoniske, på den slake flanken, de-embedder fint.
tip.4.title = WASAPI eksklusiv modus holder målingen bit-eksakt.
tip.4.body = Eksklusiv modus overleverer enheten rett til Phonalyser og forbi Windows-mikseren og dens samplingsrate-omformer — ingen skjult resampling som farger resultatet.
tip.5.title = WDM-KS gir oscilloskopet flest bilder per sekund.
tip.5.body = For raskest mulig sanntidsoppdatering av skopet, velg WDM-KS-backenden i Innstillinger — den ligger lavere enn WASAPI og dytter ut flere opptaksblokker per sekund.
tip.6.title = Musehjulet zoomer rundt markøren.
tip.6.body = I enhver kurvevisning: hjulet flytter vertikalt, Shift+hjul horisontalt, Ctrl+hjul zoomer den vertikale aksen og Ctrl+Shift+hjul den horisontale — begge zoomer holder verdien under pekeren fast.
tip.7.title = Hvert numeriske felt tar enheter, hjulet og tastaturet.
tip.7.body = Skriv inn en verdi med enheten (µV, 1,5 V, -3 dBV, 2 kHz), rull hjulet, klikk opp/ned-pilene, eller trykk opp/ned-tastene på tastaturet for å steppe.
tip.8.title = Sinc-interpolasjon betyr bare noe når du har zoomet inn.
tip.8.body = Sin/Lin-bryteren endrer kurven bare når samplingspunktene er noen få piksler fra hverandre på skjermen; ellers ser rette linjer identiske ut og koster mindre CPU. Slå den på når enkeltsampler blir synlige.
tip.9.title = Hysterese stabiliserer triggeren på et svakt, støyete signal.
tip.9.body = Uten den utløser støy rundt triggernivået et kobbel av falske triggere og kurven dirrer. Aktiver trigger-hysterese og kurven låser seg.
tip.10.title = Et lagret generatorsignal er en perfekt referanse.
tip.10.body = «Lagre til …» skriver den ideelle, matematisk eksakte bølgeformen — ingen DAC-, forsterker- eller kablingsforvrengning. Mat den til et annet instrument, og enhver ufullkommenhet du måler tilhører den enheten, ikke kilden.
tip.11.title = De-embed en fikstur med en kalibreringsfil.
tip.11.body = Mål et notch, en attenuator eller et lydkorts respons én gang i Frekvensrespons-modulen, og last så den .frc-filen inn i FFT-analysatoren: responsen deles ut ved visning, så tabellen viser enheten under test.
tip.12.title = Det rekonstruerte beat-overlegget temmer et tett totone-par.
tip.12.body = I totonemodus tegner skopets «Rekonstruert beat»-overlegg den langsomme |f1 − f2|-konvolutten, så du kan trigge på beatet i stedet for å jage de raske bærebølgekryssingene.
tip.13.title = Frekvensrespons-sveipet er sin egen referanse.
tip.13.body = Den sveipte målingen dekonvolveres mot det nøyaktige sveipet som ble spilt — ikke en gjenmålt kopi — så den gjenvunne amplituden og fasen er enhetens sanne overføringsfunksjon.
tip.14.title = Ctrl+F1 hopper rett til riktig hjelp.
tip.14.body = Trykk F1 hvor som helst for manualen, eller Ctrl+F1 for å åpne hjelpen på akkurat den seksjonen for kontrollen som har fokus akkurat nå.

