# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Vísbending dagsins
tip.dialog.dontShowAgain = Ekki sýna aftur
tip.dialog.next          = Næsta vísbending
tip.dialog.close         = Loka
tip.dialog.closeCountdown = Loka ({0}s)
tip.count = 14
tip.1.title = Samfösuð meðaltöltun grefur langt niður fyrir hávaðagólfið.
tip.1.body  = Hafðu samfösaða (tvinntölu) meðaltöltun á og láttu FFT keyra — tónninn leggst saman á meðan hávaðinn eyðist að hluta, svo gólfið heldur áfram að lækka því lengur sem þú bíður.
tip.2.title = Smelltu rafalanum á FFT-bil til að fá hreint róf.
tip.2.body  = Með „Smella tíðni á næsta“ á lendir tónninn nákvæmlega á bili, svo leki smyr ekki út grunntóninn og yfirtóna­matið helst heiðarlegt.
tip.3.title = Festu grunntóninn handvirkt á tvíburaT-deyfi.
tip.3.body  = Hlutlaus tvíbura-T núllun er svo brött að fáein tíundu úr hertsi af varmareki sveiflar afmótaða grunntóninum. Sláðu inn stigið sem þú raunverulega þekkir með „Handvirkur grunntónn“; yfirtónarnir, á aflíðandi hliðinni, afmótast vel.
tip.4.title = WASAPI einkahamur heldur mælingunni bitanákvæmri.
tip.4.body  = Einkahamur afhendir Phonalyser tækið beint, fram hjá Windows-blandaranum og sýnatíðnibreyti hans — engin falin endursýnataka til að lita niðurstöðuna.
tip.5.title = WDM-KS gefur sveiflusjánni flesta ramma á sekúndu.
tip.5.body  = Fyrir hraðasta beina sveiflusjár-uppfærslu, veldu WDM-KS bakendann í Stillingum — hann situr neðar en WASAPI og ýtir fleiri grípublokkum á sekúndu.
tip.6.title = Músarhjólið þysjar í kringum bendilinn.
tip.6.body  = Í hvaða feril-sýn sem er: hjólið færir lóðrétt, Shift+hjól lárétt, Ctrl+hjól þysjar lóðrétta ásinn og Ctrl+Shift+hjól þann lárétta — báðar þysjanir halda gildinu undir bendlinum föstu.
tip.7.title = Hvert talnareit tekur við einingum, hjólinu og lyklaborðinu.
tip.7.body  = Sláðu inn gildi með einingu sinni (µV, 1.5 V, -3 dBV, 2 kHz), skrunaðu hjólinu, smelltu á upp/niður örvarnar, eða ýttu á upp/niður lykla lyklaborðsins til að þrepa.
tip.8.title = Sinc-brúun skiptir aðeins máli þegar þú ert aðþysjuð inn.
tip.8.body  = Sin/Lin rofinn breytir ferlinum aðeins þegar sýnapunktar eru fáeinir mynddílar í sundur á skjánum; annars líta beinar línur eins út og kosta minni örgjörva. Kveiktu á því þegar einstök sýni eru sýnileg.
tip.9.title = Stökkdeyfing kyrrir kveikjuna á veiku, hávaðasömu merki.
tip.9.body  = Án hennar kveikir hávaði í kringum kveikjustigið hrinu af fölskum kveikjum og ferillinn titrar. Virkjaðu kveikju­stökkdeyfingu og ferillinn læsist.
tip.10.title = Vistað rafalsmerki er fullkomið viðmið.
tip.10.body  = „Vista í...“ ritar hina kjörnu, stærðfræðilega nákvæmu bylgjuform — engin DAC-, magnara- eða lögn-bjögun. Mataðu því í annað mælitæki og hver ófullkomleiki sem þú mælir tilheyrir því tæki, ekki upptökunni.
tip.11.title = Afmótaðu festingu með kvörðunarskrá.
tip.11.body  = Mældu deyfi, deyfara eða svörun hljóðkorts einu sinni í Tíðnisvörunar-einingunni, hlaðaðu síðan þeirri .frc inn í FFT-greininn: svörun hennar er deilt út við birtingu, svo taflan sýnir tækið sem prófað er.
tip.12.title = Endurgerða sláttar-yfirlagið temur náið tvítóna par.
tip.12.body  = Í tvítóna-ham teiknar „Endurgerður sláttur“-yfirlag sveiflusjárinnar hæga |f1 - f2| umslagið, svo þú getur kveikt á slættinum í stað þess að elta hröðu burðartíðni-þverunina.
tip.13.title = Tíðnisvörunar-sópunin er sitt eigið viðmið.
tip.13.body  = Sópaða mælingin er affölduð gegn nákvæmlega þeirri sópun sem var spiluð — ekki endurmældu eintaki — svo endurheimt mögnun og fasi eru sönn yfirfærslufall tækisins.
tip.14.title = Ctrl+F1 stekkur beint í réttu hjálpina.
tip.14.body  = Ýttu á F1 hvar sem er fyrir handbókina, eða Ctrl+F1 til að opna hjálpina á nákvæma kaflanum fyrir stýringuna sem er með fókus núna.

