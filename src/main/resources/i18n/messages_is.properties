# --- predistortion wizard + screenshot comment/font (synced from en) ---
predistortion.button.wizard.tooltip = Mæla og beita DAC-forbjögun.\nHún læsir tóninum á FFT-bil, síðan tekur hver umferð meðaltal af tilteknum fjölda FFT-ramma, les yfirtóna sínusins (eða millimótunarafurðir tvítónans), og matar jafn-stóra og andstæða leiðréttingu til baka í rafalann — endurtekur uns bjögunin nær markmiði þínu eða hættir að batna.\nMarkmið: keyra bjögunina niður að hávaðagólfinu; Vista .dpd og Beita henni til að halda jöfnuðu tóninum.
predistortion.wizard.title = DAC-forbjögun
predistortion.averages = Meðaltöl, n
predistortion.averages.tooltip = FFT-meðaltöl á umferð (hjól ±10, örvar ±1; lágmark 10).  Hver umferð tekur meðaltal af þessum fjölda ramma, sem vex í hlutfalli við bjögunarlækkunina eftir því sem hún samleitar.  Lykkjan keyrir uns þú ýtir á Stöðva.
predistortion.targetThd = Markmiðs-THD, %
predistortion.targetThd.tooltip = Stöðva þegar THD nær þessu gildi (0 = keyra uns það staðnar)
predistortion.table.metric = Mæling
predistortion.table.value = Gildi
predistortion.intro = SKYLDA: settu hlutlausa tvíbura-T deyfisíu, stillta á grunntóninn, milli tækisins sem prófað er og ADC.  Án hennar setja eigin yfirtónar ADC gólfið og lykkjan endar á að bæta ADC, ekki DAC.\nÞetta keyrir afgangsbjögun DAC niður með því að forbjaga rafalann með andhverfu þess sem hann mælir.\nHvernig það virkar — 1) hún læsir tóninum á FFT-bil og bíður eftir jöfnun;  2) hver umferð tekur meðaltal af fjölda FFT-ramma sem stilltur er fyrir neðan, les yfirtóna sínusins (eða millimótunarafurðir tvítónans), og matar jafn-stóra og andstæða leiðréttingu til baka í rafalann;  3) hún endurtekur — tekur meðaltal af fleiri römmum eftir því sem bjögunin lækkar — línuritið fellur að hávaðagólfinu, uns markmiðsbjöguninni er náð eða framvinda staðnar.\nLeiðsögumaðurinn keyrir FFT í endalausri samfösaðri meðaltöltun með grunntóninn tekinn frá rafalanum og FLL á; fyrir dýpsta gólfið skaltu nota HFT248D gluggann og hafa rafveitubælingu af.  Notaðu hreint merki fáeinum dB undir fullum skala og grunntóninn smelltan á bil — síðan Vista .dpd og Beita henni.
