# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Parir tal-ġurnata
tip.dialog.dontShowAgain = Turix iżjed
tip.dialog.next          = Parir li jmiss
tip.dialog.close         = Agħlaq
tip.dialog.closeCountdown = Agħlaq ({0}s)
tip.count = 14
tip.1.title = Il-medja koerenti tħaffer ferm taħt il-livell tal-ħsejjes.
tip.1.body  = Ħalli l-medja koerenti (kumplessa) mixgħula u ħalli l-FFT taħdem — it-ton jiżdied filwaqt li l-ħsejjes parzjalment jitħassru, u għalhekk il-livell ikompli jinżel iktar ma tistenna.
tip.2.title = Waħħal il-ġeneratur ma' bin tal-FFT għal spettru nadif.
tip.2.body  = Bi "Waħħal il-frekwenza mal-eqreb" mixgħula, it-ton jaqa' eżatt fuq bin, u għalhekk it-tixrid ma jċappasx il-fundamentali u l-istimi tal-armoniċi jibqgħu onesti.
tip.3.title = Waħħal il-fundamentali bl-idejn fuq notch twin-T.
tip.3.body  = Null passiv twin-T huwa tant wieqaf li ftit għaxriet ta' hertz ta' drift termali jbiddlu l-fundamentali de-embedded. Daħħal il-livell li tassew taf bih bi "Fundamentali manwali"; l-armoniċi, fuq il-ġenb ġentili, jiġu de-embedded sew.
tip.4.title = Il-modalità esklussiva WASAPI iżżomm il-kejl eżatt sal-bit.
tip.4.body  = Il-modalità esklussiva tgħaddi l-apparat dirett lil Phonalyser, billi tevita l-mixer ta' Windows u l-konvertitur tar-rata tal-kampjuni tiegħu — l-ebda resampling moħbi biex jikkulurixxi r-riżultat.
tip.5.title = WDM-KS jagħti lill-oxxilloskopju l-iktar frames fis-sekonda.
tip.5.body  = Għall-iktar aġġornament mgħaġġel tal-iskop ħaj, agħżel il-backend WDM-KS fil-Preferenzi — joqgħod iktar baxx minn WASAPI u jimbotta iktar blokki ta' kaptura fis-sekonda.
tip.6.title = Ir-rota tal-maws tiżżuma madwar il-kursur.
tip.6.body  = Fi kwalunkwe veduta ta' traċċa: ir-rota tiċċaqlaq vertikalment, Shift+rota orizzontalment, Ctrl+rota tiżżuma l-assi vertikali u Ctrl+Shift+rota dik orizzontali — iż-żewġ żoom iżommu l-valur taħt il-pointer fiss.
tip.7.title = Kull qasam numeriku jaċċetta unitajiet, ir-rota, u t-tastiera.
tip.7.body  = Ikteb valur bl-unità tiegħu (µV, 1.5 V, -3 dBV, 2 kHz), dawwar ir-rota, ikklikkja l-vleġeġ 'il fuq/'l isfel, jew agħfas il-vleġeġ 'il fuq/'l isfel tat-tastiera biex tagħmel pass.
tip.8.title = L-interpolazzjoni sinc tgħodd biss meta tkun żummjat.
tip.8.body  = L-iswiċċ Sin/Lin ibiddel it-traċċa biss meta l-punti tal-kampjuni jkunu ftit pixels 'il bogħod minn xulxin fuq l-iskrin; inkella l-linji dritti jidhru identiċi u jiswew inqas CPU. Ixgħlu ladarba l-kampjuni individwali jkunu viżibbli.
tip.9.title = L-isteresi tistabbilizza t-trigger fuq sinjal dgħajjef u storbjuż.
tip.9.body  = Mingħajru, il-ħsejjes madwar il-livell tat-trigger iqabbdu għadd ta' triggers foloz u t-traċċa titrieżaħ. Ixgħel l-isteresi tat-trigger u t-traċċa tissakkar.
tip.10.title = Sinjal tal-ġeneratur salvat huwa referenza perfetta.
tip.10.body  = "Salva fi..." jikteb il-forma tal-mewġa ideali u matematikament eżatta — l-ebda distorsjoni ta' DAC, amplifikatur jew kejbils. Mexxih lil strument ieħor u kull imperfezzjoni li tkejjel tappartjeni lil dak l-apparat, mhux lis-sors.
tip.11.title = De-embed fixture b'fajl ta' kalibrazzjoni.
tip.11.body  = Kejjel notch, attenwatur jew ir-rispons ta' soundcard darba fil-modulu tar-Rispons tal-frekwenza, imbagħad illowdja dak il-.frc fl-analizzatur FFT: ir-rispons tiegħu jiġi diviż 'il barra fil-ħin tal-wiri, u għalhekk it-tabella turi l-apparat taħt test.
tip.12.title = L-overlay tat-taħbita rikostruwita tikkalma par ta' żewġ toni qrib xulxin.
tip.12.body  = Fil-modalità dual-tone l-overlay "Taħbita rikostruwita" tal-iskop tpinġi l-envelopp bil-mod |f1 - f2|, u għalhekk tista' tittriggerja fuq it-taħbita minflok tiġri wara l-qsim mgħaġġel tal-portatur.
tip.13.title = L-iswiep tar-rispons tal-frekwenza huwa r-referenza tiegħu stess.
tip.13.body  = Il-kejl misħub jiġi dekonvolut kontra l-iswiep eżatt li ndaqq — mhux kopja mkejla mill-ġdid — u għalhekk il-kobor u l-faża rkuprati huma l-funzjoni ta' trasferiment vera tal-apparat.
tip.14.title = Ctrl+F1 jaqbeż dritt għall-għajnuna t-tajba.
tip.14.body  = Agħfas F1 kullimkien għall-manwal, jew Ctrl+F1 biex tiftaħ l-għajnuna fis-sezzjoni eżatta għall-kontroll li bħalissa għandu l-fokus.

