fft.warning.overrun = ⚠ Overrun tal-buffer — sinkronizzat mill-ġdid
fft.warning.overrun.tip = L-analizzatur waqa' buffer sħiħ ta' kaptura lura, u għalhekk il-window reġa' ġie ankrat mal-quċċata ħajja u l-medja tkompli (lakuna fil-kopertura — l-ebda data korrotta).\nOverruns frekwenti jfissru li l-analiżi ma tistax tlaħħaq; baxxi l-overlap jew it-tul tal-FFT.
fft.warning.discontinuity = ⚠ Diskontinwità fis-sinjal — sinkronizzat mill-ġdid
fft.warning.discontinuity.tip = L-analizzatur sab diskontinwità fis-sinjal maqbud (glitch li jikser il-limitu tal-banda / kampjuni mitlufa), warrab il-window affettwat u sinkronizza mill-ġdid, u għalhekk il-medja koerenti tkompli.\nDiskontinwitajiet frekwenti jfissru li s-sors jew il-kaptura qed jiggliċċja taħt il-piż.
fft.warning.alignDrift = ⚠ Il-livell inbidel waqt l-allinjament — statistika rranġata mill-ġdid
fft.warning.alignDrift.tip = Il-livell fundamentali nbidel b''{0} dB waqt li l-frequency lock ġibed il-ġeneratur fuq il-grilja tal-bins tal-FFT.\nIl-medja kurrenti għadha fiha frames ta'' qabel l-allinjament fil-livell il-qadim — ikklikkja Irranġa l-istatistika biex tiġbor medja nadifa.

