# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Sfatul zilei
tip.dialog.dontShowAgain = Nu mai afișa
tip.dialog.next          = Sfatul următor
tip.dialog.close         = Închide
tip.dialog.closeCountdown = Închide ({0}s)
tip.count = 14
tip.1.title = Medierea coerentă pătrunde mult sub pragul de zgomot.
tip.1.body  = Lasă medierea coerentă (complexă) activată și lasă FFT-ul să ruleze — tonul se adună în timp ce zgomotul se anulează parțial, așa că pragul continuă să scadă cu cât aștepți mai mult.
tip.2.title = Aliniază generatorul la un bin FFT pentru un spectru curat.
tip.2.body  = Cu „Aliniază frecvența la cel mai apropiat” activat, tonul cade exact pe un bin, astfel încât scurgerea nu împrăștie fundamentala, iar estimările armonicelor rămân corecte.
tip.3.title = Fixează fundamentala manual la un filtru notch twin-T.
tip.3.body  = Un null pasiv twin-T este atât de abrupt încât câteva zecimi de hertz de derivă termică deplasează fundamentala de-embedată. Introdu nivelul pe care îl cunoști cu adevărat folosind „Fundamentală manuală”; armonicele, aflate pe flancul lin, se de-embedează corect.
tip.4.title = Modul exclusiv WASAPI menține măsurătoarea exactă la nivel de bit.
tip.4.body  = Modul exclusiv predă dispozitivul direct către Phonalyser, ocolind mixerul Windows și convertorul său de rată de eșantionare — fără reeșantionare ascunsă care să coloreze rezultatul.
tip.5.title = WDM-KS oferă osciloscopului cele mai multe cadre pe secundă.
tip.5.body  = Pentru cea mai rapidă reîmprospătare a scopului live, alege backendul WDM-KS în Preferințe — se află mai jos decât WASAPI și împinge mai multe blocuri de captură pe secundă.
tip.6.title = Rotița mouse-ului mărește în jurul cursorului.
tip.6.body  = În orice vizualizare de traseu: rotița mută vertical, Shift+rotiță orizontal, Ctrl+rotiță mărește axa verticală, iar Ctrl+Shift+rotiță pe cea orizontală — ambele măriri mențin fixă valoarea de sub indicator.
tip.7.title = Fiecare câmp numeric acceptă unități, rotița și tastatura.
tip.7.body  = Tastează o valoare cu unitatea ei (µV, 1.5 V, -3 dBV, 2 kHz), derulează rotița, dă clic pe săgețile sus/jos sau apasă tastele sus/jos pentru a pași.
tip.8.title = Interpolarea sinc contează doar când ești apropiat în zoom.
tip.8.body  = Comutatorul Sin/Lin schimbă traseul doar când punctele de eșantionare sunt la câțiva pixeli distanță pe ecran; altfel liniile drepte arată identic și costă mai puțin CPU. Activează-l odată ce eșantioanele individuale devin vizibile.
tip.9.title = Histerezisul stabilizează declanșarea pe un semnal slab și zgomotos.
tip.9.body  = Fără el, zgomotul din jurul nivelului de declanșare provoacă o avalanșă de declanșări false și traseul tremură. Activează histerezisul de declanșare și traseul se blochează.
tip.10.title = Un semnal de generator salvat este o referință perfectă.
tip.10.body  = „Salvează ca...” scrie forma de undă ideală, matematic exactă — fără distorsiuni de la DAC, amplificator sau cablare. Trimite-o către alt instrument și orice imperfecțiune pe care o măsori aparține acelui dispozitiv, nu sursei.
tip.11.title = De-embedează un montaj cu un fișier de calibrare.
tip.11.body  = Măsoară o dată răspunsul unui notch, atenuator sau placă de sunet în modulul Răspuns în frecvență, apoi încarcă acel .frc în analizorul FFT: răspunsul său este împărțit la momentul afișării, astfel încât tabelul arată dispozitivul testat.
tip.12.title = Suprapunerea bătăii reconstruite domolește o pereche apropiată de două tonuri.
tip.12.body  = În modul dublu-ton, suprapunerea „Bătaie reconstruită” a scopului desenează anvelopa lentă |f1 - f2|, astfel încât poți declanșa pe bătaie în loc să urmărești trecerile rapide ale purtătoarei.
tip.13.title = Baleiajul de răspuns în frecvență este propria sa referință.
tip.13.body  = Măsurătoarea baleiată este deconvoluată față de baleiajul exact care a fost redat — nu o copie remăsurată — astfel încât magnitudinea și faza recuperate sunt funcția de transfer reală a dispozitivului.
tip.14.title = Ctrl+F1 sare direct la ajutorul potrivit.
tip.14.body  = Apasă F1 oriunde pentru manual, sau Ctrl+F1 pentru a deschide ajutorul exact la secțiunea pentru controlul care are focalizarea în acel moment.

