# --- predistortion wizard + screenshot comment/font (synced from en) ---
predistortion.button.wizard.tooltip = Măsoară și aplică predistorsiunea DAC.\nBlochează tonul pe un bin FFT, apoi fiecare rundă mediază numărul stabilit de cadre FFT, citește armonicele sinusului (sau produsele de intermodulație ale dublului ton) și trimite o corecție egală și opusă înapoi către generator — repetând până când distorsiunea atinge ținta ta sau încetează să se mai îmbunătățească.\nScop: împinge distorsiunea în jos spre pragul de zgomot; Salvează fișierul .dpd și Aplică-l pentru a păstra tonul compensat.
predistortion.wizard.title = Predistorsiune DAC
predistortion.averages = Medieri, n
predistortion.averages.tooltip = Medieri FFT per rundă (rotiță ±10, săgeți ±1; minimum 10).  Fiecare rundă mediază atâtea cadre, crescând proporțional cu scăderea distorsiunii pe măsură ce converge.  Bucla rulează până când apeși Oprește.
predistortion.targetThd = THD țintă, %
predistortion.targetThd.tooltip = Oprește odată ce THD atinge această valoare (0 = rulează până când stagnează)
predistortion.table.metric = Măsurătoare
predistortion.table.value = Valoare
predistortion.intro = OBLIGATORIU: pune un filtru notch pasiv twin-T, acordat pe fundamentală, între dispozitivul testat și ADC.  Fără el, armonicele proprii ale ADC stabilesc pragul, iar bucla ajunge să compenseze ADC, nu DAC.\nAceasta împinge distorsiunea reziduală a DAC în jos predistorsionând generatorul cu inversul a ceea ce măsoară.\nCum funcționează — 1) blochează tonul pe un bin FFT și așteaptă alinierea;  2) fiecare rundă mediază numărul de cadre FFT stabilit mai jos, citește armonicele sinusului (sau produsele de intermodulație ale dublului ton) și trimite o corecție egală și opusă înapoi către generator;  3) repetă — mediind mai multe cadre pe măsură ce distorsiunea scade — graficul coborând spre pragul de zgomot, până când distorsiunea țintă este atinsă sau progresul stagnează.\nAsistentul rulează FFT-ul cu mediere coerentă infinită, fundamentala preluată de la generator și FLL pornit; pentru cel mai adânc prag folosește fereastra HFT248D și lasă suprimarea rețelei oprită.  Folosește un semnal curat cu câțiva dB sub scala completă și fundamentala aliniată pe un bin — apoi Salvează fișierul .dpd și Aplică-l.
