# ===== TIP OF THE DAY =====

tip.dialog.heading = Порада дня
tip.dialog.dontShowAgain = Більше не показувати
tip.dialog.next = Наступна порада
tip.dialog.close = Закрити
tip.dialog.closeCountdown = Закрити ({0} с)
tip.count = 14
tip.1.title = Когерентне усереднення сягає далеко нижче рівня шуму.
tip.1.body = Залиште когерентне (комплексне) усереднення увімкненим і дайте FFT попрацювати — основний тон накопичується, тоді як шум частково взаємознищується, тож рівень шуму спадає тим більше, чим довше ви чекаєте.
tip.2.title = Прив'яжіть генератор до біна FFT для чистого спектра.
tip.2.body = Коли увімкнено «Прив'язати частоту до найближчого FFT біна», основний тон точно потрапляє на бін, тож просочування енергії не розмазує основну частоту, а оцінки гармонік лишаються чесними.
tip.3.title = Якщо використовується подвійний Т-подібний фільтр, введіть амплітуду вручну основного тону.
tip.3.body = Пасивний twin-T фільтр має настільки крутий спад, що кілька десятих герца теплового дрейфу сильно зміщають відновлену амплітуду основного тону. Введіть рівень, який ви дійсно знаєте, через «Ампл. основної»; амплітуда гармонік на пологому схилі відновлюється майже без помилок.
tip.4.title = Ексклюзивний режим WASAPI зберігає вимірювання точним до біта.
tip.4.body = Ексклюзивний режим утримує звукову карту ексклюзивно за Phonalyser, обходячи мікшер Windows і системні звуки — це може призвести до небажаних наслідків.
tip.5.title = WDM-KS дає осцилографу найбільше кадрів на секунду.
tip.5.body = Для найшвидшого оновлення осцилографа оберіть бекенд WDM-KS у Параметрах — він знаходиться глибше в операційній системі ніж WASAPI й передає більше блоків захоплення на секунду.
tip.6.title = Коліщатко миші масштабує навколо курсора.
tip.6.body = У будь-якому сигнальному вікні: коліщатко рухає по вертикалі, Shift + коліщатко по горизонталі, Ctrl + коліщатко масштабує вертикальну вісь, а Ctrl + Shift + коліщатко — горизонтальну; обидва масштабування лишають значення під курсором нерухомим.
tip.7.title = Кожне числове поле розуміє одиниці вимірювання, коліщатко та кнопки вгору/вниз.
tip.7.body = Введіть значення з його одиницею вимірювання (100 uV [µV], 1.5 V, -3 dBV, 2 kHz), прокрутіть коліщатко, клацніть стрілки вгору/вниз або натисніть клавіші вгору/вниз для покрокової зміни.
tip.8.title = Sinc-інтерполяція має значення лише при збільшенні.
tip.8.body = Перемикач Sin/Lin змінює форму сигналу лише тоді, коли точки відліків віддалені на кілька пікселів на екрані, інакше прямі лінії виглядають однаково й коштують менше CPU. Воно вмикається та вимикається автоматично.
tip.9.title = Гістерезис стабілізує синхронізацію на слабкому, зашумленому сигналі.
tip.9.body = Без нього шум навколо рівня синхронізації спричиняє хибні спрацювання, і сигнал тремтить. Увімкніть гістерезис синхронізації — і сигнал зафіксується.
tip.10.title = Збережений сигнал генератора — ідеальний еталон.
tip.10.body = «Зберегти в...» записує ідеальну, математично точну форму сигналу — без спотворень ЦАП, підсилювача чи кабелів. Подайте її на інший прилад, і будь-яка недосконалість, яку ви виміряєте, належить тому пристрою, а не джерелу.
tip.11.title = Вилучення АЧХ обладнання за допомогою файлу калібрування.
tip.11.body = Виміряйте АЧХ режектора, послаблювача чи звукової карти один раз у модулі частотної характеристики, потім завантажте .frc файл у аналізатор FFT: його форма віднімається від FFT під час відображення, тож вимірювання показують випробовуваний пристрій, а не все змішано разом.
tip.12.title = Накладення відновленої огинаючої поєднує два тони.
tip.12.body = У двотональному режимі осцилографа «Відновлення огинаючої» малює огинаючої |f1 - f2|, тож ви можете синхронізуватися за огинаючою замість того, щоб ганятися за швидкими переходами опорного сигналу.
tip.13.title = Свіп-сигнал є сам собі опорним сигналом.
tip.13.body = Вимірювання, отримане зі свіп-сигналу, проходить зворотну згортку відносно самого свіп-сигналу, а не відносно виміряного, тому відновлена амплітуда та фаза є справжньою передавальною функцією пристрою.
tip.14.title = Ctrl+F1 переходить прямо до потрібної довідки.
tip.14.body = Натисніть F1 будь-де для посібника або Ctrl+F1, щоб відкрити довідку на точному розділі для елемента керування, що зараз у фокусі.

