# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Порада дня
tip.dialog.dontShowAgain = Більше не показувати
tip.dialog.next          = Наступна порада
tip.dialog.close         = Закрити
tip.dialog.closeCountdown = Закрити ({0} с)
tip.count = 14
tip.1.title = Когерентне усереднення сягає далеко нижче рівня шуму.
tip.1.body  = Залиште когерентне (комплексне) усереднення увімкненим і дайте FFT попрацювати — тон накопичується, тоді як шум частково взаємознищується, тож рівень шуму спадає тим більше, чим довше ви чекаєте.
tip.2.title = Прив'яжіть генератор до біна FFT для чистого спектра.
tip.2.body  = Коли увімкнено «Прив'язати частоту до найближчої», тон точно потрапляє на бін, тож просочування не розмазує основну частоту, а оцінки гармонік лишаються чесними.
tip.3.title = Зафіксуйте основну частоту вручну на режекторі типу twin-T.
tip.3.body  = Пасивний провал twin-T настільки крутий, що кілька десятих герца теплового дрейфу розгойдують деембедовану основну частоту. Введіть рівень, який ви дійсно знаєте, через «Основна частота вручну»; гармоніки на пологому схилі деембедуються нормально.
tip.4.title = Ексклюзивний режим WASAPI зберігає вимірювання точним до біта.
tip.4.body  = Ексклюзивний режим передає пристрій напряму Phonalyser, обходячи мікшер Windows та його перетворювач частоти дискретизації — без прихованого перевідліковування, що забарвило б результат.
tip.5.title = WDM-KS дає осцилографу найбільше кадрів на секунду.
tip.5.body  = Для найшвидшого живого оновлення осцилографа оберіть бекенд WDM-KS у Параметрах — він залягає нижче за WASAPI й проштовхує більше блоків захоплення на секунду.
tip.6.title = Коліщатко миші масштабує навколо курсора.
tip.6.body  = У будь-якому вікні трас: коліщатко рухає по вертикалі, Shift+коліщатко по горизонталі, Ctrl+коліщатко масштабує вертикальну вісь, а Ctrl+Shift+коліщатко — горизонтальну; обидва масштабування лишають значення під вказівником нерухомим.
tip.7.title = Кожне числове поле приймає одиниці, коліщатко та клавіатуру.
tip.7.body  = Введіть значення з його одиницею (µV, 1.5 V, -3 dBV, 2 kHz), прокрутіть коліщатко, клацніть стрілки вгору/вниз або натисніть клавіші вгору/вниз для покрокової зміни.
tip.8.title = Sinc-інтерполяція має значення лише при збільшенні.
tip.8.body  = Перемикач Sin/Lin змінює трасу лише тоді, коли точки відліків віддалені на кілька пікселів на екрані; інакше прямі лінії виглядають однаково й коштують менше CPU. Вмикайте її, щойно стануть видні окремі відліки.
tip.9.title = Гістерезис стабілізує синхронізацію на слабкому, зашумленому сигналі.
tip.9.body  = Без нього шум навколо рівня синхронізації спричиняє шквал хибних спрацювань, і траса тремтить. Увімкніть гістерезис синхронізації — і траса зафіксується.
tip.10.title = Збережений сигнал генератора — ідеальний еталон.
tip.10.body  = «Зберегти у...» записує ідеальну, математично точну форму сигналу — без спотворень ЦАП, підсилювача чи кабелів. Подайте її на інший прилад, і будь-яка недосконалість, яку ви виміряєте, належить тому пристрою, а не джерелу.
tip.11.title = Деембедуйте оснастку за допомогою файлу калібрування.
tip.11.body  = Виміряйте характеристику режектора, послаблювача чи звукової карти один раз у модулі частотної характеристики, потім завантажте цей .frc у аналізатор FFT: його характеристика ділиться на час відображення, тож таблиця показує випробовуваний пристрій.
tip.12.title = Накладання відновлених биттів приборкує близьку пару двох тонів.
tip.12.body  = У двотональному режимі накладання осцилографа «Відновлені биття» малює повільну обвідну |f1 - f2|, тож ви можете синхронізуватися за биттями замість того, щоб ганятися за швидкими переходами носія.
tip.13.title = Свіп частотної характеристики є власним еталоном.
tip.13.body  = Свіп-вимірювання деконволюється проти точного свіпу, що був відтворений — а не повторно виміряної копії — тож відновлені амплітуда і фаза є істинною передавальною функцією пристрою.
tip.14.title = Ctrl+F1 переходить прямо до потрібної довідки.
tip.14.body  = Натисніть F1 будь-де для посібника або Ctrl+F1, щоб відкрити довідку на точному розділі для елемента керування, що зараз у фокусі.

