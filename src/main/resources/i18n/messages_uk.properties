# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Виміряти й застосувати предспотворення ЦАП.\nВоно прив'язує тон до біна FFT, потім кожен раунд усереднює задану\n кількість кадрів FFT, зчитує гармоніки синуса (або продукти\n інтермодуляції двох тонів) і подає назад на генератор рівну й протилежну корекцію — повторюючи\n це, доки спотворення не сягне вашої цілі або перестане покращуватися.\nМета: зігнати спотворення вниз до рівня шуму; збережіть .dpd та застосуйте його (Apply), щоб лишити компенсований тон.
predistortion.wizard.title = Предспотворення ЦАП
predistortion.averages = Усереднень, n
predistortion.averages.tooltip = Усереднень FFT за раунд (мінімум 10).  Кожен раунд усереднює стільки кадрів, зростаючи\n пропорційно до спаду спотворень у міру збіжності.  Цикл працює, доки ви не натиснете Стоп.
predistortion.targetThd = Цільовий THD, %
predistortion.targetThd.tooltip = Зупинитися, щойно THD сягне цього значення (0 = працювати, доки не застрягне)
predistortion.table.metric = Вимірювання
predistortion.table.value = Значення
predistortion.intro = ОБОВ'ЯЗКОВО: установіть пасивний режекторний фільтр twin-T, налаштований на основну частоту, між випробовуваним пристроєм та АЦП.  Без нього власні гармоніки АЦП задають рівень, і цикл зрештою компенсує АЦП, а не ЦАП.\nЦе зганяє залишкове спотворення ЦАП униз, попередньо спотворюючи генератор оберненим до того, що він вимірює.\nЯк це працює — 1) воно прив'язує тон до біна FFT і чекає вирівнювання;  2) кожен раунд усереднює задану нижче кількість кадрів FFT, зчитує гармоніки синуса (або продукти інтермодуляції двох тонів) і подає назад на генератор рівну й протилежну корекцію;  3) воно повторюється — усереднюючи більше кадрів у міру спаду спотворень — графік спадає до рівня шуму, доки не сягне цільового спотворення або поступ не застрягне.\nМайстер запускає FFT у нескінченному когерентному усередненні з основною частотою, взятою з генератора, та увімкненим FLL; для найглибшого рівня шуму використовуйте вікно HFT248D і лишіть придушення мережі вимкненим.  Використовуйте чистий сигнал на кілька dB нижче повної шкали з основною частотою, прив'язаною до біна — потім збережіть .dpd та застосуйте його (Apply).
