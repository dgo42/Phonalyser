# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = 量測並套用 DAC 預失真。\n它先將訊號鎖定至某個 FFT 頻段，接著每一輪平均所設定數量的 FFT 影格，讀取正弦波的諧波（或雙音的互調產物），並將等量反向的校正回饋給產生器——重複進行，直到失真達到您的目標或不再改善為止。\n目標：將失真壓低至接近雜訊底線；儲存 .dpd 並套用以保留已補償的訊號。
predistortion.wizard.title = DAC 預失真
predistortion.averages = 平均次數，n
predistortion.averages.tooltip = 每一輪的 FFT 平均次數（最少 10）。每一輪平均這麼多影格，並隨收斂時失真下降的比例而增加。迴路會持續執行，直到您按下停止。
predistortion.targetThd = 目標 THD，%
predistortion.targetThd.tooltip = THD 達到此值後即停止（0 = 一直執行直到停滯）
predistortion.table.metric = 量測項目
predistortion.table.value = 數值
predistortion.intro = 必要條件：在受測裝置與 ADC 之間放置一個調諧至基頻的被動雙 T 凹陷濾波器。少了它，ADC 自身的諧波會決定底線，迴路最終會補償 ADC，而非 DAC。\n它以產生器所量得結果的反相來預失真產生器，藉此壓低 DAC 的殘餘失真。\n運作方式——1) 它將訊號鎖定至某個 FFT 頻段並等待對齊；2) 每一輪平均下方設定的 FFT 影格數，讀取正弦波的諧波（或雙音的互調產物），並將等量反向的校正回饋給產生器；3) 它重複進行——隨著失真下降平均更多影格——圖表朝雜訊底線下降，直到達到目標失真或進度停滯。\n精靈以無限同調平均執行 FFT，基頻取自產生器並開啟 FLL；若要最深的底線，請使用 HFT248D 視窗並關閉市電抑制。請使用低於全幅幾 dB 的乾淨訊號，並將基頻對齊至某個頻段——接著儲存 .dpd 並套用它。
