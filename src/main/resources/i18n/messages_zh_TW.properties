# ===== TIP OF THE DAY =====

tip.dialog.heading = 每日小秘訣
tip.dialog.dontShowAgain = 不再顯示
tip.dialog.next = 下一則秘訣
tip.dialog.close = 關閉
tip.dialog.closeCountdown = 關閉 ({0}s)
tip.count = 14
tip.1.title = 同調平均能挖掘遠低於雜訊底線的訊號。
tip.1.body = 讓同調（複數）平均保持開啟並讓 FFT 持續執行——訊號會累加而雜訊部分抵消，因此等待越久，雜訊底線就越低。
tip.2.title = 將產生器對齊到 FFT 頻段以取得乾淨頻譜。
tip.2.body = 開啟「頻率對齊至最近頻段」後，訊號會精確落在某個頻段上，因此洩漏不會塗抹基頻，諧波估計也會保持準確。
tip.3.title = 在雙 T 凹陷濾波器上手動鎖定基頻。
tip.3.body = 被動雙 T 凹陷極為陡峭，幾分之一赫茲的熱漂移就會使解嵌出的基頻擺動。請以「手動基頻」輸入您確實知道的位準；位於緩坡上的諧波則能正常解嵌。
tip.4.title = WASAPI 獨佔模式讓量測保持位元精確。
tip.4.body = 獨佔模式將裝置直接交給 Phonalyser，繞過 Windows 混音器及其取樣率轉換器——沒有隱藏的重新取樣來污染結果。
tip.5.title = WDM-KS 給示波器最高的每秒影格數。
tip.5.body = 若要最快的即時示波器更新，請在偏好設定中選擇 WDM-KS 後端——它的層級比 WASAPI 更低，每秒推送更多擷取區塊。
tip.6.title = 滑鼠滾輪以游標為中心縮放。
tip.6.body = 在任何軌跡檢視中：滾輪垂直移動，Shift+滾輪水平移動，Ctrl+滾輪縮放垂直軸，Ctrl+Shift+滾輪縮放水平軸——兩種縮放都讓指標下方的值保持固定。
tip.7.title = 每個數值欄位都接受單位、滾輪與鍵盤。
tip.7.body = 輸入帶單位的值（µV、1.5 V、-3 dBV、2 kHz）、滾動滾輪、按上下箭頭，或按鍵盤上下鍵來逐步調整。
tip.8.title = Sinc 內插只在放大時才有意義。
tip.8.body = Sin/Lin 切換只在螢幕上取樣點相距幾個像素時才改變軌跡；否則直線看起來完全相同且更省 CPU。當個別取樣點可見時再開啟它。
tip.9.title = 遲滯能在微弱、含雜訊的訊號上穩定觸發。
tip.9.body = 沒有它，觸發位準附近的雜訊會引發一連串誤觸發，軌跡也會抖動。啟用觸發遲滯後軌跡便會鎖定。
tip.10.title = 已儲存的產生器訊號是完美的參考。
tip.10.body = 「儲存至...」會寫出理想、數學上精確的波形——沒有 DAC、放大器或線材失真。將它饋送到另一台儀器，您所量到的任何瑕疵都屬於該裝置，而非訊號源。
tip.11.title = 以校正檔解嵌治具。
tip.11.body = 在頻率響應模組中量測一次凹陷、衰減器或音效卡的響應，然後將該 .frc 載入 FFT 分析器：其響應會在顯示時被除去，因此表格顯示的是受測裝置。
tip.12.title = 重建拍頻疊加可馴服相近的雙音對。
tip.12.body = 在雙音模式下，示波器的「重建拍頻」疊加會繪出緩慢的 |f1 - f2| 包絡，因此您可以觸發拍頻，而不必追逐快速的載波過零點。
tip.13.title = 頻率響應掃頻是它自己的參考。
tip.13.body = 掃頻量測會對所播放的精確掃頻進行解卷積——而非重新量測的副本——因此還原出的幅度與相位即為裝置真正的轉移函數。
tip.14.title = Ctrl+F1 直接跳到對應的說明。
tip.14.body = 在任何地方按 F1 開啟手冊，或按 Ctrl+F1 在目前取得焦點之控制項的確切章節開啟說明。

