# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Dica do dia
tip.dialog.dontShowAgain = Não mostrar novamente
tip.dialog.next          = Dica seguinte
tip.dialog.close         = Fechar
tip.dialog.closeCountdown = Fechar ({0}s)
tip.count = 14
tip.1.title = A média coerente revela sinais muito abaixo do ruído de fundo.
tip.1.body  = Deixe a média coerente (complexa) ligada e deixe a FFT correr — o tom soma-se enquanto o ruído se cancela parcialmente, por isso o piso continua a descer quanto mais esperar.
tip.2.title = Encaixe o gerador num bin da FFT para um espetro limpo.
tip.2.body  = Com "Encaixar frequência no mais próximo" ligado, o tom assenta exatamente num bin, de modo que a fuga não esborrata a fundamental e as estimativas de harmónicos mantêm-se fiáveis.
tip.3.title = Fixe a fundamental manualmente num notch twin-T.
tip.3.body  = Um null twin-T passivo é tão abrupto que umas décimas de hertz de deriva térmica fazem oscilar a fundamental desincorporada. Introduza o nível que realmente conhece com "Fundamental manual"; os harmónicos, no flanco suave, desincorporam-se bem.
tip.4.title = O modo exclusivo WASAPI mantém a medição bit-exata.
tip.4.body  = O modo exclusivo entrega o dispositivo diretamente ao Phonalyser, contornando o mixer do Windows e o seu conversor de taxa de amostragem — sem reamostragem oculta a colorir o resultado.
tip.5.title = O WDM-KS dá ao osciloscópio o maior número de frames por segundo.
tip.5.body  = Para a atualização ao vivo mais rápida do osciloscópio, escolha o backend WDM-KS nas Preferências — situa-se abaixo do WASAPI e empurra mais blocos de captura por segundo.
tip.6.title = A roda do rato faz zoom à volta do cursor.
tip.6.body  = Em qualquer vista de traçado: a roda move na vertical, Shift+roda na horizontal, Ctrl+roda amplia o eixo vertical e Ctrl+Shift+roda o horizontal — ambos os zooms mantêm fixo o valor sob o ponteiro.
tip.7.title = Cada campo numérico aceita unidades, a roda e o teclado.
tip.7.body  = Escreva um valor com a sua unidade (µV, 1.5 V, -3 dBV, 2 kHz), gire a roda, clique nas setas para cima/baixo ou prima as teclas para cima/baixo do teclado para incrementar.
tip.8.title = A interpolação sinc só importa quando está com zoom.
tip.8.body  = O comutador Sin/Lin altera o traçado apenas quando os pontos de amostra estão a alguns pixels de distância no ecrã; caso contrário, as linhas retas parecem idênticas e custam menos CPU. Ligue-o assim que as amostras individuais forem visíveis.
tip.9.title = A histerese estabiliza o trigger num sinal fraco e ruidoso.
tip.9.body  = Sem ela, o ruído em torno do nível de trigger dispara uma rajada de triggers falsos e o traçado treme. Ative a histerese de trigger e o traçado fixa-se.
tip.10.title = Um sinal de gerador guardado é uma referência perfeita.
tip.10.body  = "Guardar em..." escreve a forma de onda ideal, matematicamente exata — sem distorção de DAC, amplificador ou cablagem. Alimente-a a outro instrumento e qualquer imperfeição que medir pertence a esse dispositivo, não à fonte.
tip.11.title = Desincorpore um dispositivo com um ficheiro de calibração.
tip.11.body  = Meça uma vez a resposta de um notch, atenuador ou placa de som no módulo de Resposta em frequência, depois carregue esse .frc no analisador de FFT: a sua resposta é dividida na altura da exibição, de modo que a tabela mostra o dispositivo sob teste.
tip.12.title = A sobreposição de batimento reconstruído domina um par de dois tons próximos.
tip.12.body  = No modo de tom duplo, a sobreposição "Batimento reconstruído" do osciloscópio desenha a envolvente lenta |f1 - f2|, para que possa disparar no batimento em vez de perseguir os cruzamentos rápidos da portadora.
tip.13.title = A varredura de resposta em frequência é a sua própria referência.
tip.13.body  = A medição varrida é deconvolucionada contra a varredura exata que foi reproduzida — não uma cópia remedida — pelo que a magnitude e fase recuperadas são a verdadeira função de transferência do dispositivo.
tip.14.title = Ctrl+F1 salta diretamente para a ajuda certa.
tip.14.body  = Prima F1 em qualquer lado para o manual, ou Ctrl+F1 para abrir a ajuda na secção exata do controlo que tem o foco no momento.

