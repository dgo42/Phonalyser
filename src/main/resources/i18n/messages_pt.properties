# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Medir e aplicar a predistorção do DAC.\nFixa o tom num bin da FFT, depois cada ronda promedia o número definido de frames da FFT, lê os harmónicos do seno (ou os produtos de intermodulação do tom duplo) e devolve uma correção igual e oposta ao gerador — repetindo até a distorção atingir o seu alvo ou deixar de melhorar.\nObjetivo: baixar a distorção em direção ao ruído de fundo; Guarde o .dpd e Aplique-o para manter o tom compensado.
predistortion.wizard.title = Predistorção do DAC
predistortion.averages = Médias, n
predistortion.averages.tooltip = Médias da FFT por ronda (mínimo 10).  Cada ronda promedia este número de frames, crescendo proporcionalmente à queda da distorção à medida que converge.  O ciclo corre até premir Parar.
predistortion.targetThd = THD alvo, %
predistortion.targetThd.tooltip = Parar assim que o THD atingir este valor (0 = correr até estagnar)
predistortion.table.metric = Medição
predistortion.table.value = Valor
predistortion.intro = OBRIGATÓRIO: coloque um filtro notch twin-T passivo, sintonizado na fundamental, entre o dispositivo sob teste e o ADC.  Sem ele, os próprios harmónicos do ADC definem o piso e o ciclo acaba por compensar o ADC, não o DAC.\nIsto baixa a distorção residual do DAC pré-distorcendo o gerador com o inverso do que mede.\nComo funciona — 1) fixa o tom num bin da FFT e aguarda o alinhamento;  2) cada ronda promedia o número de frames da FFT definido abaixo, lê os harmónicos do seno (ou os produtos de intermodulação do tom duplo) e devolve uma correção igual e oposta ao gerador;  3) repete — promediando mais frames à medida que a distorção desce — com o gráfico a cair em direção ao ruído de fundo, até a distorção alvo ser atingida ou o progresso estagnar.\nO assistente corre a FFT em média coerente infinita com a fundamental obtida do gerador e o FLL ligado; para o piso mais profundo use a janela HFT248D e deixe a supressão da rede desligada.  Use um sinal limpo alguns dB abaixo do fundo de escala e a fundamental encaixada num bin — depois Guarde o .dpd e Aplique-o.
