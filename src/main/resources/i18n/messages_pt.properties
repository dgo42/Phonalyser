# ---- Frequency response
preferences.freqResp.lineWidth = Espessura da linha do traçado, px:
preferences.freqResp.lineWidth.tooltip = Espessura da linha do traçado de resposta em frequência em pixels (curvas de magnitude, fase, referência RIAA e comparação)
preferences.freqResp.maxFreqPctNyquist = Frequência máxima analisada, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = Limita o limite superior da vista de Resposta em frequência a esta fração de Nyquist (sampleRate / 2).  96–100 %.  100 % = Nyquist estrito; valores menores recortam a banda onde a energia do kernel de deconvolução decai.
preferences.freqResp.compareSmoothWindow = Janela de suavização da comparação, 1/N oitava
preferences.freqResp.compareSmoothWindow.tooltip = Largura do filtro de média móvel aplicado à curva do modo de comparação (medida − referência), expressa em unidades de 1/N de oitava.  N = 0 desativa a suavização.  N menor = janela mais larga = mais suavização (N=3 ≈ 1/3 de oitava, larga), N maior = mais estreita = mais leve (N=24 ≈ 1/24 de oitava, padrão de áudio).
preferences.freqResp.notch.enable = Permitir filtro notch para ruído industrial
preferences.freqResp.notch.enable.tooltip = Quando ativado, a vista de Resposta em frequência interpola sobre cada harmónico da frequência da rede escolhida (50/60 Hz) — remove os picos de zumbido da rede da resposta exibida sem remedir.
preferences.freqResp.notch.baseHz = Frequência industrial
preferences.freqResp.notch.baseHz.tooltip = Frequência base cujos harmónicos (50, 100, 150, … Hz ou 60, 120, 180, …) são removidos com notch quando a caixa acima está ligada.
preferences.freqResp.signalColor = Cor do sinal
preferences.freqResp.phaseColor = Cor da fase
preferences.freqResp.referenceColor = Cor da referência (RIAA)
preferences.freqResp.backgroundColor = Cor de fundo do gráfico

