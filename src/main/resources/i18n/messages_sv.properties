# ===== TIP OF THE DAY =====

tip.dialog.heading = Dagens tips
tip.dialog.dontShowAgain = Visa inte igen
tip.dialog.next = Nästa tips
tip.dialog.close = Stäng
tip.dialog.closeCountdown = Stäng ({0} s)
tip.count = 14
tip.1.title = Koherent medelvärdesbildning gräver långt under brusgolvet.
tip.1.body = Låt koherent (komplex) medelvärdesbildning vara på och låt FFT:n gå — tonen summeras medan bruset delvis tar ut sig, så golvet fortsätter sjunka ju längre du väntar.
tip.2.title = Lås generatorn till en FFT-bin för ett rent spektrum.
tip.2.body = Med "Lås frekvens till närmaste" på hamnar tonen exakt på en bin, så läckage inte smetar ut grundtonen och övertonsskattningarna förblir ärliga.
tip.3.title = Lås grundtonen för hand på ett twin-T-notch.
tip.3.body = En passiv twin-T-null är så brant att några tiondels hertz termisk drift svänger den de-inbäddade grundtonen. Ange nivån du faktiskt känner till med "Manuell grundton"; övertonerna, på den flacka flanken, de-inbäddas felfritt.
tip.4.title = WASAPI exklusivt läge håller mätningen bit-exakt.
tip.4.body = Exklusivt läge överlämnar enheten direkt till Phonalyser och förbigår Windows-mixern och dess samplingsfrekvensomvandlare — ingen dold omsampling som färgar resultatet.
tip.5.title = WDM-KS ger oscilloskopet flest bildrutor per sekund.
tip.5.body = För snabbast live-uppdatering av skopet, välj WDM-KS-backend i Inställningar — den ligger lägre än WASAPI och skickar fler insamlingsblock per sekund.
tip.6.title = Mushjulet zoomar runt markören.
tip.6.body = I valfri trace-vy: hjulet flyttar vertikalt, Skift+hjul horisontellt, Ctrl+hjul zoomar den vertikala axeln och Ctrl+Skift+hjul den horisontella — båda zoomarna håller värdet under pekaren fast.
tip.7.title = Varje numeriskt fält tar enheter, hjulet och tangentbordet.
tip.7.body = Skriv ett värde med dess enhet (µV, 1.5 V, -3 dBV, 2 kHz), rulla hjulet, klicka på upp/ned-pilarna, eller tryck upp/ned-tangenterna för att stega.
tip.8.title = Sinc-interpolation spelar roll bara när du har zoomat in.
tip.8.body = Sin/Lin-omkopplaren ändrar tracen bara när samplingspunkter är ett par pixlar isär på skärmen; annars ser raka linjer identiska ut och kostar mindre CPU. Slå på den när enskilda samplingar blir synliga.
tip.9.title = Hysteres stabiliserar triggern på en svag, brusig signal.
tip.9.body = Utan den får brus runt triggernivån en svärm falska triggningar att utlösas och tracen darrar. Aktivera triggerhysteres så låser tracen.
tip.10.title = En sparad generatorsignal är en perfekt referens.
tip.10.body = "Spara till..." skriver den ideala, matematiskt exakta vågformen — ingen DAC-, förstärkar- eller kablageförvrängning. Mata den till ett annat instrument och varje brist du mäter tillhör den enheten, inte källan.
tip.11.title = De-inbädda en fixtur med en kalibreringsfil.
tip.11.body = Mät en notch, attenuator eller ett ljudkorts respons en gång i Frekvensrespons-modulen, ladda sedan den .frc:n i FFT-analysatorn: dess respons divideras bort vid visningstillfället, så tabellen visar enheten under test.
tip.12.title = Det rekonstruerade svävnings-överlägget tämjer ett nära tonpar.
tip.12.body = I dubbeltonsläge ritar skopets överlägg "Rekonstruerad svävning" det långsamma |f1 - f2|-höljet, så att du kan trigga på svävningen istället för att jaga de snabba bärvågskorsningarna.
tip.13.title = Frekvensrespons-svepet är sin egen referens.
tip.13.body = Den svepta mätningen avfaltas mot exakt det svep som spelades upp — inte en ommätt kopia — så den återvunna magnituden och fasen är enhetens sanna överföringsfunktion.
tip.14.title = Ctrl+F1 hoppar direkt till rätt hjälp.
tip.14.body = Tryck F1 var som helst för manualen, eller Ctrl+F1 för att öppna hjälpen vid exakt avsnitt för kontrollen som för tillfället har fokus.

