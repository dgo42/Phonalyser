# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mät och tillämpa DAC-predistorsion.\nDen låser tonen till en FFT-bin och medelvärdesbildar sedan varje runda det angivna antalet FFT-ramar, läser sinusens övertoner (eller dubbeltonens intermodulationsprodukter) och matar tillbaka en lika stor och motriktad korrigering till generatorn — och upprepar tills distorsionen når ditt mål eller slutar förbättras.\nMål: driv distorsionen ned mot brusgolvet; Spara .dpd-filen och Tillämpa den för att behålla den kompenserade tonen.
predistortion.wizard.title = DAC-predistorsion
predistortion.averages = Medelvärden, n
predistortion.averages.tooltip = FFT-medelvärden per runda (minst 10).  Varje runda medelvärdesbildar så här många ramar, växande i proportion till distorsionsfallet allteftersom den konvergerar.  Loopen körs tills du trycker Stopp.
predistortion.targetThd = Mål-THD, %
predistortion.targetThd.tooltip = Stoppa när THD når detta värde (0 = kör tills den stannar)
predistortion.table.metric = Mätning
predistortion.table.value = Värde
predistortion.intro = OBLIGATORISKT: placera ett passivt twin-T-notchfilter, avstämt till grundtonen, mellan enheten under test och ADC:n.  Utan det sätter ADC:ns egna övertoner golvet och loopen kompenserar i slutändan ADC:n, inte DAC:n.\nDetta driver ned DAC:ns kvarvarande distorsion genom att predistorera generatorn med inversen av det den mäter.\nSå fungerar det — 1) den låser tonen på en FFT-bin och väntar på inriktning;  2) varje runda medelvärdesbildar den antalet FFT-ramar inställt nedan, läser sinusens övertoner (eller dubbeltonens intermodulationsprodukter) och matar tillbaka en lika stor och motriktad korrigering till generatorn;  3) den upprepar — medelvärdesbildar fler ramar allteftersom distorsionen sjunker — diagrammet faller mot brusgolvet, tills måldistorsionen nås eller framstegen stannar.\nGuiden kör FFT:n i oändlig koherent medelvärdesbildning med grundtonen tagen från generatorn och FLL på; för djupast golv använd HFT248D-fönstret och lämna nätundertryckning av.  Använd en ren signal några dB under fullskala och grundtonen låst till en bin — Spara sedan .dpd-filen och Tillämpa den.
