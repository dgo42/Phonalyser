# ===== TIP OF THE DAY =====

tip.dialog.heading = A nap tippje
tip.dialog.dontShowAgain = Ne jelenjen meg többé
tip.dialog.next = Következő tipp
tip.dialog.close = Bezárás
tip.dialog.closeCountdown = Bezárás ({0} mp)
tip.count = 14
tip.1.title = A koherens átlagolás mélyen a zajküszöb alá ás.
tip.1.body = Hagyd bekapcsolva a koherens (komplex) átlagolást, és hagyd futni az FFT-t — a hang összeadódik, miközben a zaj részben kioltja egymást, így a küszöb egyre lejjebb csúszik, minél tovább vársz.
tip.2.title = Igazítsd a generátort egy FFT-binhez a tiszta spektrumért.
tip.2.body = A „Frekvencia igazítása a legközelebbihez" bekapcsolásával a hang pontosan egy binre esik, így a szivárgás nem keni el az alapharmonikust, és a felharmonikus-becslések becsületesek maradnak.
tip.3.title = Rögzítsd kézzel az alapharmonikust egy twin-T notch-on.
tip.3.body = A passzív twin-T null annyira meredek, hogy néhány tized hertznyi termikus sodródás megrángatja a kibontott alapharmonikust. Add meg a ténylegesen ismert szintet a „Kézi alapharmonikus" mezőben; a felharmonikusok a szelíd letörésen rendben kibonthatók.
tip.4.title = A WASAPI kizárólagos mód bittiszta marad a méréshez.
tip.4.body = A kizárólagos mód közvetlenül a Phonalysernek adja át az eszközt, megkerülve a Windows keverőt és annak mintavételezésiráta-konverterét — nincs rejtett újramintavételezés, ami elszínezné az eredményt.
tip.5.title = A WDM-KS adja az oszcilloszkópnak a legtöbb képkockát másodpercenként.
tip.5.body = A leggyorsabb élő szkóp-frissítéshez válaszd a WDM-KS háttérprogramot a Beállításokban — alacsonyabban ül, mint a WASAPI, és több rögzítési blokkot tol ki másodpercenként.
tip.6.title = Az egérgörgő a kurzor körül nagyít.
tip.6.body = Bármely nyomvonalnézetben: a görgő függőlegesen mozgat, a Shift+görgő vízszintesen, a Ctrl+görgő a függőleges tengelyt nagyítja, a Ctrl+Shift+görgő pedig a vízszinteset — mindkét nagyítás fixen tartja a mutató alatti értéket.
tip.7.title = Minden számmező elfogadja a mértékegységeket, a görgőt és a billentyűzetet.
tip.7.body = Írj be egy értéket a mértékegységével (µV, 1.5 V, -3 dBV, 2 kHz), görgesd a görgőt, kattints a fel/le nyilakra, vagy nyomd meg a billentyűzet fel/le gombjait a léptetéshez.
tip.8.title = A sinc-interpoláció csak ránagyítva számít.
tip.8.body = A Sin/Lin kapcsoló csak akkor változtatja meg a nyomvonalat, ha a mintapontok pár pixelnyire vannak egymástól a képernyőn; egyébként az egyenes vonalak azonosnak látszanak, és kevesebb CPU-t igényelnek. Kapcsold be, ha az egyes minták már láthatók.
tip.9.title = A hiszterézis stabilizálja a triggert gyenge, zajos jelnél.
tip.9.body = Nélküle a triggerszint körüli zaj egy sereg hamis triggert indít, és a nyomvonal remeg. Kapcsold be a trigger-hiszterézist, és a nyomvonal beáll.
tip.10.title = Egy elmentett generátorjel tökéletes referencia.
tip.10.body = A „Mentés..." a tökéletes, matematikailag pontos jelalakot írja ki — nincs DAC-, erősítő- vagy kábelezési torzítás. Add egy másik műszernek, és bármilyen tökéletlenséget mérsz, az az eszközhöz tartozik, nem a forráshoz.
tip.11.title = Bonts ki egy kapcsolóeszközt kalibrációs fájllal.
tip.11.body = Mérd meg egy notch, attenuátor vagy hangkártya válaszát egyszer a Frekvenciaválasz modulban, majd töltsd be azt a .frc-t az FFT-analizátorba: a válasza megjelenítéskor leosztásra kerül, így a táblázat a vizsgált eszközt mutatja.
tip.12.title = A rekonstruált lebegés-fedvény megszelídít egy közeli kéthangú párt.
tip.12.body = Kéthangú módban a szkóp „Rekonstruált lebegés" fedvénye a lassú |f1 - f2| burkológörbét rajzolja, így a lebegésre triggerelhetsz a gyors vivő-keresztezések hajszolása helyett.
tip.13.title = A frekvenciaválasz-pásztázás önmaga referenciája.
tip.13.body = A pásztázott mérést a ténylegesen lejátszott pontos pásztázáshoz dekonvolválja — nem egy újramért másolathoz —, így a visszanyert amplitúdó és fázis az eszköz valódi átviteli függvénye.
tip.14.title = A Ctrl+F1 egyenesen a megfelelő súgóhoz ugrik.
tip.14.body = Nyomd meg az F1-et bárhol a kézikönyvért, vagy a Ctrl+F1-et, hogy a súgó pontosan annál a szakasznál nyíljon meg, amely az éppen fókuszban lévő vezérlőhöz tartozik.

