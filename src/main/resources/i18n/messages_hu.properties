# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = DAC-előtorzítás mérése és alkalmazása.\nA hangot egy FFT-binhez rögzíti, majd minden kör átlagolja a beállított számú FFT-keretet, leolvassa a szinusz felharmonikusait (vagy a kéthangú jel intermodulációs termékeit), és egyenlő-és-ellentétes korrekciót juttat vissza a generátorba — addig ismételve, amíg a torzítás eléri a célt vagy abbahagyja a javulást.\nCél: a torzítást a zajküszöb felé hajtani; Mentsd a .dpd fájlt és Alkalmazd a kompenzált hang megtartásához.
predistortion.wizard.title = DAC-előtorzítás
predistortion.averages = Átlagolások, n
predistortion.averages.tooltip = FFT-átlagolások köronként (minimum 10).  Minden kör ennyi keretet átlagol, a konvergencia során a torzításcsökkenéssel arányosan növekedve.  A ciklus addig fut, amíg meg nem nyomod a Leállítást.
predistortion.targetThd = Cél-THD, %
predistortion.targetThd.tooltip = Leállítás, amint a THD eléri ezt az értéket (0 = futtatás, amíg meg nem akad)
predistortion.table.metric = Mérés
predistortion.table.value = Érték
predistortion.intro = KÖTELEZŐ: helyezz egy passzív, az alapharmonikusra hangolt twin-T notch-szűrőt a vizsgált eszköz és az ADC közé.  Nélküle az ADC saját felharmonikusai szabják meg a küszöböt, és a ciklus végül az ADC-t kompenzálja, nem a DAC-ot.\nEz a DAC maradék torzítását hajtja le azzal, hogy a generátort a mért torzítás inverzével előtorzítja.\nHogyan működik — 1) a hangot egy FFT-binre rögzíti és megvárja az igazítást;  2) minden kör átlagolja az alább beállított számú FFT-keretet, leolvassa a szinusz felharmonikusait (vagy a kéthangú jel intermodulációs termékeit), és egyenlő-és-ellentétes korrekciót juttat vissza a generátorba;  3) ismétli — egyre több keretet átlagolva, ahogy a torzítás csökken — a grafikon a zajküszöb felé esik, amíg el nem éri a cél-torzítást vagy meg nem akad a haladás.\nA varázsló az FFT-t végtelen koherens átlagolásban futtatja, az alapharmonikust a generátorból véve és bekapcsolt FLL-lel; a legmélyebb küszöbhöz használd a HFT248D ablakot, és hagyd kikapcsolva a hálózati elnyomást.  Használj tiszta, a teljes skála alatt néhány dB-vel lévő jelet, az alapharmonikust egy binhez illesztve — majd Mentsd a .dpd fájlt és Alkalmazd.
