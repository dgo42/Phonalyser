# ===== TIP OF THE DAY =====

tip.dialog.heading = טיפ היומי
tip.dialog.dontShowAgain = אל תציג שוב
tip.dialog.next = הטיפ הבא
tip.dialog.close = סגור
tip.dialog.closeCountdown = סגור ({0}s)
tip.count = 14
tip.1.title = מיצוע קוהרנטי חופר הרחק מתחת לרצפת הרעש.
tip.1.body = השאר את המיצוע הקוהרנטי (המרוכב) פועל ותן ל-FFT לרוץ — הטון מצטבר בעוד הרעש מתבטל חלקית, כך שהרצפה ממשיכה לרדת ככל שתמתין יותר.
tip.2.title = הצמד את המחולל לבין FFT לקבלת ספקטרום נקי.
tip.2.body = כש"הצמדת תדר לקרוב ביותר" פועלת, הטון נוחת בדיוק על בין, כך שהדליפה אינה מורחת את התדר היסודי והערכות ההרמוניות נשארות אמינות.
tip.3.title = קבע את התדר היסודי ידנית במסנן twin-T.
tip.3.body = מסנן twin-T פסיבי תלול כל כך שכמה עשיריות הרץ של סחיפה תרמית מנדנדות את התדר היסודי המחולץ. הזן את הרמה שאתה באמת יודע באמצעות "תדר יסודי ידני"; ההרמוניות, על המדרון המתון, מתחלצות היטב.
tip.4.title = מצב בלעדי של WASAPI שומר על המדידה מדויקת ברמת הסיביות.
tip.4.body = מצב בלעדי מוסר את ההתקן ישירות ל-Phonalyser, עוקף את מערבל Windows ואת ממיר קצב הדגימה שלו — ללא דגימה מחדש נסתרת שתצבע את התוצאה.
tip.5.title = WDM-KS מעניק לאוסצילוסקופ את מירב הפריימים לשנייה.
tip.5.body = לרענון הסקופ החי המהיר ביותר, בחר את ה-backend מסוג WDM-KS בהעדפות — הוא יושב נמוך יותר מ-WASAPI ודוחף יותר בלוקי לכידה לשנייה.
tip.6.title = גלגל העכבר מתקרב סביב הסמן.
tip.6.body = בכל תצוגת עקבה: הגלגל מזיז אנכית, Shift+הגלגל אופקית, Ctrl+הגלגל מקרב את הציר האנכי ו-Ctrl+Shift+הגלגל את האופקי — שני סוגי ההתקרבות שומרים את הערך שמתחת למצביע קבוע.
tip.7.title = כל שדה מספרי מקבל יחידות, את הגלגל ואת המקלדת.
tip.7.body = הקלד ערך עם היחידה שלו (µV, 1.5 V, ‎-3 dBV, 2 kHz), גלגל את הגלגל, לחץ על חצי מעלה/מטה, או הקש על מקשי מעלה/מטה במקלדת כדי לדלג.
tip.8.title = אינטרפולציית sinc חשובה רק כשמתקרבים.
tip.8.body = מתג Sin/Lin משנה את העקבה רק כשנקודות הדגימה מרוחקות זו מזו בכמה פיקסלים על המסך; אחרת קווים ישרים נראים זהים ועולים פחות במעבד. הפעל אותו ברגע שדגימות בודדות נראות.
tip.9.title = היסטרזיס מייצב את ההדק על אות חלש ורועש.
tip.9.body = בלעדיו, רעש סביב רמת ההדק יורה מטר של הדקות שווא והעקבה רוטטת. הפעל היסטרזיס הדק והעקבה תינעל.
tip.10.title = אות מחולל שמור הוא ייחוס מושלם.
tip.10.body = "שמור אל..." כותב את צורת הגל האידיאלית, המדויקת מתמטית — ללא עיוות של DAC, מגבר או כבילה. הזן אותו למכשיר אחר וכל פגם שתמדוד שייך למכשיר ההוא, לא למקור.
tip.11.title = חלץ תגובה של אבזר באמצעות קובץ כיול.
tip.11.body = מדוד פעם אחת תגובה של מסנן, מנחת או כרטיס קול במודול תגובת התדר, ואז טען את אותו ‎.frc לתוך מנתח ה-FFT: תגובתו מחולקת החוצה בזמן התצוגה, כך שהטבלה מציגה את ההתקן הנבדק.
tip.12.title = שכבת ה"פעימה המשוחזרת" מאלפת זוג טונים קרובים.
tip.12.body = במצב טון-כפול שכבת ה"פעימה המשוחזרת" של הסקופ מציירת את מעטפת |f1 - f2| האיטית, כך שתוכל להדק על הפעימה במקום לרדוף אחר חציות הנשא המהירות.
tip.13.title = סריקת תגובת התדר היא הייחוס של עצמה.
tip.13.body = המדידה הסרוקה עוברת דה-קונבולוציה כנגד הסריקה המדויקת שנוגנה — לא עותק שנמדד מחדש — כך שהעוצמה והפאזה המשוחזרות הן פונקציית התמסורת האמיתית של ההתקן.
tip.14.title = Ctrl+F1 קופץ ישר לעזרה הנכונה.
tip.14.body = הקש F1 בכל מקום לקבלת המדריך, או Ctrl+F1 כדי לפתוח את העזרה במקטע המדויק של הפקד שכרגע במוקד.

