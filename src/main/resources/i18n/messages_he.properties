preferences.fft.lineWidth.tooltip = עובי קו ספקטרום FFT בפיקסלים
preferences.fft.dotDiameter = קוטר נקודות הרמוניות, px:
preferences.fft.dotDiameter.tooltip = קוטר סמנים של הרמוניות / בסיסי בפיקסלים
preferences.fft.strongToneRelDb = סף זיהוי רב-טוני:
preferences.fft.strongToneRelDb.tooltip = עבור מיצוע קוהרנטי, שיא ספקטרלי נחשב טון נפרד רק אם הוא בתוך כך וכך dB מהשיא החזק ביותר. הנמך אותו כך שהרמוניות / מוצרי IMD של טון לא ייחשבו טונים עצמאיים (מה שינתב את המיצוע אל מסלול הרב-טוני לכל טון). נכנס לתוקף בהפעלה מחדש של המיצוע (אפס סטטיסטיקה).
preferences.fft.lineColor = צבע קו:
preferences.fft.bgColor = צבע רקע התרשים:
preferences.fft.dotColor = צבע נקודות הרמוניות:
preferences.fft.filterColor = צבע קו תגובת הפילטר:
preferences.fft.beforeCalDotColor = צבע נקודה לפני כיול:
preferences.fft.calOverlayColor = צבע שכבת כיול:

# ---- Frequency response
preferences.freqResp.lineWidth = עובי קו העקבה, px:
preferences.freqResp.lineWidth.tooltip = עובי קו עקבת תגובת התדר בפיקסלים (עקומות עוצמה, פאזה, ייחוס RIAA והשוואה)
preferences.freqResp.maxFreqPctNyquist = תדר מנותח מרבי, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = מגביל את הגבול העליון של תצוגת FreqResp לחלק זה של Nyquist (sampleRate / 2).  96–100 %.  100 % = Nyquist קפדני; ערכים נמוכים יותר גוזמים את התחום שבו אנרגיית גרעין הדה-קונבולוציה דועכת.
preferences.freqResp.compareSmoothWindow = חלון החלקה להשוואה, 1/N אוקטבה
preferences.freqResp.compareSmoothWindow.tooltip = רוחב מסנן הממוצע הנע המוחל על עקומת מצב ההשוואה (נמדד − ייחוס), המבוטא ביחידות של 1/N אוקטבה.  N = 0 משבית החלקה.  N קטן יותר = חלון רחב יותר = יותר החלקה (N=3 ≈ 1/3 אוקטבה, רחב), N גדול יותר = צר יותר = קל יותר (N=24 ≈ 1/24 אוקטבה, סטנדרט שמע).
preferences.freqResp.notch.enable = אפשר מסנן notch לרעש תעשייתי
preferences.freqResp.notch.enable.tooltip = כשמופעל, תצוגת FreqResp מבצעת אינטרפולציה לרוחב כל הרמוניה של תדר הרשת הנבחר (50/60 Hz) — מסיר קוצי זמזום רשת מהתגובה המוצגת ללא מדידה מחדש.
preferences.freqResp.notch.baseHz = תדר תעשייתי
preferences.freqResp.notch.baseHz.tooltip = תדר הבסיס שההרמוניות שלו (50, 100, 150, … Hz או 60, 120, 180, …) מוסרות בעת ה-notch כשתיבת הסימון שמעל פועלת.
preferences.freqResp.signalColor = צבע האות
preferences.freqResp.phaseColor = צבע הפאזה
preferences.freqResp.referenceColor = צבע הייחוס (RIAA)
preferences.freqResp.backgroundColor = צבע רקע התרשים

