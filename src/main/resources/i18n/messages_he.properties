# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = מדוד והחל קדם-עיוות של ה-DAC.\nהוא נועל את הטון לבין FFT, ואז בכל סבב ממצע את מספר פריימי ה-FFT שהוגדר, קורא את ההרמוניות של הסינוס (או את תוצרי האינטרמודולציה של הטון הכפול), ומזין תיקון שווה והפוך בחזרה למחולל — חוזר על כך עד שהעיוות מגיע ליעד שלך או מפסיק להשתפר.\nמטרה: להוריד את העיוות לעבר רצפת הרעש; שמור את ה-.dpd והחל אותו כדי לשמר את הטון המתוקן.
predistortion.wizard.title = קדם-עיוות DAC
predistortion.averages = ממוצעים, n
predistortion.averages.tooltip = ממוצעי FFT לכל סבב (מינימום 10).  כל סבב ממצע מספר זה של פריימים, הגדל ביחס לירידת העיוות ככל שהוא מתכנס.  הלולאה רצה עד שתלחץ עצור.
predistortion.targetThd = THD יעד, %
predistortion.targetThd.tooltip = עצור ברגע שה-THD מגיע לערך זה (0 = רוץ עד שיתקע)
predistortion.table.metric = מדידה
predistortion.table.value = ערך
predistortion.intro = חובה: הצב מסנן twin-T פסיבי, מכוונן לתדר היסודי, בין ההתקן הנבדק לבין ה-ADC.  בלעדיו ההרמוניות של ה-ADC עצמו קובעות את הרצפה והלולאה מפצה בסופו של דבר את ה-ADC, לא את ה-DAC.\nהליך זה מוריד את העיוות השיורי של ה-DAC על ידי קדם-עיוות של המחולל בהפוך ממה שהוא מודד.\nכיצד זה עובד — 1) הוא נועל את הטון לבין FFT וממתין ליישור;  2) בכל סבב הוא ממצע את מספר פריימי ה-FFT שהוגדר למטה, קורא את ההרמוניות של הסינוס (או את תוצרי האינטרמודולציה של הטון הכפול), ומזין תיקון שווה והפוך בחזרה למחולל;  3) הוא חוזר — ממצע יותר פריימים ככל שהעיוות יורד — והתרשים צונח לעבר רצפת הרעש, עד שהעיוות היעד מושג או שההתקדמות נתקעת.\nהאשף מריץ את ה-FFT במיצוע קוהרנטי אינסופי כשהתדר היסודי נלקח מהמחולל וה-FLL פועל; לרצפה העמוקה ביותר השתמש בחלון HFT248D והשאר את דיכוי הרשת כבוי.  השתמש באות נקי כמה dB מתחת לסקלה המלאה והתדר היסודי מוצמד לבין — ואז שמור את ה-.dpd והחל אותו.
