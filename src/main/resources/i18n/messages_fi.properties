# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Päivän vinkki
tip.dialog.dontShowAgain = Älä näytä uudelleen
tip.dialog.next          = Seuraava vinkki
tip.dialog.close         = Sulje
tip.dialog.closeCountdown = Sulje ({0} s)
tip.count = 14
tip.1.title = Koherentti keskiarvoistus kaivautuu syvälle kohinatason alle.
tip.1.body  = Pidä koherentti (kompleksinen) keskiarvoistus päällä ja anna FFT:n käydä — ääni summautuu, kun taas kohina osittain kumoutuu, joten taso laskee sitä alemmas mitä kauemmin odotat.
tip.2.title = Lukitse generaattori FFT-binille puhdasta spektriä varten.
tip.2.body  = Kun "Lukitse taajuus lähimpään" on päällä, ääni osuu täsmälleen binin kohdalle, joten vuoto ei tahraa perustaajuutta ja yliaaltoarviot pysyvät rehellisinä.
tip.3.title = Kiinnitä perustaajuus käsin twin-T-suotimella.
tip.3.body  = Passiivinen twin-T-nolla on niin jyrkkä, että muutaman kymmenesosan hertsin terminen ajautuma heilauttaa de-embeddattua perustaajuutta. Syötä todella tuntemasi taso kohtaan "Manuaalinen perustaajuus"; yliaallot loivalla rinteellä de-embeddautuvat hyvin.
tip.4.title = WASAPI-yksinoikeustila pitää mittauksen bittitarkkana.
tip.4.body  = Yksinoikeustila luovuttaa laitteen suoraan Phonalyserille ohittaen Windowsin mikserin ja sen näytteenottotaajuusmuuntimen — ei piilotettua uudelleennäytteistystä värittämään tulosta.
tip.5.title = WDM-KS antaa oskilloskoopille eniten kuvia sekunnissa.
tip.5.body  = Nopeinta elävän skoopin päivitystä varten valitse WDM-KS-taustajärjestelmä Asetuksissa — se sijaitsee alempana kuin WASAPI ja työntää enemmän kaappauslohkoja sekunnissa.
tip.6.title = Hiiren rulla zoomaa kohdistimen ympärille.
tip.6.body  = Missä tahansa kuvaajanäkymässä: rulla liikuttaa pystysuunnassa, Shift+rulla vaakasuunnassa, Ctrl+rulla zoomaa pystyakselia ja Ctrl+Shift+rulla vaaka-akselia — molemmat zoomit pitävät osoittimen alla olevan arvon paikallaan.
tip.7.title = Jokainen numerokenttä hyväksyy yksiköt, rullan ja näppäimistön.
tip.7.body  = Kirjoita arvo yksiköineen (µV, 1.5 V, -3 dBV, 2 kHz), pyöritä rullaa, napsauta ylös/alas-nuolia tai paina näppäimistön ylös/alas-näppäimiä askeltaaksesi.
tip.8.title = Sinc-interpolaatiolla on merkitystä vain, kun olet lähennettynä.
tip.8.body  = Sin/Lin-kytkin muuttaa kuvaajaa vain, kun näytepisteet ovat näytöllä parin pikselin päässä toisistaan; muutoin suorat viivat näyttävät samalta ja kuluttavat vähemmän suoritintehoa. Kytke se päälle, kun yksittäiset näytteet ovat näkyvissä.
tip.9.title = Hystereesi vakauttaa liipaisun heikossa, kohinaisessa signaalissa.
tip.9.body  = Ilman sitä liipaisutason ympärillä oleva kohina laukaisee tulvan vääriä liipaisuja ja kuvaaja värisee. Ota liipaisuhystereesi käyttöön, niin kuvaaja lukittuu.
tip.10.title = Tallennettu generaattorisignaali on täydellinen referenssi.
tip.10.body  = "Tallenna nimellä..." kirjoittaa ihanteellisen, matemaattisesti tarkan aaltomuodon — ei DAC-, vahvistin- tai kaapelointisärkua. Syötä se toiseen laitteeseen, ja mikä tahansa mittaamasi epätäydellisyys kuuluu sille laitteelle, ei lähteelle.
tip.11.title = De-embeddaa kalibrointitiedostolla.
tip.11.body  = Mittaa loven, vaimentimen tai äänikortin vaste kerran Taajuusvaste-moduulissa, lataa sitten kyseinen .frc FFT-analysaattoriin: sen vaste jaetaan pois näyttöhetkellä, joten taulukko näyttää testattavan laitteen.
tip.12.title = Rekonstruoidun huojunnan peittokuva taltuttaa läheisen kaksoisääniparin.
tip.12.body  = Kaksoisäänitilassa skoopin "Rekonstruoitu huojunta" -peittokuva piirtää hitaan |f1 - f2| -verhokäyrän, joten voit liipaista huojunnasta nopeiden kantoaallon ylitysten jahtaamisen sijaan.
tip.13.title = Taajuusvasteen pyyhkäisy on oma referenssinsä.
tip.13.body  = Pyyhkäisymittaus dekonvoloidaan tasan soitettua pyyhkäisyä vasten — ei uudelleenmitattua kopiota — joten palautettu amplitudi ja vaihe ovat laitteen todellinen siirtofunktio.
tip.14.title = Ctrl+F1 hyppää suoraan oikeaan ohjeeseen.
tip.14.body  = Paina F1 missä tahansa avataksesi käsikirjan, tai Ctrl+F1 avataksesi ohjeen täsmälleen siinä kohdassa, joka koskee parhaillaan kohdistettua säädintä.

