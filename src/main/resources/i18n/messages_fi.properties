# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mittaa ja ota käyttöön DAC-esisärötys.\nSe lukitsee äänen FFT-binille, minkä jälkeen kukin kierros keskiarvoistaa asetetun määrän FFT-kehyksiä, lukee sinin yliaallot (tai kaksoisäänen intermodulaatiotuotteet) ja syöttää yhtä suuren ja vastakkaisen korjauksen takaisin generaattorille — toistaen, kunnes särö saavuttaa tavoitteesi tai lakkaa paranemasta.\nTavoite: ajaa särö kohti kohinatasoa; Tallenna .dpd ja ota se käyttöön säilyttääksesi kompensoidun äänen.
predistortion.wizard.title = DAC-esisärötys
predistortion.averages = Keskiarvot, n
predistortion.averages.tooltip = FFT-keskiarvot kierrosta kohti (vähintään 10).  Kukin kierros keskiarvoistaa tämän verran kehyksiä, kasvaen suhteessa särön laskuun sen konvergoituessa.  Silmukka käy, kunnes painat Pysäytä.
predistortion.targetThd = Tavoite-THD, %
predistortion.targetThd.tooltip = Pysäytä, kun THD saavuttaa tämän arvon (0 = käy, kunnes pysähtyy paikoilleen)
predistortion.table.metric = Mittaus
predistortion.table.value = Arvo
predistortion.intro = PAKOLLINEN: aseta perustaajuudelle viritetty passiivinen twin-T-lovisuodin testattavan laitteen ja ADC:n väliin.  Ilman sitä ADC:n omat yliaallot määräävät tason, ja silmukka päätyy kompensoimaan ADC:tä, ei DAC:ta.\nTämä ajaa DAC:n jäännössärön alas esisärötyttämällä generaattorin sillä, minkä käänteistä se mittaa.\nNäin se toimii — 1) se lukitsee äänen FFT-binille ja odottaa kohdistusta;  2) kukin kierros keskiarvoistaa alla asetetun määrän FFT-kehyksiä, lukee sinin yliaallot (tai kaksoisäänen intermodulaatiotuotteet) ja syöttää yhtä suuren ja vastakkaisen korjauksen takaisin generaattorille;  3) se toistaa — keskiarvoistaen useampia kehyksiä särön laskiessa — kuvaajan laskien kohti kohinatasoa, kunnes tavoitesärö saavutetaan tai edistyminen pysähtyy.\nAvustaja ajaa FFT:n äärettömällä koherentilla keskiarvoistuksella, perustaajuus otettuna generaattorista ja FLL päällä; syvimmän tason saavuttamiseksi käytä HFT248D-ikkunaa ja jätä verkkovirran vaimennus pois.  Käytä puhdasta signaalia muutaman dB:n täysasteikon alapuolella ja perustaajuus binille lukittuna — sitten Tallenna .dpd ja ota se käyttöön.
