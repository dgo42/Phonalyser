# ---- Frequency response
preferences.freqResp.lineWidth = Lijndikte trace, px:
preferences.freqResp.lineWidth.tooltip = Lijndikte van de frequentierespons-trace in pixels (amplitude, fase, RIAA-referentie en vergelijkingscurves)
preferences.freqResp.maxFreqPctNyquist = Maximaal geanalyseerde frequentie, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = Begrenst de bovengrens van de FreqResp-weergave op deze fractie van Nyquist (sampleRate / 2).  96–100 %.  100 % = strikte Nyquist; lagere waarden snoeien de band waar de energie van de ontvouwingskernel afrolt.
preferences.freqResp.compareSmoothWindow = Afvlakvenster vergelijking, 1/N octaaf
preferences.freqResp.compareSmoothWindow.tooltip = Breedte van het voortschrijdend-gemiddelde-filter dat op de vergelijkmodus-curve (gemeten − referentie) wordt toegepast, uitgedrukt in 1/N-octaafeenheden.  N = 0 schakelt afvlakking uit.  Kleinere N = breder venster = meer afvlakking (N=3 ≈ 1/3-octaaf, breed), grotere N = smaller = lichter (N=24 ≈ 1/24-octaaf, standaard audio).
preferences.freqResp.notch.enable = Notch-filter voor industriële ruis toestaan
preferences.freqResp.notch.enable.tooltip = Indien ingeschakeld interpoleert de FreqResp-weergave over elke harmonische van de gekozen netfrequentie (50/60 Hz) — verwijdert netbrompieken uit de getoonde respons zonder opnieuw te meten.
preferences.freqResp.notch.baseHz = Industriële frequentie
preferences.freqResp.notch.baseHz.tooltip = Basisfrequentie waarvan de harmonischen (50, 100, 150, … Hz of 60, 120, 180, …) worden weggefilterd wanneer het vakje hierboven aan staat.
