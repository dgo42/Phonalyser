# ===== TIP OF THE DAY =====

tip.dialog.heading = Tip van de dag
tip.dialog.dontShowAgain = Niet meer tonen
tip.dialog.next = Volgende tip
tip.dialog.close = Sluiten
tip.dialog.closeCountdown = Sluiten ({0}s)
tip.count = 14
tip.1.title = Coherente middeling graaft ver onder de ruisvloer.
tip.1.body = Laat coherente (complexe) middeling aan staan en laat de FFT draaien — de toon telt op terwijl de ruis deels weggemiddeld wordt, dus de vloer blijft dalen hoe langer je wacht.
tip.2.title = Zet de generator op een FFT-bin voor een schoon spectrum.
tip.2.body = Met "Frequentie naar dichtstbijzijnde uitlijnen" aan landt de toon precies op een bin, zodat lekkage de grondtoon niet uitsmeert en de harmonische schattingen eerlijk blijven.
tip.3.title = Leg de grondtoon handmatig vast bij een twin-T-notch.
tip.3.body = Een passieve twin-T-nul is zo steil dat een paar tienden van een hertz thermische drift de gede-embedde grondtoon doet zwaaien. Voer het niveau in dat je werkelijk kent met "Handmatige grondtoon"; de harmonischen, op de flauwe flank, de-embedden prima.
tip.4.title = WASAPI-exclusieve modus houdt de meting bit-exact.
tip.4.body = Exclusieve modus geeft het apparaat rechtstreeks aan Phonalyser, langs de Windows-mixer en zijn samplerateconverter heen — geen verborgen herbemonstering die het resultaat kleurt.
tip.5.title = WDM-KS geeft de oscilloscoop de meeste beelden per seconde.
tip.5.body = Kies voor de snelste live scope-verversing de WDM-KS-backend in Voorkeuren — die zit lager dan WASAPI en duwt meer captureblokken per seconde door.
tip.6.title = Het muiswiel zoomt rond de cursor.
tip.6.body = In elke trace-weergave: het wiel beweegt verticaal, Shift+wiel horizontaal, Ctrl+wiel zoomt de verticale as en Ctrl+Shift+wiel de horizontale — beide zooms houden de waarde onder de aanwijzer vast.
tip.7.title = Elk numeriek veld neemt eenheden, het wiel en het toetsenbord aan.
tip.7.body = Typ een waarde met zijn eenheid (µV, 1.5 V, -3 dBV, 2 kHz), scroll met het wiel, klik op de omhoog/omlaag-pijlen, of druk op de omhoog/omlaag-toetsen om te stappen.
tip.8.title = Sinc-interpolatie doet er alleen toe wanneer je ingezoomd bent.
tip.8.body = De Sin/Lin-schakelaar verandert de trace alleen wanneer samplepunten een paar pixels uit elkaar liggen op het scherm; anders zien rechte lijnen er identiek uit en kosten ze minder CPU. Zet hem aan zodra individuele samples zichtbaar zijn.
tip.9.title = Hysterese stabiliseert de trigger op een zwak, ruisachtig signaal.
tip.9.body = Zonder dat veroorzaakt ruis rond het triggerniveau een stortvloed aan valse triggers en trilt de trace. Schakel triggerhysterese in en de trace vergrendelt.
tip.10.title = Een opgeslagen generatorsignaal is een perfecte referentie.
tip.10.body = "Opslaan als..." schrijft de ideale, wiskundig exacte golfvorm — geen DAC-, versterker- of bekabelingsvervorming. Voer hem aan een ander instrument: elke onvolkomenheid die je dan meet hoort bij dat apparaat, niet bij de bron.
tip.11.title = De-embed een fixture met een kalibratiebestand.
tip.11.body = Meet een notch, verzwakker of de respons van een geluidskaart één keer in de module Frequentierespons, laad die .frc dan in de FFT-analyser: zijn respons wordt op weergavemoment uitgedeeld, zodat de tabel het te testen apparaat toont.
tip.12.title = De gereconstrueerde-zwevingsoverlay temt een dichtbij liggend tweetonenpaar.
tip.12.body = In tweetonenmodus tekent de scope-overlay "Gereconstrueerde zweving" de trage |f1 - f2|-envelop, zodat je op de zweving kunt triggeren in plaats van de snelle dragernuldoorgangen na te jagen.
tip.13.title = De frequentieresponssweep is zijn eigen referentie.
tip.13.body = De gesweepte meting wordt ontvouwen tegen de exacte sweep die werd afgespeeld — niet een opnieuw gemeten kopie — zodat de teruggewonnen amplitude en fase de echte overdrachtsfunctie van het apparaat zijn.
tip.14.title = Ctrl+F1 springt direct naar de juiste help.
tip.14.body = Druk overal op F1 voor de handleiding, of op Ctrl+F1 om de help te openen bij precies de sectie voor het besturingselement dat nu de focus heeft.

