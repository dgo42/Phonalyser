# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Meet en pas DAC-voorvervorming toe.\nHet vergrendelt de toon op een FFT-bin en middelt daarna per ronde het ingestelde aantal FFT-frames, leest de harmonischen van de sinus (of de intermodulatieproducten van de tweetoon) en koppelt een gelijke-en-tegengestelde correctie terug naar de generator — dit herhaalt totdat de vervorming je doel bereikt of niet meer verbetert.\nDoel: de vervorming richting de ruisvloer drukken; sla de .dpd op en pas hem toe om de gecompenseerde toon te behouden.
predistortion.wizard.title = DAC-voorvervorming
predistortion.averages = Middelingen, n
predistortion.averages.tooltip = FFT-middelingen per ronde (minimaal 10).  Elke ronde middelt dit aantal frames, dat evenredig met de vervormingsdaling groeit naarmate het convergeert.  De lus draait tot je op Stoppen drukt.
predistortion.targetThd = Doel-THD, %
predistortion.targetThd.tooltip = Stop zodra de THD deze waarde bereikt (0 = doorgaan tot het stilvalt)
predistortion.table.metric = Meting
predistortion.table.value = Waarde
predistortion.intro = VERPLICHT: plaats een passief twin-T-notch-filter, afgestemd op de grondtoon, tussen het te testen apparaat en de ADC.  Zonder dat bepalen de eigen harmonischen van de ADC de vloer en compenseert de lus uiteindelijk de ADC, niet de DAC.\nDit drukt de resterende vervorming van de DAC omlaag door de generator voor te vervormen met het omgekeerde van wat hij meet.\nHoe het werkt — 1) het vergrendelt de toon op een FFT-bin en wacht op uitlijning;  2) elke ronde middelt het het aantal FFT-frames dat hieronder is ingesteld, leest het de harmonischen van de sinus (of de intermodulatieproducten van de tweetoon) en koppelt het een gelijke-en-tegengestelde correctie terug naar de generator;  3) het herhaalt — meer frames middelend naarmate de vervorming daalt — met de grafiek die richting de ruisvloer valt, totdat de doelvervorming is bereikt of de voortgang stilvalt.\nDe wizard draait de FFT in oneindige coherente middeling met de grondtoon van de generator en de FLL aan; gebruik voor de diepste vloer het HFT248D-venster en laat netonderdrukking uit.  Gebruik een schoon signaal een paar dB onder volledige schaal met de grondtoon op een bin afgerond — sla dan de .dpd op en pas hem toe.
