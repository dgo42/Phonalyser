# ===== TIP OF THE DAY =====

tip.dialog.heading = Günün ipucu
tip.dialog.dontShowAgain = Bir daha gösterme
tip.dialog.next = Sonraki ipucu
tip.dialog.close = Kapat
tip.dialog.closeCountdown = Kapat ({0}s)
tip.count = 14
tip.1.title = Tutarlı (koherent) ortalama, gürültü tabanının çok altını kazır.
tip.1.body = Tutarlı (karmaşık) ortalamayı açık bırakın ve FFT'nin çalışmasına izin verin — ton birikirken gürültü kısmen birbirini götürür, böylece bekledikçe taban düşmeye devam eder.
tip.2.title = Temiz bir spektrum için jeneratörü bir FFT bölmesine kenetleyin.
tip.2.body = "Frekansı en yakına yasla" açıkken ton tam olarak bir bölmeye oturur, böylece sızıntı temel bileşeni bulanıklaştırmaz ve harmonik kestirimleri dürüst kalır.
tip.3.title = Twin-T çentikte temel bileşeni elle sabitleyin.
tip.3.body = Pasif bir twin-T sıfır o kadar diktir ki birkaç onda bir hertzlik termal kayma, de-embed edilmiş temel bileşeni sallar. "Elle temel bileşen" ile gerçekten bildiğiniz seviyeyi girin; yumuşak yamaçtaki harmonikler sorunsuz de-embed edilir.
tip.4.title = WASAPI özel kip, ölçümü bit düzeyinde kesin tutar.
tip.4.body = Özel kip, cihazı doğrudan Phonalyser'a verir; Windows karıştırıcısını ve örnekleme hızı dönüştürücüsünü atlar — sonucu renklendirecek gizli bir yeniden örnekleme olmaz.
tip.5.title = WDM-KS, osiloskoba saniyede en fazla kareyi verir.
tip.5.body = En hızlı canlı osiloskop tazelemesi için Tercihler'de WDM-KS arka ucunu seçin — WASAPI'den daha alt katmanda yer alır ve saniyede daha çok yakalama bloğu iter.
tip.6.title = Fare tekerleği imlecin çevresinde yakınlaştırır.
tip.6.body = Herhangi bir iz görünümünde: tekerlek dikey, Shift+tekerlek yatay hareket ettirir, Ctrl+tekerlek dikey ekseni, Ctrl+Shift+tekerlek yatay ekseni yakınlaştırır — her iki yakınlaştırma da işaretçinin altındaki değeri sabit tutar.
tip.7.title = Her sayısal alan birimleri, tekerleği ve klavyeyi kabul eder.
tip.7.body = Birimiyle bir değer yazın (µV, 1.5 V, -3 dBV, 2 kHz), tekerleği kaydırın, yukarı/aşağı oklara tıklayın veya adımlamak için klavyenin yukarı/aşağı tuşlarına basın.
tip.8.title = Sinc enterpolasyonu yalnızca yakınlaştırdığınızda önem taşır.
tip.8.body = Sin/Lin anahtarı izi yalnızca örnek noktaları ekranda birkaç piksel aralıklıyken değiştirir; aksi halde düz çizgiler birebir aynı görünür ve daha az CPU harcar. Tek tek örnekler görünür olunca açın.
tip.9.title = Histerez, zayıf ve gürültülü bir sinyalde tetiği dengeler.
tip.9.body = Onsuz, tetik seviyesi çevresindeki gürültü bir yığın yanlış tetik üretir ve iz titrer. Tetik histerezini etkinleştirin, iz kenetlenir.
tip.10.title = Kaydedilmiş bir jeneratör sinyali kusursuz bir referanstır.
tip.10.body = "Şuraya kaydet..." ideal, matematiksel olarak kesin dalga biçimini yazar — DAC, amplifikatör ya da kablo bozulması yoktur. Başka bir cihaza verin; ölçtüğünüz her kusur, kaynağa değil o cihaza aittir.
tip.11.title = Bir kalibrasyon dosyasıyla bir düzeneği de-embed edin.
tip.11.body = Bir çentik, zayıflatıcı veya ses kartının yanıtını Frekans yanıtı modülünde bir kez ölçün, ardından o .frc dosyasını FFT analizörüne yükleyin: yanıtı görüntüleme anında bölünüp çıkarılır, böylece tablo test edilen cihazı gösterir.
tip.12.title = Yeniden oluşturulan vuru bindirmesi, yakın bir iki tonlu çifti yatıştırır.
tip.12.body = Çift tonlu kipte osiloskobun "Yeniden oluşturulan vuru" bindirmesi yavaş |f1 - f2| zarfını çizer, böylece hızlı taşıyıcı geçişlerini kovalamak yerine vuruyu tetikleyebilirsiniz.
tip.13.title = Frekans yanıtı taraması kendi referansıdır.
tip.13.body = Taramalı ölçüm, çalınan tam tarayla evrişimi geri alınarak çözülür — yeniden ölçülmüş bir kopyayla değil — böylece geri kazanılan genlik ve faz, cihazın gerçek transfer fonksiyonudur.
tip.14.title = Ctrl+F1 doğrudan doğru yardıma atlar.
tip.14.body = El kitabı için herhangi bir yerde F1'e basın veya o an odakta olan denetimin tam bölümünde yardımı açmak için Ctrl+F1.

