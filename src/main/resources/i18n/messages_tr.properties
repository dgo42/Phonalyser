# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = DAC ön bozulmasını ölç ve uygula.\nTonu bir FFT bölmesine kilitler, sonra her tur ayarlanan sayıda FFT karesinin ortalamasını alır, sinüsün harmoniklerini (veya çift tonun intermodülasyon ürünlerini) okur ve jeneratöre eşit ve zıt bir düzeltme geri besler — bozulma hedefinize ulaşana veya iyileşme durana kadar tekrarlar.\nAmaç: bozulmayı gürültü tabanına doğru aşağı sürmek; .dpd dosyasını Kaydet ve dengelenmiş tonu korumak için Uygula.
predistortion.wizard.title = DAC ön bozulması
predistortion.averages = Ortalama, n
predistortion.averages.tooltip = Tur başına FFT ortalaması (en az 10).  Her tur bu kadar karenin ortalamasını alır; yakınsadıkça bozulma düşüşüyle orantılı olarak büyür.  Döngü, Durdur'a basana kadar çalışır.
predistortion.targetThd = Hedef THD, %
predistortion.targetThd.tooltip = THD bu değere ulaşınca dur (0 = tıkanana kadar çalış)
predistortion.table.metric = Ölçüm
predistortion.table.value = Değer
predistortion.intro = ZORUNLU: test edilen cihaz ile ADC arasına, temel bileşene göre ayarlanmış pasif bir twin-T çentik filtresi koyun.  Onsuz, ADC'nin kendi harmonikleri tabanı belirler ve döngü DAC'yi değil ADC'yi dengelemeye başlar.\nBu, jeneratörü ölçtüğünün tersiyle ön bozulmaya uğratarak DAC'nin artık bozulmasını aşağı sürer.\nNasıl çalışır — 1) tonu bir FFT bölmesine kilitler ve hizalanmayı bekler;  2) her tur, aşağıda ayarlanan sayıda FFT karesinin ortalamasını alır, sinüsün harmoniklerini (veya çift tonun intermodülasyon ürünlerini) okur ve jeneratöre eşit ve zıt bir düzeltme geri besler;  3) tekrarlar — bozulma düştükçe daha çok kare ortalanır — grafik gürültü tabanına doğru düşerken, hedef bozulmaya ulaşılana veya ilerleme tıkanana kadar.\nSihirbaz, FFT'yi sonsuz koherent ortalamada, temel bileşen jeneratörden alınmış ve FLL açık olarak çalıştırır; en derin taban için HFT248D penceresini kullanın ve şebeke bastırmayı kapalı bırakın.  Tam ölçeğin birkaç dB altında temiz bir sinyal ve bir bölmeye yaslanmış temel bileşen kullanın — sonra .dpd dosyasını Kaydet ve Uygula.
