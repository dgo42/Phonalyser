# --- Tip of the day -------------------------------------------------------
tip.dialog.heading       = Dagens tip
tip.dialog.dontShowAgain = Vis ikke igen
tip.dialog.next          = Næste tip
tip.dialog.close         = Luk
tip.dialog.closeCountdown = Luk ({0}s)
tip.count = 14
tip.1.title = Kohærent midling graver langt under støjgulvet.
tip.1.body  = Lad kohærent (kompleks) midling være tændt, og lad FFT'en køre — tonen lægger sig sammen, mens støjen delvist ophæver sig selv, så gulvet bliver ved med at falde, jo længere du venter.
tip.2.title = Lås generatoren til en FFT-bin for et rent spektrum.
tip.2.body  = Med "Lås frekvens til nærmeste" slået til lander tonen præcis på en bin, så lækage ikke smører grundtonen ud, og harmoniske estimater forbliver ærlige.
tip.3.title = Lås grundtonen i hånden på et twin-T-notch.
tip.3.body  = En passiv twin-T-null er så stejl, at nogle få tiendedele af en hertz termisk drift svinger den de-embeddede grundtone. Indtast det niveau, du faktisk kender, med "Manuel grundtone"; de harmoniske, på den blide flanke, de-embeddes fint.
tip.4.title = WASAPI eksklusiv tilstand holder målingen bit-eksakt.
tip.4.body  = Eksklusiv tilstand overgiver enheden direkte til Phonalyser og omgår Windows-mixeren og dens samplerate-konverter — ingen skjult resampling der farver resultatet.
tip.5.title = WDM-KS giver oscilloskopet flest billeder pr. sekund.
tip.5.body  = For den hurtigste live-scopeopdatering skal du vælge WDM-KS-backend i Indstillinger — den sidder lavere end WASAPI og skubber flere optageblokke ud pr. sekund.
tip.6.title = Musehjulet zoomer omkring markøren.
tip.6.body  = I enhver trace-visning: hjulet flytter lodret, Shift+hjul vandret, Ctrl+hjul zoomer den lodrette akse og Ctrl+Shift+hjul den vandrette — begge zoom holder værdien under markøren fast.
tip.7.title = Hvert numerisk felt tager enheder, hjulet og tastaturet.
tip.7.body  = Skriv en værdi med dens enhed (µV, 1.5 V, -3 dBV, 2 kHz), rul med hjulet, klik på op/ned-pilene, eller tryk på op/ned-tasterne på tastaturet for at trinne.
tip.8.title = Sinc-interpolation betyder kun noget, når du er zoomet ind.
tip.8.body  = Sin/Lin-omskifteren ændrer kun tracen, når samplepunkterne er et par pixels fra hinanden på skærmen; ellers ser rette linjer identiske ud og koster mindre CPU. Slå den til, så snart de enkelte samples er synlige.
tip.9.title = Hysterese stabiliserer triggeren på et svagt, støjende signal.
tip.9.body  = Uden den udløser støj omkring triggerniveauet en byge af falske triggere, og tracen jitrer. Aktivér triggerhysterese, og tracen låser.
tip.10.title = Et gemt generatorsignal er en perfekt reference.
tip.10.body  = "Gem som..." skriver den ideelle, matematisk eksakte bølgeform — ingen forvrængning fra DAC, forstærker eller kabling. Før den til et andet instrument, og enhver ufuldkommenhed du måler tilhører den enhed, ikke kilden.
tip.11.title = De-embed en fixtur med en kalibreringsfil.
tip.11.body  = Mål et notch, en dæmpeled eller et lydkorts respons én gang i Frekvensrespons-modulet, og indlæs derefter den .frc i FFT-analysatoren: dens respons divideres ud på visningstidspunktet, så tabellen viser den enhed der testes.
tip.12.title = Det rekonstruerede beat-overlay tæmmer et tæt totone-par.
tip.12.body  = I totone-tilstand tegner scopets "Rekonstrueret beat"-overlay den langsomme |f1 - f2| indhylling, så du kan trigge på beatet i stedet for at jagte de hurtige bærebølgekrydsninger.
tip.13.title = Frekvensrespons-sweepet er sin egen reference.
tip.13.body  = Den fejede måling dekonvolveres mod det præcise sweep der blev afspillet — ikke en genmålt kopi — så den genvundne magnitude og fase er enhedens sande overføringsfunktion.
tip.14.title = Ctrl+F1 springer direkte til den rigtige hjælp.
tip.14.body  = Tryk F1 hvor som helst for manualen, eller Ctrl+F1 for at åbne hjælpen ved det præcise afsnit for det kontrolelement der aktuelt har fokus.

