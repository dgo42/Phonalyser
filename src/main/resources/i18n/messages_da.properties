# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Mål og anvend DAC-prædistortion.\nDen låser tonen til en FFT-bin, og derefter midler hver runde det indstillede antal FFT-frames, læser sinussens harmoniske (eller totonens intermodulationsprodukter) og fører en lige-og-modsat korrektion tilbage til generatoren — gentager indtil forvrængningen når dit mål eller holder op med at forbedres.\nMål: drive forvrængningen ned mod støjgulvet; Gem .dpd'en og Anvend den for at beholde den kompenserede tone.
predistortion.wizard.title = DAC-prædistortion
predistortion.averages = Gennemsnit, n
predistortion.averages.tooltip = FFT-gennemsnit pr. runde (minimum 10).  Hver runde midler så mange frames, voksende i forhold til forvrængningsfaldet efterhånden som den konvergerer.  Sløjfen kører indtil du trykker Stop.
predistortion.targetThd = Mål-THD, %
predistortion.targetThd.tooltip = Stop når THD når denne værdi (0 = kør indtil den går i stå)
predistortion.table.metric = Måling
predistortion.table.value = Værdi
predistortion.intro = OBLIGATORISK: placér et passivt twin-T-notch-filter, afstemt til grundtonen, mellem enheden under test og ADC'en.  Uden det sætter ADC'ens egne harmoniske gulvet, og sløjfen ender med at kompensere ADC'en, ikke DAC'en.\nDette driver DAC'ens resterende forvrængning ned ved at prædistorere generatoren med det inverse af hvad den måler.\nSådan virker det — 1) den låser tonen fast på en FFT-bin og venter på justering;  2) hver runde midler den det antal FFT-frames der er indstillet nedenfor, læser sinussens harmoniske (eller totonens intermodulationsprodukter) og fører en lige-og-modsat korrektion tilbage til generatoren;  3) den gentager — midler flere frames efterhånden som forvrængningen falder — mens diagrammet falder mod støjgulvet, indtil mål-forvrængningen er nået eller fremgangen går i stå.\nGuiden kører FFT'en i uendelig kohærent midling med grundtonen taget fra generatoren og FLL slået til; for det dybeste gulv brug HFT248D-vinduet og lad net-undertrykkelse være slået fra.  Brug et rent signal nogle få dB under fuldskala og grundtonen låst til en bin — gem så .dpd'en og Anvend den.
