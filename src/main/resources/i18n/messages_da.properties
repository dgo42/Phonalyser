# ---- Frequency response
preferences.freqResp.lineWidth = Trace-linjebredde, px:
preferences.freqResp.lineWidth.tooltip = Frekvensrespons-tracens linjetykkelse i pixels (magnitude, fase, RIAA-reference og sammenligningskurver)
preferences.freqResp.maxFreqPctNyquist = Maksimal analyseret frekvens, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = Begrænser den øvre grænse for FreqResp-visningen til denne brøkdel af Nyquist (sampleRate / 2).  96–100 %.  100 % = streng Nyquist; lavere værdier trimmer det bånd hvor dekonvolutionskernens energi ruller af.
preferences.freqResp.compareSmoothWindow = Sammenlignings-udjævningsvindue, 1/N oktav
preferences.freqResp.compareSmoothWindow.tooltip = Bredden af det glidende-gennemsnitsfilter anvendt på sammenligningstilstands-kurven (målt − reference), udtrykt i 1/N-oktav-enheder.  N = 0 deaktiverer udjævning.  Mindre N = bredere vindue = mere udjævning (N=3 ≈ 1/3-oktav, bred), større N = smallere = lettere (N=24 ≈ 1/24-oktav, standard lyd).
preferences.freqResp.notch.enable = Tillad notch-filter for industriel støj
preferences.freqResp.notch.enable.tooltip = Når aktiveret interpolerer FreqResp-visningen henover hver harmonisk af den valgte netfrekvens (50/60 Hz) — fjerner nethum-spidser fra den viste respons uden at genmåle.
preferences.freqResp.notch.baseHz = Industriel frekvens
preferences.freqResp.notch.baseHz.tooltip = Basisfrekvens hvis harmoniske (50, 100, 150, … Hz eller 60, 120, 180, …) notches ud når afkrydsningsfeltet ovenfor er tændt.
