# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Μέτρηση και εφαρμογή προπαραμόρφωσης DAC.\nΚλειδώνει τον τόνο σε μια θυρίδα FFT, μετά κάθε γύρος υπολογίζει τον μέσο όρο του καθορισμένου αριθμού καρέ FFT, διαβάζει τις αρμονικές του ημιτόνου (ή τα προϊόντα ενδοδιαμόρφωσης του διπλού τόνου) και τροφοδοτεί μια ίση και αντίθετη διόρθωση πίσω στη γεννήτρια — επαναλαμβάνοντας μέχρι η παραμόρφωση να φτάσει τον στόχο σας ή να σταματήσει να βελτιώνεται.\nΣτόχος: να οδηγήσετε την παραμόρφωση προς το επίπεδο θορύβου· Αποθηκεύστε το .dpd και Εφαρμόστε το για να διατηρήσετε τον αντισταθμισμένο τόνο.
predistortion.wizard.title = Προπαραμόρφωση DAC
predistortion.averages = Μέσοι όροι, n
predistortion.averages.tooltip = Μέσοι όροι FFT ανά γύρο (ελάχιστο 10).  Κάθε γύρος υπολογίζει τον μέσο όρο τόσων καρέ, αυξάνοντας αναλογικά με την πτώση της παραμόρφωσης καθώς συγκλίνει.  Ο βρόχος τρέχει μέχρι να πατήσετε Διακοπή.
predistortion.targetThd = Στόχος THD, %
predistortion.targetThd.tooltip = Διακοπή μόλις το THD φτάσει αυτή την τιμή (0 = τρέχει μέχρι να σταματήσει να βελτιώνεται)
predistortion.table.metric = Μέτρηση
predistortion.table.value = Τιμή
predistortion.intro = ΥΠΟΧΡΕΩΤΙΚΟ: τοποθετήστε ένα παθητικό φίλτρο εγκοπής twin-T, συντονισμένο στη θεμελιώδη, ανάμεσα στη συσκευή υπό δοκιμή και τον ADC.  Χωρίς αυτό, οι ίδιες οι αρμονικές του ADC ορίζουν το επίπεδο και ο βρόχος καταλήγει να αντισταθμίζει τον ADC, όχι τον DAC.\nΑυτό οδηγεί την υπολειπόμενη παραμόρφωση του DAC προς τα κάτω προπαραμορφώνοντας τη γεννήτρια με το αντίστροφο αυτού που μετρά.\nΠώς λειτουργεί — 1) κλειδώνει τον τόνο σε μια θυρίδα FFT και περιμένει την ευθυγράμμιση·  2) κάθε γύρος υπολογίζει τον μέσο όρο του αριθμού καρέ FFT που ορίζεται παρακάτω, διαβάζει τις αρμονικές του ημιτόνου (ή τα προϊόντα ενδοδιαμόρφωσης του διπλού τόνου) και τροφοδοτεί μια ίση και αντίθετη διόρθωση πίσω στη γεννήτρια·  3) επαναλαμβάνει — υπολογίζοντας τον μέσο όρο περισσότερων καρέ καθώς η παραμόρφωση πέφτει — με το διάγραμμα να πέφτει προς το επίπεδο θορύβου, μέχρι να επιτευχθεί η στοχευμένη παραμόρφωση ή να σταματήσει η πρόοδος.\nΟ οδηγός τρέχει την FFT σε άπειρη σύμφωνη μέση τιμή με τη θεμελιώδη να λαμβάνεται από τη γεννήτρια και το FLL ενεργό· για το βαθύτερο επίπεδο χρησιμοποιήστε το παράθυρο HFT248D και αφήστε την καταστολή δικτύου ανενεργή.  Χρησιμοποιήστε ένα καθαρό σήμα λίγα dB κάτω από την πλήρη κλίμακα και τη θεμελιώδη κουμπωμένη σε μια θυρίδα — μετά Αποθηκεύστε το .dpd και Εφαρμόστε το.
