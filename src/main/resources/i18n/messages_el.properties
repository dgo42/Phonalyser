# ===== TIP OF THE DAY =====

tip.dialog.heading = Συμβουλή της ημέρας
tip.dialog.dontShowAgain = Να μην εμφανιστεί ξανά
tip.dialog.next = Επόμενη συμβουλή
tip.dialog.close = Κλείσιμο
tip.dialog.closeCountdown = Κλείσιμο ({0}s)
tip.count = 14
tip.1.title = Η σύμφωνη μέση τιμή σκάβει πολύ κάτω από το επίπεδο θορύβου.
tip.1.body = Αφήστε ενεργή τη σύμφωνη (μιγαδική) μέση τιμή και αφήστε την FFT να τρέχει — ο τόνος αθροίζεται ενώ ο θόρυβος εν μέρει αλληλοαναιρείται, οπότε το επίπεδο συνεχίζει να πέφτει όσο περιμένετε.
tip.2.title = Κουμπώστε τη γεννήτρια σε μια θυρίδα FFT για καθαρό φάσμα.
tip.2.body = Με ενεργό το "Κούμπωμα συχνότητας στην πλησιέστερη", ο τόνος προσγειώνεται ακριβώς σε μια θυρίδα, οπότε η διαρροή δεν θολώνει τη θεμελιώδη και οι εκτιμήσεις αρμονικών παραμένουν ειλικρινείς.
tip.3.title = Καρφιτσώστε τη θεμελιώδη με το χέρι σε ένα φίλτρο εγκοπής twin-T.
tip.3.body = Ένα παθητικό μηδενικό twin-T είναι τόσο απότομο που λίγα δέκατα του χερτζ θερμικής ολίσθησης ταλαντεύουν την απο-ενσωματωμένη θεμελιώδη. Εισαγάγετε τη στάθμη που πραγματικά γνωρίζετε με τη "Χειροκίνητη θεμελιώδη"· οι αρμονικές, στην ήπια πλευρά, απο-ενσωματώνονται μια χαρά.
tip.4.title = Η αποκλειστική λειτουργία WASAPI κρατά τη μέτρηση ακριβή ως το bit.
tip.4.body = Η αποκλειστική λειτουργία παραδίδει τη συσκευή απευθείας στο Phonalyser, παρακάμπτοντας τον μείκτη των Windows και τον μετατροπέα ρυθμού δειγματοληψίας του — χωρίς κρυφή επαναδειγματοληψία που χρωματίζει το αποτέλεσμα.
tip.5.title = Το WDM-KS δίνει στον παλμογράφο τα περισσότερα καρέ ανά δευτερόλεπτο.
tip.5.body = Για την ταχύτερη ζωντανή ανανέωση του παλμογράφου, επιλέξτε το backend WDM-KS στις Προτιμήσεις — βρίσκεται χαμηλότερα από το WASAPI και ωθεί περισσότερα μπλοκ λήψης ανά δευτερόλεπτο.
tip.6.title = Η ροδέλα του ποντικιού μεγεθύνει γύρω από τον δρομέα.
tip.6.body = Σε οποιαδήποτε προβολή ίχνους: η ροδέλα μετακινεί κατακόρυφα, Shift+ροδέλα οριζόντια, Ctrl+ροδέλα μεγεθύνει τον κατακόρυφο άξονα και Ctrl+Shift+ροδέλα τον οριζόντιο — και οι δύο μεγεθύνσεις κρατούν σταθερή την τιμή κάτω από τον δείκτη.
tip.7.title = Κάθε αριθμητικό πεδίο δέχεται μονάδες, τη ροδέλα και το πληκτρολόγιο.
tip.7.body = Πληκτρολογήστε μια τιμή με τη μονάδα της (µV, 1.5 V, -3 dBV, 2 kHz), κυλήστε τη ροδέλα, κάντε κλικ στα βέλη πάνω/κάτω ή πατήστε τα πλήκτρα πάνω/κάτω για βηματισμό.
tip.8.title = Η παρεμβολή sinc έχει σημασία μόνο όταν είστε σε μεγέθυνση.
tip.8.body = Ο διακόπτης Sin/Lin αλλάζει το ίχνος μόνο όταν τα σημεία δειγματοληψίας απέχουν λίγα pixel στην οθόνη· διαφορετικά οι ευθείες γραμμές φαίνονται πανομοιότυπες και κοστίζουν λιγότερο σε CPU. Ενεργοποιήστε τον μόλις γίνουν ορατά τα μεμονωμένα δείγματα.
tip.9.title = Η υστέρηση σταθεροποιεί τη σκανδάλη σε ένα ασθενές, θορυβώδες σήμα.
tip.9.body = Χωρίς αυτήν, ο θόρυβος γύρω από τη στάθμη σκανδαλισμού πυροδοτεί έναν καταιγισμό ψευδών σκανδαλισμών και το ίχνος τρεμοπαίζει. Ενεργοποιήστε την υστέρηση σκανδάλης και το ίχνος κλειδώνει.
tip.10.title = Ένα αποθηκευμένο σήμα γεννήτριας είναι μια τέλεια αναφορά.
tip.10.body = Το "Αποθήκευση σε..." γράφει την ιδανική, μαθηματικά ακριβή κυματομορφή — χωρίς παραμόρφωση από DAC, ενισχυτή ή καλωδίωση. Τροφοδοτήστε το σε άλλο όργανο και κάθε ατέλεια που μετράτε ανήκει σε εκείνη τη συσκευή, όχι στην πηγή.
tip.11.title = Απο-ενσωματώστε μια διάταξη με ένα αρχείο βαθμονόμησης.
tip.11.body = Μετρήστε μια εγκοπή, έναν εξασθενητή ή την απόκριση μιας κάρτας ήχου μία φορά στο άρθρωμα Απόκρισης συχνότητας, μετά φορτώστε εκείνο το .frc στον αναλυτή FFT: η απόκρισή του διαιρείται κατά την εμφάνιση, οπότε ο πίνακας δείχνει τη συσκευή υπό δοκιμή.
tip.12.title = Η επικάλυψη ανακατασκευασμένου διακροτήματος δαμάζει ένα κοντινό ζεύγος δύο τόνων.
tip.12.body = Στη λειτουργία διπλού τόνου, η επικάλυψη "Ανακατασκευασμένο διακρότημα" του παλμογράφου σχεδιάζει την αργή περιβάλλουσα |f1 - f2|, ώστε να σκανδαλίζετε στο διακρότημα αντί να κυνηγάτε τις γρήγορες διελεύσεις του φέροντος.
tip.13.title = Η σάρωση απόκρισης συχνότητας είναι η δική της αναφορά.
tip.13.body = Η σαρωμένη μέτρηση αποσυνελίσσεται έναντι της ακριβούς σάρωσης που αναπαράχθηκε — όχι ενός εκ νέου μετρημένου αντιγράφου — οπότε το ανακτημένο μέτρο και η φάση είναι η αληθινή συνάρτηση μεταφοράς της συσκευής.
tip.14.title = Το Ctrl+F1 πηγαίνει κατευθείαν στη σωστή βοήθεια.
tip.14.body = Πατήστε F1 οπουδήποτε για το εγχειρίδιο, ή Ctrl+F1 για να ανοίξετε τη βοήθεια στην ακριβή ενότητα του στοιχείου ελέγχου που έχει αυτήν τη στιγμή την εστίαση.

