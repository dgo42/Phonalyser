# ---- Frequency response
preferences.freqResp.lineWidth = Spessore linea traccia, px:
preferences.freqResp.lineWidth.tooltip = Spessore della linea della traccia di risposta in frequenza in pixel (curve di ampiezza, fase, riferimento RIAA e confronto)
preferences.freqResp.maxFreqPctNyquist = Frequenza massima analizzata, % Nyquist
preferences.freqResp.maxFreqPctNyquist.tooltip = Limita il bordo superiore della vista FreqResp a questa frazione della Nyquist (sampleRate / 2).  96–100 %.  100 % = Nyquist stretta; valori inferiori tagliano la banda dove l'energia del kernel di deconvoluzione decade.
preferences.freqResp.compareSmoothWindow = Finestra di smoothing del confronto, 1/N ottava
preferences.freqResp.compareSmoothWindow.tooltip = Larghezza del filtro a media mobile applicato alla curva in modalità confronto (misurata − riferimento), espressa in unità di 1/N ottava.  N = 0 disabilita lo smoothing.  N più piccolo = finestra più larga = più smoothing (N=3 ≈ 1/3 ottava, ampia), N più grande = più stretta = più leggero (N=24 ≈ 1/24 ottava, standard audio).
preferences.freqResp.notch.enable = Consenti filtro notch per il rumore industriale
preferences.freqResp.notch.enable.tooltip = Quando abilitato, la vista FreqResp interpola attraverso ogni armonica della frequenza di rete scelta (50/60 Hz): rimuove i picchi di ronzio di rete dalla risposta visualizzata senza ri-misurare.
preferences.freqResp.notch.baseHz = Frequenza industriale
preferences.freqResp.notch.baseHz.tooltip = Frequenza base le cui armoniche (50, 100, 150, … Hz oppure 60, 120, 180, …) vengono filtrate via quando la casella sopra è attiva.
preferences.freqResp.signalColor = Colore del segnale
preferences.freqResp.phaseColor = Colore della fase
preferences.freqResp.referenceColor = Colore del riferimento (RIAA)
preferences.freqResp.backgroundColor = Colore di sfondo del grafico

