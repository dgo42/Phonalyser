# ===== DAC PREDISTORTION WIZARD =====

predistortion.button.wizard.tooltip = Misura e applica la predistorsione del DAC.\nAggancia il tono a un bin FFT, poi a ogni round media il numero impostato di fotogrammi FFT, legge le armoniche della sinusoide (o i prodotti di intermodulazione dei due toni) e rimanda al generatore una correzione uguale e contraria — ripetendo finché la distorsione raggiunge l'obiettivo o smette di migliorare.\nObiettivo: spingere la distorsione giù verso il rumore di fondo; Salva il .dpd e Applicalo per mantenere il tono compensato.
predistortion.wizard.title = Predistorsione DAC
predistortion.averages = Mediazioni, n
predistortion.averages.tooltip = Mediazioni FFT per round (minimo 10).  Ogni round media questo numero di fotogrammi, crescendo in proporzione al calo della distorsione man mano che converge.  Il ciclo gira finché non premi Stop.
predistortion.targetThd = THD obiettivo, %
predistortion.targetThd.tooltip = Ferma una volta che il THD raggiunge questo valore (0 = gira finché non si stalla)
predistortion.table.metric = Misura
predistortion.table.value = Valore
predistortion.intro = OBBLIGATORIO: metti un filtro notch passivo twin-T, accordato sulla fondamentale, tra il dispositivo in prova e l'ADC.  Senza di esso le armoniche dell'ADC stesso fissano il rumore di fondo e il ciclo finisce per compensare l'ADC, non il DAC.\nQuesto spinge giù la distorsione residua del DAC predistorcendo il generatore con l'inverso di ciò che misura.\nCome funziona — 1) aggancia il tono a un bin FFT e attende l'allineamento;  2) a ogni round media il numero di fotogrammi FFT impostato sotto, legge le armoniche della sinusoide (o i prodotti di intermodulazione dei due toni) e rimanda al generatore una correzione uguale e contraria;  3) ripete — mediando più fotogrammi man mano che la distorsione cala — con il grafico che scende verso il rumore di fondo, finché la distorsione obiettivo è raggiunta o i progressi si stallano.\nLa procedura guidata esegue la FFT in mediazione coerente infinita con la fondamentale presa dal generatore e l'FLL attivo; per il rumore di fondo più profondo usa la finestra HFT248D e lascia disattivata la soppressione di rete.  Usa un segnale pulito qualche dB sotto il fondo scala e la fondamentale agganciata a un bin — poi Salva il .dpd e Applicalo.
