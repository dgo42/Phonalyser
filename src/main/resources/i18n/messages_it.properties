# ===== TIP OF THE DAY =====

tip.dialog.heading = Suggerimento del giorno
tip.dialog.dontShowAgain = Non mostrare più
tip.dialog.next = Suggerimento successivo
tip.dialog.close = Chiudi
tip.dialog.closeCountdown = Chiudi ({0}s)
tip.count = 14
tip.1.title = La media coerente scava ben al di sotto del rumore di fondo.
tip.1.body = Lascia attiva la media coerente (complessa) e fai girare la FFT: il tono si somma mentre il rumore in parte si cancella, così il rumore di fondo continua a scendere quanto più aspetti.
tip.2.title = Aggancia il generatore a un bin FFT per uno spettro pulito.
tip.2.body = Con "Aggancia frequenza al più vicino" attivo, il tono cade esattamente su un bin, così la dispersione non spalma la fondamentale e le stime delle armoniche restano oneste.
tip.3.title = Fissa a mano la fondamentale su un notch twin-T.
tip.3.body = Un null passivo twin-T è così ripido che pochi decimi di hertz di deriva termica fanno oscillare la fondamentale de-embeddata. Inserisci il livello che conosci davvero con "Fondamentale manuale"; le armoniche, sul fianco dolce, si de-embeddano bene.
tip.4.title = La modalità esclusiva WASAPI mantiene la misura bit-exact.
tip.4.body = La modalità esclusiva consegna il dispositivo direttamente a Phonalyser, bypassando il mixer di Windows e il suo convertitore di frequenza di campionamento: nessun ricampionamento nascosto a falsare il risultato.
tip.5.title = WDM-KS dà all'oscilloscopio il maggior numero di fotogrammi al secondo.
tip.5.body = Per il refresh dello scope dal vivo più rapido, scegli il backend WDM-KS in Preferenze: si colloca più in basso di WASAPI e spinge più blocchi di acquisizione al secondo.
tip.6.title = La rotellina del mouse zooma attorno al cursore.
tip.6.body = In qualsiasi vista traccia: la rotellina si muove in verticale, Shift+rotellina in orizzontale, Ctrl+rotellina zooma l'asse verticale e Ctrl+Shift+rotellina quello orizzontale; entrambi gli zoom mantengono fisso il valore sotto il puntatore.
tip.7.title = Ogni campo numerico accetta unità, rotellina e tastiera.
tip.7.body = Digita un valore con la sua unità (µV, 1.5 V, -3 dBV, 2 kHz), scorri la rotellina, clicca le frecce su/giù oppure premi i tasti su/giù della tastiera per incrementare.
tip.8.title = L'interpolazione sinc conta solo quando sei in zoom.
tip.8.body = L'interruttore Sin/Lin cambia la traccia solo quando i punti campione distano un paio di pixel sullo schermo; altrimenti le linee rette appaiono identiche e costano meno CPU. Attivalo una volta che i singoli campioni sono visibili.
tip.9.title = L'isteresi stabilizza il trigger su un segnale debole e rumoroso.
tip.9.body = Senza di essa, il rumore attorno al livello di trigger scatena una raffica di falsi trigger e la traccia trema. Abilita l'isteresi del trigger e la traccia si aggancia.
tip.10.title = Un segnale del generatore salvato è un riferimento perfetto.
tip.10.body = "Salva con nome..." scrive la forma d'onda ideale, matematicamente esatta: nessuna distorsione di DAC, amplificatore o cablaggio. Inviala a un altro strumento e qualsiasi imperfezione che misuri appartiene a quel dispositivo, non alla sorgente.
tip.11.title = De-embedda un fixture con un file di calibrazione.
tip.11.body = Misura una volta la risposta di un notch, di un attenuatore o di una scheda audio nel modulo Risposta in frequenza, poi carica quel .frc nell'analizzatore FFT: la sua risposta viene divisa via in fase di visualizzazione, così la tabella mostra il dispositivo in prova.
tip.12.title = L'overlay del battimento ricostruito addomestica una coppia ravvicinata di due toni.
tip.12.body = In modalità due toni l'overlay "Battimento ricostruito" dello scope disegna l'inviluppo lento |f1 - f2|, così puoi triggerare sul battimento invece di rincorrere i veloci passaggi per lo zero della portante.
tip.13.title = Lo sweep di risposta in frequenza è il riferimento di sé stesso.
tip.13.body = La misura spazzata viene deconvoluta rispetto all'esatto sweep riprodotto, non a una copia ri-misurata, così l'ampiezza e la fase recuperate sono la vera funzione di trasferimento del dispositivo.
tip.14.title = Ctrl+F1 salta dritto alla guida giusta.
tip.14.body = Premi F1 ovunque per il manuale, oppure Ctrl+F1 per aprire la guida esattamente alla sezione del controllo che ha attualmente il fuoco.

