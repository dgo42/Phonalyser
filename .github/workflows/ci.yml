name: CI

# Runs the test suite on every push to main / develop and on every pull
# request targeting those branches.  The matrix covers Linux, Windows, and
# macOS so platform-specific regressions (SWT, audio backends, locale
# defaults) get caught before they reach a release tag.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch / PR when a new push arrives —
# saves CI minutes on quick consecutive pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the rest of the matrix on a single-OS failure — we
      # want to see all three results in one run, not just the first
      # failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Project Nayuki's flac-library isn't on Maven Central — it's
      # vendored under deps/flac-library-java and must be installed to
      # the runner's local ~/.m2 before the main project resolves its
      # dependency.  Idempotent: on cache hit the install is a no-op.
      - name: Install vendored flac-library
        run: mvn -B -ntp -f deps/flac-library-java/pom.xml install

      # Runs the full build chain: compile → test → fat JAR → antrun copy
      # of native libs (Windows) → jpackage.  jpackage.type=APP_IMAGE
      # produces the runtime image only (no MSI/DEB/DMG wrap), which is
      # enough to catch packaging regressions and faster than building
      # installers on every push.  Real installers are still built by the
      # release workflow on tag pushes.
      - name: Compile, test, and build app image
        # Force bash on every runner — PowerShell (the Windows default)
        # splits "-Djpackage.type=APP_IMAGE" on the period and Maven
        # then sees ".type=APP_IMAGE" as a phase name.
        shell: bash
        run: mvn -B -ntp -Djpackage.type=APP_IMAGE package

      - name: Upload app image
        uses: actions/upload-artifact@v7
        with:
          name: phonalyser-${{ matrix.os }}-app-image
          path: target/installer/
          retention-days: 14

      # Upload Surefire reports when tests fail so the failure can be
      # inspected without having to re-run locally.  `if: failure()` keeps
      # the green-build artifact list empty.
      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ matrix.os }}
          path: target/surefire-reports/
          retention-days: 14
