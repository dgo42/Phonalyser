name: Build installers

# Triggers:
#   * push a tag that looks like a version (v1.0.0, 1.0-RC1, 2025.05.20…)
#     -> build all OSes and attach to a GitHub release.
#   * workflow_dispatch -> manual run from the Actions tab, useful for testing the matrix.
on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  # ============================================================== Windows x64
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Project Nayuki's flac-library isn't on Maven Central — it's
      # vendored under deps/flac-library-java and must be installed to
      # the runner's local ~/.m2 before the main project resolves it.
      - name: Install vendored flac-library
        run: mvn -B -ntp -f deps/flac-library-java/pom.xml install

      # csjsound-provider.jar and the native DLLs are not on Maven Central -
      # they must already live under lib/windows/.  Fail loudly if a checkout
      # is missing them instead of producing a half-built installer.
      - name: Verify Windows natives present
        shell: pwsh
        run: |
          $required = @(
            "lib/windows/csjsound-provider.jar",
            "lib/windows/csjsound_amd64.dll",
            "lib/windows/portaudio_x64.dll"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "Missing required Windows natives: $($missing -join ', '). See lib/windows/README.md."
            exit 1
          }

      # `mvn package` builds the fat JAR, stages it into target/jpackage-input/,
      # and runs jpackage — all in one go (see <executions> in pom.xml).
      - name: Build fat JAR + EXE installer
        run: mvn -B -DskipTests package

      # Optional: also pack an MSIX for the Microsoft Store (the Store signs it
      # for free at publish time).  GUARDED — skipped unless MSIX_IDENTITY_NAME is
      # set, so normal .exe/.jar builds are unaffected.  Needs a Partner Center app
      # reservation (Identity Name + Publisher) and PNG logos in
      # src/main/packaging/msix/assets/.  See PACKAGING.md -> "Microsoft Store (MSIX)".
      - name: Build MSIX (Microsoft Store)
        if: vars.MSIX_IDENTITY_NAME != ''
        shell: pwsh
        run: |
          mvn -B -DskipTests package "-Djpackage.type=APP_IMAGE"
          $app = "target/installer/Phonalyser"
          if (-not (Test-Path $app)) { throw "app-image not found at $app" }
          if (-not (Get-ChildItem src/main/packaging/msix/assets/*.png -ErrorAction SilentlyContinue)) {
            throw "No Store logos in src/main/packaging/msix/assets/ (see that folder's README.txt)."
          }
          $pomVer = (Select-Xml -Path pom.xml -XPath "/*[local-name()='project']/*[local-name()='version']").Node.InnerText
          $parts  = ($pomVer -replace '[^0-9.].*$','').Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $ver = ($parts[0..2] -join '.') + '.0'
          (Get-Content src/main/packaging/msix/AppxManifest.xml -Raw).
            Replace('@IDENTITY_NAME@',  '${{ vars.MSIX_IDENTITY_NAME }}').
            Replace('@PUBLISHER@',      '${{ vars.MSIX_PUBLISHER }}').
            Replace('@PUBLISHER_NAME@', '${{ vars.MSIX_PUBLISHER_NAME }}').
            Replace('@VERSION@',        $ver) |
            Set-Content "$app/AppxManifest.xml" -Encoding utf8
          New-Item -ItemType Directory -Force "$app/Assets" | Out-Null
          Copy-Item src/main/packaging/msix/assets/*.png "$app/Assets/" -Force
          $makeappx = (Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Recurse -Filter makeappx.exe |
                       Where-Object FullName -match '\\x64\\' | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $makeappx) { throw "makeappx.exe not found (Windows SDK)" }
          & $makeappx pack /d $app /p "target/installer/Phonalyser-$ver.msix" /o

      # The installer is shipped UNSIGNED (see README.md -> "Code signing").
      - uses: actions/upload-artifact@v7
        with:
          name: phonalyser-windows
          path: |
            target/installer/*.exe
            target/installer/*.msix
            target/phonalyser-*-windows.jar

  # ============================================================== Linux x64
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Project Nayuki's flac-library isn't on Maven Central — it's
      # vendored under deps/flac-library-java and must be installed to
      # the runner's local ~/.m2 before the main project resolves it.
      - name: Install vendored flac-library
        run: mvn -B -ntp -f deps/flac-library-java/pom.xml install

      - name: Install fakeroot (needed by jpackage for .deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Build fat JAR + .deb installer
        run: mvn -B -DskipTests package

      - uses: actions/upload-artifact@v7
        with:
          name: phonalyser-linux
          path: |
            target/installer/*.deb
            target/phonalyser-*-linux.jar

  # ===================================================== macOS x64 + Apple Silicon
  # Ship a DMG per architecture.  Both legs run on the Apple-Silicon macos-14
  # runner — the Intel macos-13 image is being retired.  The arm64 DMG uses the
  # native aarch64 JDK; the Intel DMG uses an x86_64 JDK running under Rosetta 2,
  # which makes jpackage emit an x86_64 app + JRE that runs natively on Intel
  # Macs (an arm64-only build is rejected with "not supported on this Mac").
  # The pom auto-selects the matching macos-x64 / macos-aarch64 profile from
  # os.arch, which reflects the JDK's architecture (x86_64 under Rosetta).
  build-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            jdk: x64
          - arch: arm64
            jdk: aarch64
    steps:
      - uses: actions/checkout@v5

      # The x86_64 JDK only runs on the arm64 runner through Rosetta 2.
      - name: Install Rosetta 2
        if: matrix.arch == 'x64'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Set up JDK 17 (${{ matrix.jdk }})
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          architecture: ${{ matrix.jdk }}
          cache: maven

      # Project Nayuki's flac-library isn't on Maven Central — it's
      # vendored under deps/flac-library-java and must be installed to
      # the runner's local ~/.m2 before the main project resolves it.
      - name: Install vendored flac-library
        run: mvn -B -ntp -f deps/flac-library-java/pom.xml install

      # Both macos profiles already append -XstartOnFirstThread to
      # jpackage's javaOptions; no extra args needed here.
      - name: Build fat JAR + .dmg installer
        run: mvn -B -DskipTests package

      # jpackage names the DMG Phonalyser-<version>.dmg regardless of arch,
      # so tag it with the arch to keep the two builds from colliding on the
      # release page.
      - name: Tag the DMG with its architecture
        run: |
          cd target/installer
          for f in *.dmg; do
            mv "$f" "${f%.dmg}-${{ matrix.arch }}.dmg"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: phonalyser-macos-${{ matrix.arch }}
          path: |
            target/installer/*.dmg
            target/phonalyser-*-macos*.jar

  # ============================================================== Release
  release:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          # ** recurses into the installer/ subdirectory that
          # upload-artifact@v4 creates when multiple paths share a parent
          # (target/) — without ** the .exe/.deb/.dmg get skipped and
          # only the top-level fat JAR makes it onto the release.
          # The dist/* launcher scripts + per-OS run guides are attached from
          # the checkout (identical for every release).
          files: |
            artifacts/phonalyser-windows/**
            artifacts/phonalyser-linux/**
            artifacts/phonalyser-macos-x64/**
            artifacts/phonalyser-macos-arm64/**
            dist/Phonalyser-windows.bat
            dist/Phonalyser-linux.sh
            dist/Phonalyser-macos.sh
            dist/README-windows.txt
            dist/README-linux.txt
            dist/README-macos.txt
          draft: true
